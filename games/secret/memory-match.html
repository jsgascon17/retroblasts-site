<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match - Secret Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { font-size: 2rem; color: #ffd700; text-shadow: 0 0 20px rgba(255,215,0,0.5); }
        .header p { color: #888; margin-top: 5px; }
        .secret-badge { background: linear-gradient(135deg, #9b59b6, #8e44ad); padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }
        
        .stats { display: flex; gap: 30px; margin-bottom: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 0.8rem; color: #888; }
        
        .game-board {
            display: grid; gap: 10px; margin-bottom: 20px;
            perspective: 1000px;
        }
        .grid-4x4 { grid-template-columns: repeat(4, 80px); }
        .grid-6x6 { grid-template-columns: repeat(6, 65px); }
        
        .card {
            width: 80px; height: 80px; cursor: pointer;
            position: relative; transform-style: preserve-3d;
            transition: transform 0.4s;
        }
        .grid-6x6 .card { width: 65px; height: 65px; }
        
        .card.flipped { transform: rotateY(180deg); }
        .card.matched { pointer-events: none; }
        .card.matched .card-front { background: rgba(76,175,80,0.3); border-color: #4CAF50; }
        
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem;
        }
        .card-back {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: 3px solid #ffd700;
        }
        .card-front {
            background: rgba(255,255,255,0.1);
            border: 3px solid rgba(255,255,255,0.2);
            transform: rotateY(180deg);
        }
        
        .btn {
            padding: 15px 40px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; border: none; border-radius: 25px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        
        .difficulty-select { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn {
            padding: 10px 25px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: #fff; cursor: pointer; font-weight: bold;
        }
        .diff-btn.active { border-color: #e94560; background: rgba(233,69,96,0.2); }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2.5rem; color: #ffd700; margin-bottom: 20px; }
        .overlay .score { font-size: 3rem; color: #e94560; margin-bottom: 10px; }
        .overlay p { color: #888; margin-bottom: 20px; }
        
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← Back</a>
    
    <div class="header">
        <div class="secret-badge">🔮 SECRET GAME</div>
        <h1>🧠 Memory Match</h1>
        <p>Match all the pairs as fast as you can!</p>
    </div>
    
    <div class="stats">
        <div class="stat">
            <div class="stat-value" id="moves">0</div>
            <div class="stat-label">Moves</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="time">0:00</div>
            <div class="stat-label">Time</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="matches">0/8</div>
            <div class="stat-label">Matches</div>
        </div>
    </div>
    
    <div class="difficulty-select">
        <button class="diff-btn active" onclick="setDifficulty(4)">4x4 Easy</button>
        <button class="diff-btn" onclick="setDifficulty(6)">6x6 Hard</button>
    </div>
    
    <div class="game-board grid-4x4" id="gameBoard"></div>
    
    <button class="btn" onclick="startGame()">New Game</button>
    
    <div class="overlay" id="winOverlay">
        <h2>🎉 You Win!</h2>
        <div class="score" id="finalScore">0</div>
        <p id="finalStats">Completed in 0 moves and 0:00</p>
        <button class="btn" onclick="startGame()">Play Again</button>
    </div>

    <script>
        const EMOJIS = ['🎮', '🎲', '🎯', '🏆', '⭐', '🔥', '💎', '🚀', '🎪', '🎨', '🎭', '🎸', '🌟', '💫', '🌈', '🎁', '🍀', '🌸'];
        
        let gridSize = 4;
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let startTime = null;
        let timerInterval = null;
        let canFlip = true;
        
        function setDifficulty(size) {
            gridSize = size;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            const board = document.getElementById('gameBoard');
            board.className = 'game-board grid-' + size + 'x' + size;
            
            startGame();
        }
        
        function startGame() {
            document.getElementById('winOverlay').classList.add('hidden');
            
            // Reset state
            matchedPairs = 0;
            moves = 0;
            flippedCards = [];
            canFlip = true;
            startTime = Date.now();
            
            // Clear timer
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 100);
            
            // Generate cards
            const pairCount = (gridSize * gridSize) / 2;
            const selectedEmojis = EMOJIS.slice(0, pairCount);
            cards = [...selectedEmojis, ...selectedEmojis];
            
            // Shuffle
            for (let i = cards.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cards[i], cards[j]] = [cards[j], cards[i]];
            }
            
            // Render
            const board = document.getElementById('gameBoard');
            board.innerHTML = cards.map((emoji, i) => `
                <div class="card" onclick="flipCard(${i})">
                    <div class="card-face card-back">?</div>
                    <div class="card-face card-front">${emoji}</div>
                </div>
            `).join('');
            
            updateUI();
        }
        
        function flipCard(index) {
            if (!canFlip) return;
            
            const cardElements = document.querySelectorAll('.card');
            const card = cardElements[index];
            
            if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
            if (flippedCards.length >= 2) return;
            
            card.classList.add('flipped');
            flippedCards.push({ index, emoji: cards[index], element: card });
            
            if (flippedCards.length === 2) {
                moves++;
                updateUI();
                
                if (flippedCards[0].emoji === flippedCards[1].emoji) {
                    // Match!
                    flippedCards.forEach(c => c.element.classList.add('matched'));
                    matchedPairs++;
                    flippedCards = [];
                    updateUI();
                    
                    if (matchedPairs === cards.length / 2) {
                        gameWon();
                    }
                } else {
                    // No match
                    canFlip = false;
                    setTimeout(() => {
                        flippedCards.forEach(c => c.element.classList.remove('flipped'));
                        flippedCards = [];
                        canFlip = true;
                    }, 1000);
                }
            }
        }
        
        function updateTimer() {
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            document.getElementById('time').textContent = mins + ':' + secs.toString().padStart(2, '0');
        }
        
        function updateUI() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matchedPairs + '/' + (cards.length / 2);
        }
        
        function gameWon() {
            clearInterval(timerInterval);
            const elapsed = Math.floor((Date.now() - startTime) / 1000);
            const mins = Math.floor(elapsed / 60);
            const secs = elapsed % 60;
            
            // Score based on moves and time (lower is better, so we invert)
            const maxMoves = (gridSize * gridSize) * 2;
            const score = Math.max(0, Math.floor((maxMoves - moves) * 100 - elapsed * 2));
            
            document.getElementById('finalScore').textContent = score + ' pts';
            document.getElementById('finalStats').textContent = `Completed in ${moves} moves and ${mins}:${secs.toString().padStart(2, '0')}`;
            document.getElementById('winOverlay').classList.remove('hidden');
        }
        
        // Start game on load
        startGame();
    </script>
</body>
</html>
