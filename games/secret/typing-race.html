<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typing Race - Secret Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: #ffd700; }
        .secret-badge { background: linear-gradient(135deg, #9b59b6, #8e44ad); padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }
        
        .stats-row { display: flex; gap: 40px; margin-bottom: 30px; }
        .stat { text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #e94560; }
        .stat-label { font-size: 0.85rem; color: #888; }
        
        .text-display {
            background: rgba(0,0,0,0.4); border-radius: 20px;
            padding: 30px; max-width: 700px; width: 100%;
            font-size: 1.4rem; line-height: 1.8;
            margin-bottom: 20px; min-height: 150px;
        }
        .text-display .correct { color: #27ae60; }
        .text-display .incorrect { color: #e94560; background: rgba(233,69,96,0.3); }
        .text-display .current { background: rgba(255,215,0,0.3); border-bottom: 2px solid #ffd700; }
        .text-display .remaining { color: #888; }
        
        .input-area {
            width: 100%; max-width: 700px;
        }
        .typing-input {
            width: 100%; padding: 20px; font-size: 1.2rem;
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px; color: #fff; outline: none;
        }
        .typing-input:focus { border-color: #e94560; }
        .typing-input:disabled { opacity: 0.5; }
        
        .progress-bar {
            width: 100%; max-width: 700px; height: 10px;
            background: rgba(255,255,255,0.1); border-radius: 5px;
            margin: 20px 0; overflow: hidden;
        }
        .progress-fill {
            height: 100%; background: linear-gradient(90deg, #e94560, #ff6b6b);
            transition: width 0.1s;
        }
        
        .btn {
            padding: 15px 40px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; border: none; border-radius: 25px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
            margin-top: 20px;
        }
        
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: flex;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2.5rem; color: #ffd700; margin-bottom: 20px; }
        .overlay .final-wpm { font-size: 5rem; color: #e94560; font-weight: bold; }
        .overlay .final-label { color: #888; margin-bottom: 30px; }
        .final-stats { display: flex; gap: 40px; margin-bottom: 30px; }
        
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }
        
        .difficulty-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn {
            padding: 10px 20px; background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2); border-radius: 10px;
            color: #fff; cursor: pointer;
        }
        .diff-btn.active { border-color: #e94560; background: rgba(233,69,96,0.2); }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← Back</a>
    
    <div class="header">
        <div class="secret-badge">🔮 SECRET GAME</div>
        <h1>⌨️ Typing Race</h1>
    </div>
    
    <div class="stats-row">
        <div class="stat">
            <div class="stat-value" id="wpm">0</div>
            <div class="stat-label">WPM</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="accuracy">100%</div>
            <div class="stat-label">Accuracy</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="time">0:00</div>
            <div class="stat-label">Time</div>
        </div>
    </div>
    
    <div class="difficulty-btns">
        <button class="diff-btn active" onclick="setDifficulty('easy')">Easy</button>
        <button class="diff-btn" onclick="setDifficulty('medium')">Medium</button>
        <button class="diff-btn" onclick="setDifficulty('hard')">Hard</button>
    </div>
    
    <div class="text-display" id="textDisplay"></div>
    
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>
    
    <div class="input-area">
        <input type="text" class="typing-input" id="typingInput" 
               placeholder="Start typing to begin..." autocomplete="off" autocapitalize="off">
    </div>
    
    <button class="btn" onclick="startGame()">New Text</button>
    
    <div class="overlay" id="resultOverlay">
        <h2>🏁 Race Complete!</h2>
        <div class="final-wpm" id="finalWpm">0</div>
        <div class="final-label">Words Per Minute</div>
        <div class="final-stats">
            <div class="stat">
                <div class="stat-value" id="finalAccuracy">100%</div>
                <div class="stat-label">Accuracy</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="finalTime">0:00</div>
                <div class="stat-label">Time</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="finalChars">0</div>
                <div class="stat-label">Characters</div>
            </div>
        </div>
        <button class="btn" onclick="startGame()">Race Again</button>
    </div>

    <script>
        const TEXTS = {
            easy: [
                "The quick brown fox jumps over the lazy dog.",
                "She sells sea shells by the sea shore.",
                "Pack my box with five dozen liquor jugs.",
                "How vexingly quick daft zebras jump.",
                "The five boxing wizards jump quickly."
            ],
            medium: [
                "Programming is the art of telling a computer what to do. It requires patience and logical thinking.",
                "Video games have become one of the most popular forms of entertainment in the modern world.",
                "The internet has changed how we communicate, work, and access information every single day.",
                "Learning to type quickly and accurately is an important skill in today's digital world.",
                "Music has the power to bring people together and evoke strong emotions in listeners."
            ],
            hard: [
                "The development of artificial intelligence presents both unprecedented opportunities and complex challenges for humanity's future.",
                "Quantum computing promises to revolutionize fields from cryptography to drug discovery, though practical applications remain years away.",
                "Climate change necessitates immediate action across all sectors of society, requiring unprecedented global cooperation and innovation.",
                "The intersection of biotechnology and information technology is creating new possibilities for personalized medicine and healthcare.",
                "Understanding the complexities of economic systems requires analyzing countless interconnected variables and human behaviors."
            ]
        };
        
        let difficulty = 'easy';
        let targetText = '';
        let typedText = '';
        let startTime = null;
        let timerInterval = null;
        let isComplete = false;
        let totalKeystrokes = 0;
        let correctKeystrokes = 0;
        
        function setDifficulty(diff) {
            difficulty = diff;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            startGame();
        }
        
        function startGame() {
            document.getElementById('resultOverlay').classList.add('hidden');
            
            // Pick random text
            const texts = TEXTS[difficulty];
            targetText = texts[Math.floor(Math.random() * texts.length)];
            typedText = '';
            startTime = null;
            isComplete = false;
            totalKeystrokes = 0;
            correctKeystrokes = 0;
            
            if (timerInterval) clearInterval(timerInterval);
            
            const input = document.getElementById('typingInput');
            input.value = '';
            input.disabled = false;
            input.focus();
            
            updateDisplay();
            updateStats();
        }
        
        function updateDisplay() {
            const display = document.getElementById('textDisplay');
            let html = '';
            
            for (let i = 0; i < targetText.length; i++) {
                if (i < typedText.length) {
                    if (typedText[i] === targetText[i]) {
                        html += `<span class="correct">${escapeHtml(targetText[i])}</span>`;
                    } else {
                        html += `<span class="incorrect">${escapeHtml(targetText[i])}</span>`;
                    }
                } else if (i === typedText.length) {
                    html += `<span class="current">${escapeHtml(targetText[i])}</span>`;
                } else {
                    html += `<span class="remaining">${escapeHtml(targetText[i])}</span>`;
                }
            }
            
            display.innerHTML = html;
            
            // Update progress
            const progress = (typedText.length / targetText.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }
        
        function updateStats() {
            if (!startTime) {
                document.getElementById('wpm').textContent = '0';
                document.getElementById('time').textContent = '0:00';
                document.getElementById('accuracy').textContent = '100%';
                return;
            }
            
            const elapsed = (Date.now() - startTime) / 1000;
            const mins = Math.floor(elapsed / 60);
            const secs = Math.floor(elapsed % 60);
            
            // Calculate WPM (words = characters / 5)
            const words = correctKeystrokes / 5;
            const wpm = elapsed > 0 ? Math.round((words / elapsed) * 60) : 0;
            
            // Calculate accuracy
            const accuracy = totalKeystrokes > 0 ? Math.round((correctKeystrokes / totalKeystrokes) * 100) : 100;
            
            document.getElementById('wpm').textContent = wpm;
            document.getElementById('time').textContent = mins + ':' + secs.toString().padStart(2, '0');
            document.getElementById('accuracy').textContent = accuracy + '%';
        }
        
        function gameComplete() {
            isComplete = true;
            clearInterval(timerInterval);
            
            const input = document.getElementById('typingInput');
            input.disabled = true;
            
            const elapsed = (Date.now() - startTime) / 1000;
            const mins = Math.floor(elapsed / 60);
            const secs = Math.floor(elapsed % 60);
            const words = correctKeystrokes / 5;
            const wpm = Math.round((words / elapsed) * 60);
            const accuracy = Math.round((correctKeystrokes / totalKeystrokes) * 100);
            
            document.getElementById('finalWpm').textContent = wpm;
            document.getElementById('finalAccuracy').textContent = accuracy + '%';
            document.getElementById('finalTime').textContent = mins + ':' + secs.toString().padStart(2, '0');
            document.getElementById('finalChars').textContent = targetText.length;
            
            document.getElementById('resultOverlay').classList.remove('hidden');
        }
        
        function escapeHtml(char) {
            if (char === ' ') return '&nbsp;';
            if (char === '<') return '&lt;';
            if (char === '>') return '&gt;';
            if (char === '&') return '&amp;';
            return char;
        }
        
        // Input handling
        document.getElementById('typingInput').addEventListener('input', (e) => {
            if (isComplete) return;
            
            const newTyped = e.target.value;
            
            // Start timer on first keystroke
            if (!startTime && newTyped.length > 0) {
                startTime = Date.now();
                timerInterval = setInterval(updateStats, 100);
            }
            
            // Count keystrokes
            if (newTyped.length > typedText.length) {
                totalKeystrokes++;
                const lastChar = newTyped[newTyped.length - 1];
                const expectedChar = targetText[newTyped.length - 1];
                if (lastChar === expectedChar) {
                    correctKeystrokes++;
                }
            }
            
            typedText = newTyped;
            updateDisplay();
            updateStats();
            
            // Check completion
            if (typedText === targetText) {
                gameComplete();
            }
        });
        
        // Prevent paste
        document.getElementById('typingInput').addEventListener('paste', (e) => {
            e.preventDefault();
        });
        
        // Start on load
        startGame();
    </script>
</body>
</html>
