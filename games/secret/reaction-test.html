<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reaction Test - Secret Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; color: #ffd700; }
        .secret-badge { background: linear-gradient(135deg, #9b59b6, #8e44ad); padding: 5px 15px; border-radius: 15px; font-size: 0.8rem; display: inline-block; margin-bottom: 10px; }
        
        .game-area {
            width: 100%; max-width: 500px; height: 300px;
            border-radius: 25px; display: flex;
            align-items: center; justify-content: center;
            cursor: pointer; transition: background 0.1s;
            font-size: 1.5rem; font-weight: bold;
            text-align: center; padding: 20px;
            user-select: none;
        }
        .game-area.waiting { background: #e94560; }
        .game-area.ready { background: #f39c12; }
        .game-area.go { background: #27ae60; }
        .game-area.too-early { background: #c0392b; }
        .game-area.result { background: rgba(255,255,255,0.1); }
        
        .results { margin-top: 30px; text-align: center; }
        .result-time { font-size: 4rem; font-weight: bold; color: #e94560; }
        .result-label { color: #888; font-size: 1rem; margin-top: 5px; }
        
        .history { margin-top: 30px; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .history-item {
            background: rgba(255,255,255,0.1); padding: 8px 15px;
            border-radius: 20px; font-size: 0.9rem;
        }
        .history-item.best { background: rgba(233,69,96,0.3); color: #e94560; }
        
        .stats-row { display: flex; gap: 40px; margin-top: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #ffd700; }
        .stat-label { font-size: 0.85rem; color: #888; }
        
        .btn {
            margin-top: 20px; padding: 15px 40px;
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; border: none; border-radius: 25px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        
        .back-btn {
            position: fixed; top: 20px; left: 20px;
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }
        
        .instructions { color: #888; font-size: 0.9rem; margin-top: 10px; }
    </style>
</head>
<body>
    <a href="../../index.html" class="back-btn">← Back</a>
    
    <div class="header">
        <div class="secret-badge">🔮 SECRET GAME</div>
        <h1>⚡ Reaction Test</h1>
        <p class="instructions">Click when the box turns GREEN!</p>
    </div>
    
    <div class="game-area waiting" id="gameArea" onclick="handleClick()">
        <span id="gameText">Click to Start</span>
    </div>
    
    <div class="results" id="results" style="display: none;">
        <div class="result-time" id="resultTime">0 ms</div>
        <div class="result-label" id="resultLabel">Reaction Time</div>
    </div>
    
    <div class="stats-row" id="statsRow" style="display: none;">
        <div class="stat">
            <div class="stat-value" id="bestTime">-</div>
            <div class="stat-label">Best</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="avgTime">-</div>
            <div class="stat-label">Average</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="attempts">0</div>
            <div class="stat-label">Attempts</div>
        </div>
    </div>
    
    <div class="history" id="history"></div>
    
    <button class="btn" onclick="resetGame()" id="resetBtn" style="display: none;">Reset Stats</button>

    <script>
        let state = 'idle'; // idle, waiting, ready, result
        let startTime = 0;
        let timeout = null;
        let results = [];
        
        const gameArea = document.getElementById('gameArea');
        const gameText = document.getElementById('gameText');
        
        function handleClick() {
            if (state === 'idle' || state === 'result') {
                startRound();
            } else if (state === 'waiting') {
                // Clicked too early!
                clearTimeout(timeout);
                state = 'result';
                gameArea.className = 'game-area too-early';
                gameText.textContent = '❌ Too Early! Click to try again';
            } else if (state === 'ready') {
                // Good click!
                const reactionTime = Date.now() - startTime;
                state = 'result';
                gameArea.className = 'game-area result';
                gameText.textContent = 'Click to continue';
                
                showResult(reactionTime);
            }
        }
        
        function startRound() {
            state = 'waiting';
            gameArea.className = 'game-area waiting';
            gameText.textContent = 'Wait for GREEN...';
            
            document.getElementById('results').style.display = 'none';
            
            // Random delay between 1.5 and 5 seconds
            const delay = 1500 + Math.random() * 3500;
            
            timeout = setTimeout(() => {
                state = 'ready';
                startTime = Date.now();
                gameArea.className = 'game-area go';
                gameText.textContent = 'CLICK NOW!';
            }, delay);
        }
        
        function showResult(time) {
            results.push(time);
            
            document.getElementById('results').style.display = 'block';
            document.getElementById('statsRow').style.display = 'flex';
            document.getElementById('resetBtn').style.display = 'block';
            
            document.getElementById('resultTime').textContent = time + ' ms';
            
            // Feedback based on time
            let label = 'Reaction Time';
            if (time < 200) label = '⚡ Lightning Fast!';
            else if (time < 250) label = '🔥 Excellent!';
            else if (time < 300) label = '👍 Good!';
            else if (time < 400) label = '😐 Average';
            else label = '🐢 Keep Practicing!';
            
            document.getElementById('resultLabel').textContent = label;
            
            updateStats();
            renderHistory();
        }
        
        function updateStats() {
            const best = Math.min(...results);
            const avg = Math.round(results.reduce((a, b) => a + b, 0) / results.length);
            
            document.getElementById('bestTime').textContent = best + ' ms';
            document.getElementById('avgTime').textContent = avg + ' ms';
            document.getElementById('attempts').textContent = results.length;
        }
        
        function renderHistory() {
            const container = document.getElementById('history');
            const best = Math.min(...results);
            
            container.innerHTML = results.slice(-10).map(r => 
                `<div class="history-item ${r === best ? 'best' : ''}">${r} ms</div>`
            ).join('');
        }
        
        function resetGame() {
            results = [];
            state = 'idle';
            gameArea.className = 'game-area waiting';
            gameText.textContent = 'Click to Start';
            document.getElementById('results').style.display = 'none';
            document.getElementById('statsRow').style.display = 'none';
            document.getElementById('resetBtn').style.display = 'none';
            document.getElementById('history').innerHTML = '';
        }
    </script>
</body>
</html>
