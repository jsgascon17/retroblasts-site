<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mine and Craft - Sandbox Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #87CEEB;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        #gameCanvas {
            display: block;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        .home-link {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.7;
            z-index: 200;
            transition: opacity 0.3s;
            text-shadow: 1px 1px 2px #000;
        }
        .home-link:hover { opacity: 1; }
        #hotbar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 5px;
            z-index: 100;
        }
        .hotbar-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            position: relative;
            background: rgba(0,0,0,0.3);
        }
        .hotbar-slot.selected { border-color: #fff; background: rgba(255,255,255,0.2); }
        .hotbar-slot .count {
            position: absolute;
            bottom: 2px;
            right: 4px;
            font-size: 12px;
            color: #fff;
            text-shadow: 1px 1px 1px #000;
        }
        .hotbar-slot .key {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 10px;
            color: #aaa;
        }
        #hud {
            position: fixed;
            top: 15px;
            right: 15px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
            font-size: 14px;
            text-align: right;
            z-index: 100;
        }
        #crafting {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #8B4513;
            display: none;
            z-index: 200;
            color: #fff;
        }
        #crafting h2 { margin-bottom: 15px; text-align: center; }
        .craft-recipe {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            margin: 5px 0;
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            cursor: pointer;
        }
        .craft-recipe:hover { background: rgba(255,255,255,0.2); }
        .craft-recipe.disabled { opacity: 0.5; cursor: not-allowed; }
        .controls-hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
            text-align: center;
            z-index: 100;
        }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">< Back</a>
    <canvas id="gameCanvas"></canvas>
    
    <div id="hotbar"></div>
    
    <div id="hud">
        <div>Day: <span id="dayCount">1</span></div>
        <div id="timeDisplay">☀️ Day</div>
    </div>
    
    <div class="controls-hint">
        WASD/Arrows: Move | Space: Jump | Click: Mine/Place | E: Crafting | 1-9: Select Item
    </div>
    
    <div id="crafting">
        <h2>⚒️ Crafting</h2>
        <div id="craftingRecipes"></div>
        <p style="text-align: center; margin-top: 15px; font-size: 12px; color: #888;">Press E to close</p>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // Game constants
        const TILE_SIZE = 32;
        const WORLD_WIDTH = 100;
        const WORLD_HEIGHT = 50;
        const GRAVITY = 0.5;
        const JUMP_FORCE = -12;
        const MOVE_SPEED = 5;
        
        // Block types
        const BLOCKS = {
            AIR: { id: 0, solid: false, emoji: '' },
            DIRT: { id: 1, solid: true, emoji: '🟫', color: '#8B4513', name: 'Dirt', hardness: 1 },
            GRASS: { id: 2, solid: true, emoji: '🟩', color: '#228B22', name: 'Grass', hardness: 1 },
            STONE: { id: 3, solid: true, emoji: '⬜', color: '#808080', name: 'Stone', hardness: 2 },
            WOOD: { id: 4, solid: true, emoji: '🪵', color: '#DEB887', name: 'Wood', hardness: 1 },
            LEAVES: { id: 5, solid: false, emoji: '🌿', color: '#32CD32', name: 'Leaves', hardness: 0.5 },
            COAL: { id: 6, solid: true, emoji: '⚫', color: '#2F2F2F', name: 'Coal Ore', hardness: 2 },
            IRON: { id: 7, solid: true, emoji: '🔘', color: '#C0C0C0', name: 'Iron Ore', hardness: 3 },
            GOLD: { id: 8, solid: true, emoji: '🟡', color: '#FFD700', name: 'Gold Ore', hardness: 3 },
            DIAMOND: { id: 9, solid: true, emoji: '💎', color: '#00CED1', name: 'Diamond Ore', hardness: 4 },
            PLANKS: { id: 10, solid: true, emoji: '🟨', color: '#DEB887', name: 'Planks', hardness: 1 },
            COBBLE: { id: 11, solid: true, emoji: '🪨', color: '#696969', name: 'Cobblestone', hardness: 2 },
            SAND: { id: 12, solid: true, emoji: '🟨', color: '#F4A460', name: 'Sand', hardness: 0.5 },
            WATER: { id: 13, solid: false, emoji: '🟦', color: 'rgba(30,144,255,0.6)', name: 'Water', hardness: -1 },
            BEDROCK: { id: 14, solid: true, emoji: '⬛', color: '#1a1a1a', name: 'Bedrock', hardness: -1 }
        };
        
        // Game state
        let world = [];
        let player = {
            x: WORLD_WIDTH * TILE_SIZE / 2,
            y: 0,
            vx: 0,
            vy: 0,
            width: 24,
            height: 48,
            onGround: false
        };
        
        let camera = { x: 0, y: 0 };
        let inventory = {};
        let hotbarSlots = [
            { block: 'DIRT', count: 0 },
            { block: 'STONE', count: 0 },
            { block: 'WOOD', count: 0 },
            { block: 'PLANKS', count: 0 },
            { block: 'COBBLE', count: 0 },
            { block: null, count: 0 },
            { block: null, count: 0 },
            { block: null, count: 0 },
            { block: null, count: 0 }
        ];
        let selectedSlot = 0;
        let craftingOpen = false;
        let dayTime = 0;
        let dayCount = 1;
        
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let mouseDown = false;
        let miningProgress = 0;
        let miningTarget = null;
        
        // Crafting recipes
        const RECIPES = [
            { result: 'PLANKS', count: 4, ingredients: { WOOD: 1 }, name: 'Planks' },
            { result: 'COBBLE', count: 1, ingredients: { STONE: 1 }, name: 'Cobblestone' }
        ];
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        function generateWorld() {
            world = [];
            for (let x = 0; x < WORLD_WIDTH; x++) {
                world[x] = [];
                // Generate terrain height using simple noise
                const surfaceY = Math.floor(WORLD_HEIGHT * 0.6 + Math.sin(x * 0.1) * 3);
                
                for (let y = 0; y < WORLD_HEIGHT; y++) {
                    if (y === WORLD_HEIGHT - 1) {
                        world[x][y] = BLOCKS.BEDROCK.id;
                    } else if (y > surfaceY + 15) {
                        // Deep underground - more ores
                        const rand = Math.random();
                        if (rand < 0.01) world[x][y] = BLOCKS.DIAMOND.id;
                        else if (rand < 0.03) world[x][y] = BLOCKS.GOLD.id;
                        else if (rand < 0.08) world[x][y] = BLOCKS.IRON.id;
                        else if (rand < 0.15) world[x][y] = BLOCKS.COAL.id;
                        else world[x][y] = BLOCKS.STONE.id;
                    } else if (y > surfaceY + 5) {
                        // Underground - stone with some ores
                        const rand = Math.random();
                        if (rand < 0.03) world[x][y] = BLOCKS.IRON.id;
                        else if (rand < 0.08) world[x][y] = BLOCKS.COAL.id;
                        else world[x][y] = BLOCKS.STONE.id;
                    } else if (y > surfaceY) {
                        // Just below surface - dirt
                        world[x][y] = BLOCKS.DIRT.id;
                    } else if (y === surfaceY) {
                        // Surface - grass
                        world[x][y] = BLOCKS.GRASS.id;
                    } else {
                        // Above ground - air (maybe tree)
                        world[x][y] = BLOCKS.AIR.id;
                    }
                }
                
                // Generate trees
                if (Math.random() < 0.1 && world[x][surfaceY] === BLOCKS.GRASS.id) {
                    const treeHeight = 4 + Math.floor(Math.random() * 3);
                    for (let ty = 1; ty <= treeHeight; ty++) {
                        if (surfaceY - ty >= 0) {
                            world[x][surfaceY - ty] = BLOCKS.WOOD.id;
                        }
                    }
                    // Leaves
                    for (let lx = -2; lx <= 2; lx++) {
                        for (let ly = -2; ly <= 0; ly++) {
                            const leafX = x + lx;
                            const leafY = surfaceY - treeHeight + ly;
                            if (leafX >= 0 && leafX < WORLD_WIDTH && leafY >= 0 && world[leafX]) {
                                if (world[leafX][leafY] === BLOCKS.AIR.id) {
                                    if (Math.random() > 0.2 || (lx === 0 && ly === 0)) {
                                        world[leafX][leafY] = BLOCKS.LEAVES.id;
                                    }
                                }
                            }
                        }
                    }
                }
            }
            
            // Find spawn point
            const spawnX = Math.floor(WORLD_WIDTH / 2);
            let foundSpawn = false;
            for (let y = 0; y < WORLD_HEIGHT; y++) {
                if (world[spawnX] && world[spawnX][y] !== undefined && 
                    world[spawnX][y] !== BLOCKS.AIR.id && world[spawnX][y] !== BLOCKS.LEAVES.id) {
                    player.x = spawnX * TILE_SIZE + TILE_SIZE / 2;
                    player.y = (y - 2) * TILE_SIZE;
                    foundSpawn = true;
                    break;
                }
            }
            // Fallback spawn if no ground found
            if (!foundSpawn) {
                player.x = spawnX * TILE_SIZE + TILE_SIZE / 2;
                player.y = WORLD_HEIGHT * 0.3 * TILE_SIZE;
            }
            // Initialize camera immediately to player position
            camera.x = player.x - window.innerWidth / 2;
            camera.y = player.y - window.innerHeight / 2;
        }
        
        function getBlockAt(x, y) {
            const tileX = Math.floor(x / TILE_SIZE);
            const tileY = Math.floor(y / TILE_SIZE);
            if (tileX < 0 || tileX >= WORLD_WIDTH || tileY < 0 || tileY >= WORLD_HEIGHT) {
                return BLOCKS.AIR;
            }
            const blockId = world[tileX][tileY];
            return Object.values(BLOCKS).find(b => b.id === blockId) || BLOCKS.AIR;
        }
        
        function setBlockAt(tileX, tileY, blockId) {
            if (tileX >= 0 && tileX < WORLD_WIDTH && tileY >= 0 && tileY < WORLD_HEIGHT) {
                world[tileX][tileY] = blockId;
            }
        }
        
        function checkCollision(x, y, w, h) {
            // Check all corners and edges
            const points = [
                {x: x, y: y},
                {x: x + w, y: y},
                {x: x, y: y + h},
                {x: x + w, y: y + h},
                {x: x + w/2, y: y},
                {x: x + w/2, y: y + h}
            ];
            
            for (const p of points) {
                const block = getBlockAt(p.x, p.y);
                if (block.solid) return true;
            }
            return false;
        }
        
        function updatePlayer() {
            // Movement
            if (keys['a'] || keys['arrowleft']) player.vx = -MOVE_SPEED;
            else if (keys['d'] || keys['arrowright']) player.vx = MOVE_SPEED;
            else player.vx = 0;
            
            // Jump
            if ((keys[' '] || keys['w'] || keys['arrowup']) && player.onGround) {
                player.vy = JUMP_FORCE;
                player.onGround = false;
            }
            
            // Apply gravity
            player.vy += GRAVITY;
            if (player.vy > 15) player.vy = 15;
            
            // Move X
            const newX = player.x + player.vx;
            if (!checkCollision(newX - player.width/2, player.y, player.width, player.height)) {
                player.x = newX;
            }
            
            // Move Y
            const newY = player.y + player.vy;
            if (!checkCollision(player.x - player.width/2, newY, player.width, player.height)) {
                player.y = newY;
                player.onGround = false;
            } else {
                if (player.vy > 0) {
                    // Landing
                    player.onGround = true;
                    // Snap to ground
                    player.y = Math.floor((player.y + player.height) / TILE_SIZE) * TILE_SIZE - player.height;
                }
                player.vy = 0;
            }
            
            // Keep in bounds
            player.x = Math.max(player.width/2, Math.min(WORLD_WIDTH * TILE_SIZE - player.width/2, player.x));
        }
        
        function updateCamera() {
            const targetX = player.x - canvas.width / 2;
            const targetY = player.y - canvas.height / 2;
            camera.x += (targetX - camera.x) * 0.1;
            camera.y += (targetY - camera.y) * 0.1;
            
            // Clamp camera
            camera.x = Math.max(0, Math.min(WORLD_WIDTH * TILE_SIZE - canvas.width, camera.x));
            camera.y = Math.max(0, Math.min(WORLD_HEIGHT * TILE_SIZE - canvas.height, camera.y));
        }
        
        function drawWorld() {
            // Sky gradient based on time
            const skyColors = getDaySkyColor();
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, skyColors.top);
            gradient.addColorStop(1, skyColors.bottom);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw sun or moon
            const celestialX = canvas.width * 0.8;
            const celestialY = 80 + Math.sin(dayTime * Math.PI * 2) * 50;
            if (dayTime < 0.25 || dayTime > 0.75) {
                // Sun
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(celestialX, celestialY, 40, 0, Math.PI * 2);
                ctx.fill();
            } else {
                // Moon
                ctx.fillStyle = '#F5F5F5';
                ctx.beginPath();
                ctx.arc(celestialX, celestialY, 30, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // Calculate visible tiles
            const startX = Math.max(0, Math.floor(camera.x / TILE_SIZE) - 1);
            const endX = Math.min(WORLD_WIDTH, Math.ceil((camera.x + canvas.width) / TILE_SIZE) + 1);
            const startY = Math.max(0, Math.floor(camera.y / TILE_SIZE) - 1);
            const endY = Math.min(WORLD_HEIGHT, Math.ceil((camera.y + canvas.height) / TILE_SIZE) + 1);
            
            // Draw blocks
            for (let x = startX; x < endX; x++) {
                if (!world[x]) continue;
                for (let y = startY; y < endY; y++) {
                    if (world[x][y] === undefined) continue;
                    const blockId = world[x][y];
                    if (blockId === BLOCKS.AIR.id) continue;
                    
                    const block = Object.values(BLOCKS).find(b => b.id === blockId);
                    if (!block) continue;
                    
                    const screenX = x * TILE_SIZE - camera.x;
                    const screenY = y * TILE_SIZE - camera.y;
                    
                    // Draw block
                    ctx.fillStyle = block.color;
                    ctx.fillRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                    
                    // Add some texture/shading
                    ctx.fillStyle = 'rgba(0,0,0,0.1)';
                    ctx.fillRect(screenX, screenY + TILE_SIZE - 4, TILE_SIZE, 4);
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(screenX, screenY, TILE_SIZE, 4);
                    
                    // Block outline
                    ctx.strokeStyle = 'rgba(0,0,0,0.3)';
                    ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                }
            }
        }
        
        function getDaySkyColor() {
            if (dayTime < 0.2 || dayTime > 0.8) {
                return { top: '#1a1a3e', bottom: '#2d2d5e' }; // Night
            } else if (dayTime < 0.3) {
                return { top: '#FF7F50', bottom: '#FFD700' }; // Sunrise
            } else if (dayTime > 0.7) {
                return { top: '#FF6347', bottom: '#FF8C00' }; // Sunset
            } else {
                return { top: '#87CEEB', bottom: '#E0F6FF' }; // Day
            }
        }
        
        function drawPlayer() {
            const screenX = player.x - camera.x;
            const screenY = player.y - camera.y;
            
            // Body
            ctx.fillStyle = '#3498db';
            ctx.fillRect(screenX - player.width/2, screenY, player.width, player.height * 0.6);
            
            // Legs
            ctx.fillStyle = '#2980b9';
            ctx.fillRect(screenX - player.width/2, screenY + player.height * 0.6, player.width, player.height * 0.4);
            
            // Head
            ctx.fillStyle = '#FFDAB9';
            ctx.fillRect(screenX - 8, screenY - 16, 16, 16);
            
            // Eyes
            ctx.fillStyle = '#000';
            ctx.fillRect(screenX - 5, screenY - 12, 3, 3);
            ctx.fillRect(screenX + 2, screenY - 12, 3, 3);
        }
        
        function drawBlockHighlight() {
            const worldX = mouseX + camera.x;
            const worldY = mouseY + camera.y;
            const tileX = Math.floor(worldX / TILE_SIZE);
            const tileY = Math.floor(worldY / TILE_SIZE);
            
            // Check if in range
            const playerTileX = Math.floor(player.x / TILE_SIZE);
            const playerTileY = Math.floor((player.y + player.height/2) / TILE_SIZE);
            const dist = Math.sqrt(Math.pow(tileX - playerTileX, 2) + Math.pow(tileY - playerTileY, 2));
            
            if (dist <= 5) {
                const screenX = tileX * TILE_SIZE - camera.x;
                const screenY = tileY * TILE_SIZE - camera.y;
                
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX, screenY, TILE_SIZE, TILE_SIZE);
                
                // Mining progress
                if (miningTarget && miningTarget.x === tileX && miningTarget.y === tileY) {
                    ctx.fillStyle = 'rgba(255,255,255,0.3)';
                    ctx.fillRect(screenX, screenY, TILE_SIZE * miningProgress, TILE_SIZE);
                }
            }
        }
        
        function handleMining() {
            if (!mouseDown) {
                miningProgress = 0;
                miningTarget = null;
                return;
            }
            
            const worldX = mouseX + camera.x;
            const worldY = mouseY + camera.y;
            const tileX = Math.floor(worldX / TILE_SIZE);
            const tileY = Math.floor(worldY / TILE_SIZE);
            
            // Check range
            const playerTileX = Math.floor(player.x / TILE_SIZE);
            const playerTileY = Math.floor((player.y + player.height/2) / TILE_SIZE);
            const dist = Math.sqrt(Math.pow(tileX - playerTileX, 2) + Math.pow(tileY - playerTileY, 2));
            
            if (dist > 5) return;
            
            const blockId = world[tileX]?.[tileY];
            const block = Object.values(BLOCKS).find(b => b.id === blockId);
            
            if (!block || block.id === BLOCKS.AIR.id || block.hardness < 0) return;
            
            // Check if target changed
            if (!miningTarget || miningTarget.x !== tileX || miningTarget.y !== tileY) {
                miningTarget = { x: tileX, y: tileY };
                miningProgress = 0;
            }
            
            // Mine
            miningProgress += 0.02 / (block.hardness || 1);
            
            if (miningProgress >= 1) {
                // Block broken!
                world[tileX][tileY] = BLOCKS.AIR.id;
                addToInventory(block);
                miningProgress = 0;
                miningTarget = null;
            }
        }
        
        function handlePlacing() {
            if (!mouseDown) return;
            
            const worldX = mouseX + camera.x;
            const worldY = mouseY + camera.y;
            const tileX = Math.floor(worldX / TILE_SIZE);
            const tileY = Math.floor(worldY / TILE_SIZE);
            
            // Check range
            const playerTileX = Math.floor(player.x / TILE_SIZE);
            const playerTileY = Math.floor((player.y + player.height/2) / TILE_SIZE);
            const dist = Math.sqrt(Math.pow(tileX - playerTileX, 2) + Math.pow(tileY - playerTileY, 2));
            
            if (dist > 5) return;
            
            // Check if air
            if (world[tileX]?.[tileY] !== BLOCKS.AIR.id) return;
            
            // Check if player would be inside block
            const blockLeft = tileX * TILE_SIZE;
            const blockRight = blockLeft + TILE_SIZE;
            const blockTop = tileY * TILE_SIZE;
            const blockBottom = blockTop + TILE_SIZE;
            
            const playerLeft = player.x - player.width/2;
            const playerRight = player.x + player.width/2;
            const playerTop = player.y;
            const playerBottom = player.y + player.height;
            
            if (playerRight > blockLeft && playerLeft < blockRight && 
                playerBottom > blockTop && playerTop < blockBottom) {
                return; // Would place inside player
            }
            
            // Get selected block
            const slot = hotbarSlots[selectedSlot];
            if (!slot.block || slot.count <= 0) return;
            
            const block = BLOCKS[slot.block];
            if (!block) return;
            
            // Place block
            world[tileX][tileY] = block.id;
            slot.count--;
            if (slot.count <= 0) {
                slot.count = 0;
            }
            
            updateHotbar();
        }
        
        function addToInventory(block) {
            const blockName = Object.keys(BLOCKS).find(k => BLOCKS[k].id === block.id);
            if (!blockName) return;
            
            // Special case: grass drops dirt
            const dropName = blockName === 'GRASS' ? 'DIRT' : blockName;
            // Stone drops cobblestone
            const finalDrop = dropName === 'STONE' ? 'COBBLE' : dropName;
            
            inventory[finalDrop] = (inventory[finalDrop] || 0) + 1;
            
            // Update hotbar if block is there
            for (let slot of hotbarSlots) {
                if (slot.block === finalDrop) {
                    slot.count = inventory[finalDrop];
                }
            }
            
            // Or add to empty slot
            if (!hotbarSlots.find(s => s.block === finalDrop)) {
                const emptySlot = hotbarSlots.find(s => !s.block);
                if (emptySlot) {
                    emptySlot.block = finalDrop;
                    emptySlot.count = inventory[finalDrop];
                }
            }
            
            updateHotbar();
        }
        
        function updateHotbar() {
            const hotbar = document.getElementById('hotbar');
            hotbar.innerHTML = '';
            
            hotbarSlots.forEach((slot, i) => {
                const div = document.createElement('div');
                div.className = 'hotbar-slot' + (i === selectedSlot ? ' selected' : '');
                div.onclick = () => { selectedSlot = i; updateHotbar(); };
                
                const key = document.createElement('span');
                key.className = 'key';
                key.textContent = i + 1;
                div.appendChild(key);
                
                if (slot.block && BLOCKS[slot.block]) {
                    div.innerHTML += BLOCKS[slot.block].emoji;
                    if (slot.count > 0) {
                        const count = document.createElement('span');
                        count.className = 'count';
                        count.textContent = slot.count;
                        div.appendChild(count);
                    }
                }
                
                hotbar.appendChild(div);
            });
        }
        
        function updateDayNight() {
            dayTime += 0.0001; // Slow day/night cycle
            if (dayTime >= 1) {
                dayTime = 0;
                dayCount++;
                document.getElementById('dayCount').textContent = dayCount;
            }
            
            const timeDisplay = document.getElementById('timeDisplay');
            if (dayTime < 0.25 || dayTime > 0.75) {
                timeDisplay.textContent = '🌙 Night';
            } else {
                timeDisplay.textContent = '☀️ Day';
            }
        }
        
        function showCrafting() {
            craftingOpen = !craftingOpen;
            document.getElementById('crafting').style.display = craftingOpen ? 'block' : 'none';
            
            if (craftingOpen) {
                renderCraftingMenu();
            }
        }
        
        function renderCraftingMenu() {
            const container = document.getElementById('craftingRecipes');
            container.innerHTML = '';
            
            RECIPES.forEach(recipe => {
                const canCraft = Object.entries(recipe.ingredients).every(([item, count]) => 
                    (inventory[item] || 0) >= count
                );
                
                const div = document.createElement('div');
                div.className = 'craft-recipe' + (canCraft ? '' : ' disabled');
                
                // Ingredients
                let ingredientStr = Object.entries(recipe.ingredients)
                    .map(([item, count]) => count + 'x ' + BLOCKS[item].emoji)
                    .join(' + ');
                
                div.innerHTML = ingredientStr + ' → ' + recipe.count + 'x ' + BLOCKS[recipe.result].emoji + ' ' + recipe.name;
                
                if (canCraft) {
                    div.onclick = () => craft(recipe);
                }
                
                container.appendChild(div);
            });
        }
        
        function craft(recipe) {
            // Check ingredients
            for (const [item, count] of Object.entries(recipe.ingredients)) {
                if ((inventory[item] || 0) < count) return;
            }
            
            // Consume ingredients
            for (const [item, count] of Object.entries(recipe.ingredients)) {
                inventory[item] -= count;
                // Update hotbar
                const slot = hotbarSlots.find(s => s.block === item);
                if (slot) slot.count = inventory[item];
            }
            
            // Give result
            inventory[recipe.result] = (inventory[recipe.result] || 0) + recipe.count;
            
            // Update or add to hotbar
            const existingSlot = hotbarSlots.find(s => s.block === recipe.result);
            if (existingSlot) {
                existingSlot.count = inventory[recipe.result];
            } else {
                const emptySlot = hotbarSlots.find(s => !s.block || s.count === 0);
                if (emptySlot) {
                    emptySlot.block = recipe.result;
                    emptySlot.count = inventory[recipe.result];
                }
            }
            
            updateHotbar();
            renderCraftingMenu();
        }
        
        function gameLoop() {
            updatePlayer();
            updateCamera();
            updateDayNight();
            handleMining();
            
            drawWorld();
            drawPlayer();
            drawBlockHighlight();
            
            requestAnimationFrame(gameLoop);
        }
        
        // Input handlers
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            
            // Number keys for hotbar
            if (e.key >= '1' && e.key <= '9') {
                selectedSlot = parseInt(e.key) - 1;
                updateHotbar();
            }
            
            // Crafting
            if (e.key.toLowerCase() === 'e') {
                showCrafting();
            }
        });
        
        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });
        
        canvas.addEventListener('mousemove', e => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        
        canvas.addEventListener('mousedown', e => {
            mouseDown = true;
            
            // Right click to place
            if (e.button === 2) {
                handlePlacing();
            }
        });
        
        canvas.addEventListener('mouseup', () => {
            mouseDown = false;
            miningProgress = 0;
        });
        
        canvas.addEventListener('contextmenu', e => {
            e.preventDefault();
            handlePlacing();
        });
        
        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            mouseDown = true;
        });
        
        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
        });
        
        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            mouseDown = false;
        });
        
        // Initialize
        function init() {
            resize();
            console.log('Generating world...');
            generateWorld();
            console.log('World generated. Player at:', player.x, player.y);
            console.log('World[50][20]:', world[50] ? world[50][20] : 'undefined');
            updateHotbar();
            // Force camera to player
            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;
            console.log('Camera at:', camera.x, camera.y);
            gameLoop();
        }
        
        window.addEventListener('resize', resize);
        window.addEventListener('load', init);
    </script>
</body>
</html>
