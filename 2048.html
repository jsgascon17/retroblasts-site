<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { font-size: 3rem; color: #ffd700; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); margin-bottom: 10px; }
        .back-link { color: #98FB98; text-decoration: none; margin-bottom: 15px; }
        .back-link:hover { text-decoration: underline; }

        .game-header { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .score-box { background: rgba(0,0,0,0.4); padding: 15px 25px; border-radius: 10px; text-align: center; border: 2px solid #ffd700; }
        .score-label { font-size: 0.8rem; color: #98FB98; text-transform: uppercase; }
        .score-value { font-size: 1.8rem; font-weight: bold; color: #ffd700; }

        .game-container { position: relative; }
        .grid { background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; border: 3px solid #ffd700; }
        .tile { width: 80px; height: 80px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; background: rgba(255,255,255,0.1); transition: all 0.15s ease; }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #fff; }
        .tile-16 { background: #f59563; color: #fff; }
        .tile-32 { background: #f67c5f; color: #fff; }
        .tile-64 { background: #f65e3b; color: #fff; }
        .tile-128 { background: #edcf72; color: #fff; font-size: 1.5rem; }
        .tile-256 { background: #edcc61; color: #fff; font-size: 1.5rem; }
        .tile-512 { background: #edc850; color: #fff; font-size: 1.5rem; }
        .tile-1024 { background: #edc53f; color: #fff; font-size: 1.3rem; }
        .tile-2048 { background: #edc22e; color: #fff; font-size: 1.3rem; box-shadow: 0 0 30px #ffd700; }
        .tile-super { background: #3c3a32; color: #fff; font-size: 1rem; }

        .controls { margin-top: 20px; color: #98FB98; text-align: center; }
        .btn { padding: 12px 30px; font-size: 1rem; background: linear-gradient(135deg, #228B22, #32CD32); color: #fff; border: 2px solid #ffd700; border-radius: 25px; cursor: pointer; margin: 5px; transition: all 0.3s; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(255,215,0,0.4); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2.5rem; color: #ffd700; margin-bottom: 20px; }
        .overlay p { color: #98FB98; margin-bottom: 15px; font-size: 1.2rem; }

        .leaderboard-form { margin: 20px 0; padding: 20px; background: rgba(50,205,50,0.1); border-radius: 15px; border: 2px solid #32CD32; }
        .leaderboard-form input { padding: 10px 15px; border-radius: 20px; border: 2px solid #32CD32; background: rgba(0,0,0,0.5); color: #fff; font-size: 1rem; width: 150px; margin-right: 10px; }
        #leaderboardMsg { margin-top: 10px; min-height: 1.2em; }

        .mobile-controls { display: none; margin-top: 20px; }
        .mobile-btn { width: 60px; height: 60px; font-size: 1.5rem; background: rgba(255,215,0,0.3); border: 2px solid #ffd700; border-radius: 10px; color: #fff; cursor: pointer; }

        @media (max-width: 400px) {
            .tile { width: 65px; height: 65px; font-size: 1.4rem; }
            .tile-128, .tile-256, .tile-512 { font-size: 1.2rem; }
            .tile-1024, .tile-2048 { font-size: 1rem; }
        }
        @media (pointer: coarse) {
            .mobile-controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; width: 200px; }
            .mobile-controls .spacer { visibility: hidden; }
        }
    </style>
<script src="js/duel.js"></script>
<script src="js/victory.js"></script>
<script src="js/activity.js"></script>
<script src="js/pets.js"></script>
</head>
<body>
    <h1>2048</h1>
    <a href="index.html" class="back-link">&larr; Back to Arcade</a>

    <div class="game-header">
        <div class="score-box">
            <div class="score-label">Score</div>
            <div class="score-value" id="score">0</div>
        </div>
        <div class="score-box">
            <div class="score-label">Best</div>
            <div class="score-value" id="best">0</div>
        </div>
        <button class="btn" onclick="newGame()">New Game</button>
    </div>

    <div class="game-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="controls">
        <p>Use arrow keys or swipe to move tiles</p>
        <p>Combine matching numbers to reach 2048!</p>
    </div>

    <div class="mobile-controls">
        <div class="spacer"></div>
        <button class="mobile-btn" onclick="move('up')">&#9650;</button>
        <div class="spacer"></div>
        <button class="mobile-btn" onclick="move('left')">&#9664;</button>
        <button class="mobile-btn" onclick="move('down')">&#9660;</button>
        <button class="mobile-btn" onclick="move('right')">&#9654;</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h2>Game Over!</h2>
        <p>Final Score: <span id="finalScore">0</span></p>
        <p id="coinsEarnedDisplay" style="color: #ffd700;">+<span id="coinsEarned">0</span> Coins</p>
        <div class="leaderboard-form">
            <p style="color: #32CD32; margin-bottom: 10px;">Submit to Leaderboard:</p>
            <input type="text" id="playerName" placeholder="Your name" maxlength="15">
            <button class="btn" id="submitScoreBtn">Submit</button>
            <p id="leaderboardMsg"></p>
        </div>
        <button class="btn" id="saveReplayBtn" style="margin-bottom: 10px; background: linear-gradient(135deg, #8b5cf6, #7c3aed);" onclick="saveReplay()">💾 Save Replay</button>
        <button class="btn" onclick="newGame()">Play Again</button>
    </div>

    <!-- Win Overlay -->
    <div class="overlay hidden" id="winOverlay">
        <h2>You Win! 🎉</h2>
        <p>You reached 2048!</p>
        <p>Score: <span id="winScore">0</span></p>
        <button class="btn" onclick="continueGame()">Keep Playing</button>
        <button class="btn" onclick="newGame()">New Game</button>
    </div>

    <script>
        // Tournament Mode
        const urlParams = new URLSearchParams(window.location.search);
        const tournamentId = urlParams.get('tournament') ? parseInt(urlParams.get('tournament')) : null;
        if (tournamentId) {
            const banner = document.createElement('div');
            banner.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 1000;';
            banner.innerHTML = '&#127942; TOURNAMENT MODE <a href="tournaments.html" style="color: #000; margin-left: 15px;">View</a>';
            document.body.prepend(banner);
            document.body.style.paddingTop = '40px';
        }

        const gridEl = document.getElementById('grid');
        const scoreEl = document.getElementById('score');
        const bestEl = document.getElementById('best');

        let grid = [];
        let score = 0;
        let replayFrames = [];
        let gameStartTime = 0;
        let best = parseInt(localStorage.getItem('2048Best')) || 0;
        let gameOver = false;
            replayFrames = [];
            gameStartTime = Date.now();
        let won = false;
        let continueAfterWin = false;

        bestEl.textContent = best;

        function init() {
            grid = Array(4).fill(null).map(() => Array(4).fill(0));
            score = 0;
            gameOver = false;
            replayFrames = [];
            gameStartTime = Date.now();
            won = false;
            continueAfterWin = false;
            scoreEl.textContent = '0';
            addRandomTile();
            addRandomTile();
            render();

            // Record frame for replay
            replayFrames.push({
                t: Date.now() - gameStartTime,
                grid: JSON.parse(JSON.stringify(grid)),
                score: score,
                move: dir
            });
        }

        function addRandomTile() {
            const empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) empty.push({r, c});
                }
            }
            if (empty.length === 0) return;
            const {r, c} = empty[Math.floor(Math.random() * empty.length)];
            grid[r][c] = Math.random() < 0.9 ? 2 : 4;
        }

        function render() {
            gridEl.innerHTML = '';
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    const tile = document.createElement('div');
                    const val = grid[r][c];
                    tile.className = 'tile' + (val ? ' tile-' + (val > 2048 ? 'super' : val) : '');
                    tile.textContent = val || '';
                    gridEl.appendChild(tile);
                }
            }
        }

        function slide(row) {
            let arr = row.filter(x => x !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) {
                    arr[i] *= 2;
                    score += arr[i];
                    if (arr[i] === 2048 && !won && !continueAfterWin) {
                        won = true;
                        setTimeout(showWin, 200);
                    }
                    arr[i + 1] = 0;
                }
            }
            arr = arr.filter(x => x !== 0);
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function move(dir) {
            if (gameOver) return;

            let moved = false;
            const oldGrid = JSON.stringify(grid);

            if (dir === 'left') {
                for (let r = 0; r < 4; r++) grid[r] = slide(grid[r]);
            } else if (dir === 'right') {
                for (let r = 0; r < 4; r++) grid[r] = slide(grid[r].reverse()).reverse();
            } else if (dir === 'up') {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[0][c], grid[1][c], grid[2][c], grid[3][c]];
                    col = slide(col);
                    for (let r = 0; r < 4; r++) grid[r][c] = col[r];
                }
            } else if (dir === 'down') {
                for (let c = 0; c < 4; c++) {
                    let col = [grid[3][c], grid[2][c], grid[1][c], grid[0][c]];
                    col = slide(col);
                    for (let r = 0; r < 4; r++) grid[3-r][c] = col[r];
                }
            }

            if (JSON.stringify(grid) !== oldGrid) {
                addRandomTile();
                scoreEl.textContent = score;
                if (score > best) {
                    if (typeof VictoryEffects !== "undefined") VictoryEffects.newHighScore();
                    best = score;
                    bestEl.textContent = best;
                    localStorage.setItem('2048Best', best);
                }
            }

            render();

            // Record frame for replay
            replayFrames.push({
                t: Date.now() - gameStartTime,
                grid: JSON.parse(JSON.stringify(grid)),
                score: score,
                move: dir
            });

            if (!canMove()) {
                gameOver = true;
                setTimeout(showGameOver, 500);
            }
        }

        function canMove() {
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (grid[r][c] === 0) return true;
                    if (c < 3 && grid[r][c] === grid[r][c+1]) return true;
                    if (r < 3 && grid[r][c] === grid[r+1][c]) return true;
                }
            }
            return false;
        }

        function showGameOver() {
            // Add XP to pet
            if (typeof PetSystem !== "undefined" && PetSystem.loaded) {
                PetSystem.addPetXP(Math.max(5, Math.floor(score / 20)));
            }
            document.getElementById('finalScore').textContent = score;

            // Submit duel score if in a challenge
            if (typeof DuelSystem !== "undefined" && DuelSystem.isInDuel()) {
                DuelSystem.submitScore(score);
            }
            document.getElementById('gameOverOverlay').classList.remove('hidden');

            // Award coins on server (if logged in)
            fetch('api/game-rewards.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game: '2048', score: score })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    document.getElementById('coinsEarned').textContent = data.coinsEarned;
                    document.getElementById('coinsEarnedDisplay').style.display = 'block';
                } else {
                    document.getElementById('coinsEarnedDisplay').innerHTML = '<span style="color: #888;">Log in to earn coins!</span>';
                }
            }).catch(() => {
                document.getElementById('coinsEarnedDisplay').style.display = 'none';
            });
            const submitBtn = document.getElementById('submitScoreBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
            document.getElementById('leaderboardMsg').textContent = '';
            const saved = localStorage.getItem('arcadePlayerName');
            if (saved) document.getElementById('playerName').value = saved;
        }

        function showWin() {
            document.getElementById('winScore').textContent = score;
            document.getElementById('winOverlay').classList.remove('hidden');
        }

        function continueGame() {
            continueAfterWin = true;
            document.getElementById('winOverlay').classList.add('hidden');
        }

        function newGame() {
            document.getElementById('gameOverOverlay').classList.add('hidden');
            document.getElementById('winOverlay').classList.add('hidden');
            init();
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault();
                const dir = e.key.replace('Arrow', '').toLowerCase();
                move(dir);
            }
        });

        // Touch/swipe controls
        let touchStartX, touchStartY;
        document.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        document.addEventListener('touchend', e => {
            if (!touchStartX || !touchStartY) return;
            const dx = e.changedTouches[0].clientX - touchStartX;
            const dy = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(dx) < 30 && Math.abs(dy) < 30) return;
            if (Math.abs(dx) > Math.abs(dy)) {
                move(dx > 0 ? 'right' : 'left');
            } else {
                move(dy > 0 ? 'down' : 'up');
            }
            touchStartX = touchStartY = null;
        });

        // Leaderboard submission
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const playerName = document.getElementById('playerName').value.trim() || 'Anonymous';
            const playerScore = score;
            const msgEl = document.getElementById('leaderboardMsg');

            localStorage.setItem('arcadePlayerName', playerName);
            this.disabled = true;
            this.textContent = '...';

            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: '2048', name: playerName, score: playerScore })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#32CD32';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    this.textContent = 'Done!';

                    if (tournamentId) {
                        fetch('tournament.php', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'submit', tournamentId, name: playerName, score: playerScore })
                        }).then(r => r.json()).then(t => { if (t.success) msgEl.textContent += ' | T#' + t.rank; }).catch(() => {});
                    }
                } else { throw new Error(data.error); }
            } catch (error) {
                msgEl.style.color = '#ff6b6b';
                msgEl.textContent = 'Failed. Try again!';
                this.disabled = false;
                this.textContent = 'Submit';
            }
        });

        init();
        async function saveReplay() {
            const btn = document.getElementById("saveReplayBtn");
            btn.disabled = true;
            btn.textContent = "Saving...";
            try {
                const duration = Math.floor((Date.now() - gameStartTime) / 1000);
                const resp = await fetch("api/replays.php", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: "save",
                        game: "2048",
                        score: score,
                        duration: duration,
                        frames: replayFrames
                    })
                });
                const data = await resp.json();
                if (data.success) {
                    btn.textContent = "✓ Saved!";
                    btn.style.background = "#22c55e";
                } else {
                    btn.textContent = data.error || "Error";
                    btn.style.background = "#ef4444";
                }
            } catch (e) {
                btn.textContent = "Error saving";
                btn.style.background = "#ef4444";
            }
        }
    </script>
</body>
</html>
