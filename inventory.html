<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Segoe UI", Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .header h1 { font-size: 2rem; }
        .back-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        
        .coins-display {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            padding: 10px 25px;
            border-radius: 25px;
            font-weight: bold;
            color: #000;
            font-size: 1.1rem;
        }
        
        .login-prompt {
            text-align: center;
            padding: 60px 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
        }
        .login-prompt h2 { margin-bottom: 15px; }
        .login-prompt p { color: #888; margin-bottom: 25px; }
        .login-prompt .btn {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }
        
        .inventory-section {
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
        }
        .inventory-section h2 {
            color: #ffd700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }
        
        .inventory-item {
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px 15px;
            text-align: center;
            transition: all 0.3s;
        }
        .inventory-item:hover {
            border-color: #ffd700;
            transform: translateY(-3px);
        }
        .inventory-item .icon { font-size: 2.5rem; margin-bottom: 10px; }
        .inventory-item .count {
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
        }
        .inventory-item .name {
            font-size: 0.85rem;
            color: #aaa;
            margin-bottom: 12px;
        }
        .inventory-item button {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            color: #fff;
        }
        .inventory-item button:hover { transform: scale(1.05); }
        .inventory-item button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .inventory-item.basic button { background: linear-gradient(135deg, #60a5fa, #3b82f6); }
        .inventory-item.premium button { background: linear-gradient(135deg, #a855f7, #7c3aed); }
        .inventory-item.legendary button { background: linear-gradient(135deg, #fbbf24, #f59e0b); color: #000; }
        .inventory-item.booster button { background: linear-gradient(135deg, #4ade80, #22c55e); color: #000; }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .empty-state .icon { font-size: 3rem; margin-bottom: 15px; }
        .empty-state a { color: #ffd700; }
        
        .active-boosts {
            background: linear-gradient(135deg, rgba(74,222,128,0.1), rgba(34,197,94,0.05));
            border-color: rgba(74,222,128,0.3);
        }
        .active-boosts h2 { color: #4ade80; }
        .boost-active {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        .boost-active .icon { font-size: 2rem; }
        .boost-active .info { flex: 1; }
        .boost-active .name { font-weight: bold; color: #4ade80; }
        .boost-active .timer { color: #888; font-size: 0.9rem; }
        
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            text-align: center;
            animation: popIn 0.3s ease;
        }
        @keyframes popIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .modal-content .icon { font-size: 5rem; margin-bottom: 20px; }
        .modal-content .title { font-size: 1.5rem; font-weight: bold; color: #ffd700; margin-bottom: 10px; }
        .modal-content .desc { color: #aaa; margin-bottom: 25px; }
        .modal-content button {
            padding: 12px 40px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        
        .result-common { color: #94a3b8; }
        .result-uncommon { color: #4ade80; }
        .result-rare { color: #60a5fa; }
        .result-epic { color: #a855f7; }
        .result-legendary { color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎒 Inventory</h1>
            <div style="display: flex; gap: 15px; align-items: center;">
                <div class="coins-display">🪙 <span id="coinCount">0</span></div>
                <a href="index.html" class="back-btn">← Back</a>
            </div>
        </div>
        
        <div id="loginPrompt" class="login-prompt" style="display: none;">
            <h2>🔐 Login Required</h2>
            <p>Sign in to view your inventory!</p>
            <a href="login.html" class="btn">Login / Register</a>
        </div>
        
        <div id="mainContent" style="display: none;">
            <div class="inventory-section active-boosts" id="activeBoostsSection" style="display: none;">
                <h2>⚡ Active Boosts</h2>
                <div id="activeBoostsList"></div>
            </div>
            
            <div class="inventory-section">
                <h2>🔑 Keys</h2>
                <div class="items-grid" id="keysGrid"></div>
            </div>
            
            <div class="inventory-section">
                <h2>🔒 Locked Crates</h2>
                <div class="items-grid" id="cratesGrid"></div>
            </div>

            <div class="inventory-section">
                <h2 style="display: flex; justify-content: space-between; align-items: center;">📦 Loot Boxes <button id="openAllBtn" onclick="openAllBoxes()" style="font-size: 0.8rem; padding: 8px 16px; background: linear-gradient(135deg, #ffd700, #ff8c00); color: #000; border: none; border-radius: 15px; cursor: pointer; font-weight: bold;">Open All</button></h2>
                <div class="items-grid" id="lootboxGrid"></div>
            </div>
            
            <div class="inventory-section">
                <h2>🚀 Boosters</h2>
                <div class="items-grid" id="boosterGrid"></div>
            </div>
            
            <div class="inventory-section">
                <h2>🎟️ Consumables</h2>
                <div class="items-grid" id="consumableGrid"></div>
            </div>
            
            <div class="inventory-section">
                <h2>🃏 Trading Cards</h2>
                <div class="items-grid" id="cardsGrid"></div>
            </div>
        </div>
    </div>
    
    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="icon" id="resultIcon">🎉</div>
            <div class="title" id="resultTitle">You got:</div>
            <div class="desc" id="resultDesc"></div>
            <button onclick="closeModal()">Awesome!</button>
        </div>
    </div>
    
    <script>
        let userData = null;
        
        async function init() {
            try {
                const authResp = await fetch("api/auth.php?action=check", { credentials: "include" });
                const authData = await authResp.json();
                
                if (!authData.success || !authData.user) {
                    document.getElementById("loginPrompt").style.display = "block";
                    return;
                }
                
                document.getElementById("mainContent").style.display = "block";
                
                const invResp = await fetch("api/shop.php?action=inventory", { credentials: "include" });
                userData = await invResp.json();
                
                updateDisplay();
            } catch (e) {
                console.error("Failed to load:", e);
            }
        }
        
        function updateDisplay() {
            document.getElementById("coinCount").textContent = (userData.coins || 0).toLocaleString();
            renderKeys();
            renderLockedCrates();
            renderLootboxes();
            renderBoosters();
            renderConsumables();
            renderTradingCards();
            renderActiveBoosts();
        }
        
        function renderKeys() {
            var grid = document.getElementById("keysGrid");
            var keys = userData.inventory && userData.inventory.keys ? userData.inventory.keys : {};
            
            var keyInfo = {
                bronze_key: { icon: "🗝️", name: "Bronze Key", color: "#cd7f32" },
                silver_key: { icon: "🔑", name: "Silver Key", color: "#c0c0c0" },
                gold_key: { icon: "🔐", name: "Gold Key", color: "#ffd700" }
            };
            
            var html = "";
            
            for (var type in keys) {
                var count = keys[type];
                if (count > 0 && keyInfo[type]) {
                    html += '<div class="inventory-item" style="border-color: ' + keyInfo[type].color + '40;">' +
                        '<div class="icon">' + keyInfo[type].icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name">' + keyInfo[type].name + '</div>' +
                        '</div>';
                }
            }
            
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">🔑</div><p>No keys yet. Win them from loot boxes!</p></div>';
        }
        
        function renderLockedCrates() {
            var grid = document.getElementById("cratesGrid");
            var crates = userData.inventory && userData.inventory.lockedCrates ? userData.inventory.lockedCrates : [];
            
            if (crates.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">🔒</div><p>No locked crates yet.</p></div>';
                return;
            }
            
            var crateInfo = {
                bronze_crate: { icon: "📦", name: "Bronze Crate", key: "bronze_key", color: "#cd7f32" },
                silver_crate: { icon: "🎁", name: "Silver Crate", key: "silver_key", color: "#c0c0c0" },
                gold_crate: { icon: "👑", name: "Gold Crate", key: "gold_key", color: "#ffd700" }
            };
            
            var counts = {};
            crates.forEach(function(c) { counts[c] = (counts[c] || 0) + 1; });
            
            var keys = userData.inventory && userData.inventory.keys ? userData.inventory.keys : {};
            
            var html = "";
            for (var type in counts) {
                var count = counts[type];
                if (count > 0 && crateInfo[type]) {
                    var info = crateInfo[type];
                    var hasKey = (keys[info.key] || 0) > 0;
                    html += '<div class="inventory-item" style="border-color: ' + info.color + '40;">' +
                        '<div class="icon">' + info.icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name">' + info.name + '</div>' +
                        '<button onclick="openCrate(\'' + type + '\')" style="background: linear-gradient(135deg, ' + info.color + ', ' + info.color + '99); color: #fff;" ' + (hasKey ? '' : 'disabled') + '>' +
                        (hasKey ? '🔓 Unlock' : '🔒 Need Key') +
                        '</button></div>';
                }
            }
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">🔒</div><p>No locked crates.</p></div>';
        }
        
        function renderLootboxes() {
            var grid = document.getElementById("lootboxGrid");
            var boxes = userData.inventory && userData.inventory.lootboxes ? userData.inventory.lootboxes : [];
            
            if (boxes.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">📦</div><p>No loot boxes. <a href="shop.html">Buy some!</a></p></div>';
                return;
            }
            
            var counts = {};
            boxes.forEach(function(b) { counts[b] = (counts[b] || 0) + 1; });
            
            var info = {
                basic: { icon: "📦", name: "Basic Box" },
                premium: { icon: "🎁", name: "Premium Box" },
                legendary: { icon: "👑", name: "Legendary Box" }
            };
            
            var html = "";
            for (var type in counts) {
                var count = counts[type];
                if (count > 0 && info[type]) {
                    html += '<div class="inventory-item ' + type + '">' +
                        '<div class="icon">' + info[type].icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name">' + info[type].name + '</div>' +
                        '<button onclick="openBox(\'' + type + '\')">Open</button>' +
                        '</div>';
                }
            }
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">📦</div><p>No loot boxes.</p></div>';
        }
        
        function renderBoosters() {
            var grid = document.getElementById("boosterGrid");
            var boosters = userData.inventory && userData.inventory.boosters ? userData.inventory.boosters : [];
            
            if (boosters.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">⚡</div><p>No boosters. Win them from loot boxes!</p></div>';
                return;
            }
            
            var counts = {};
            boosters.forEach(function(b) { counts[b] = (counts[b] || 0) + 1; });
            
            var info = {
                xp_2x: { icon: "⚡", name: "2x XP (1hr)" },
                coins_2x: { icon: "🪙", name: "2x Coins (1hr)" }
            };
            
            var html = "";
            for (var type in counts) {
                var count = counts[type];
                if (count > 0 && info[type]) {
                    html += '<div class="inventory-item booster">' +
                        '<div class="icon">' + info[type].icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name">' + info[type].name + '</div>' +
                        '<button onclick="activateBooster(\'' + type + '\')">Activate</button>' +
                        '</div>';
                }
            }
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">⚡</div><p>No boosters.</p></div>';
        }
        
        function renderConsumables() {
            var grid = document.getElementById("consumableGrid");
            var consumables = userData.inventory && userData.inventory.consumables ? userData.inventory.consumables : {};
            
            var consumableInfo = {
                reroll_token: { icon: "🔄", name: "Reroll Token" },
                extra_life: { icon: "❤️", name: "Extra Life" },
                score_2x: { icon: "✖️", name: "2x Score" },
                luck_boost: { icon: "🍀", name: "Luck Boost" },
                tournament_ticket: { icon: "🎫", name: "Tournament Ticket" },
                gift_box: { icon: "🎁", name: "Gift Box" }
            };
            
            var html = "";
            
            for (var type in consumables) {
                var count = consumables[type];
                if (count > 0 && consumableInfo[type]) {
                    html += '<div class="inventory-item">' +
                        '<div class="icon">' + consumableInfo[type].icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name">' + consumableInfo[type].name + '</div>' +
                        '</div>';
                }
            }
            
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">🎟️</div><p>No consumables yet.</p></div>';
        }
        
        function renderTradingCards() {
            var grid = document.getElementById("cardsGrid");
            var cards = userData.inventory && userData.inventory.tradingCards ? userData.inventory.tradingCards : {};
            
            var cardInfo = {
                cookie_bronze: { icon: "🍪", name: "Cookie Bronze", rarity: "common" },
                cookie_silver: { icon: "🍪", name: "Cookie Silver", rarity: "uncommon" },
                cookie_gold: { icon: "🍪", name: "Cookie Gold", rarity: "rare" },
                snake_bronze: { icon: "🐍", name: "Snake Bronze", rarity: "common" },
                snake_silver: { icon: "🐍", name: "Snake Silver", rarity: "uncommon" },
                snake_gold: { icon: "🐍", name: "Snake Gold", rarity: "rare" },
                arcade_bronze: { icon: "🕹️", name: "Arcade Bronze", rarity: "common" },
                arcade_silver: { icon: "🕹️", name: "Arcade Silver", rarity: "uncommon" },
                arcade_gold: { icon: "🕹️", name: "Arcade Gold", rarity: "rare" },
                legendary_dragon: { icon: "🐉", name: "Dragon Card", rarity: "legendary" },
                legendary_unicorn: { icon: "🦄", name: "Unicorn Card", rarity: "legendary" },
                legendary_phoenix: { icon: "🔥", name: "Phoenix Card", rarity: "legendary" }
            };
            
            var rarityColors = {
                common: "#94a3b8",
                uncommon: "#4ade80",
                rare: "#60a5fa",
                legendary: "#fbbf24"
            };
            
            var html = "";
            
            for (var type in cards) {
                var count = cards[type];
                if (count > 0 && cardInfo[type]) {
                    var info = cardInfo[type];
                    var color = rarityColors[info.rarity];
                    html += '<div class="inventory-item" style="border-color: ' + color + ';">' +
                        '<div class="icon">' + info.icon + '</div>' +
                        '<div class="count">x' + count + '</div>' +
                        '<div class="name" style="color: ' + color + ';">' + info.name + '</div>' +
                        '</div>';
                }
            }
            
            grid.innerHTML = html || '<div class="empty-state"><div class="icon">🃏</div><p>No trading cards yet. Win them from loot boxes!</p></div>';
        }
        
        function renderActiveBoosts() {
            var section = document.getElementById("activeBoostsSection");
            var list = document.getElementById("activeBoostsList");
            var active = userData.activeBoosts || [];
            
            if (active.length === 0) {
                section.style.display = "none";
                return;
            }
            
            section.style.display = "block";
            
            var info = {
                xp_2x: { icon: "⚡", name: "2x XP Boost" },
                coins_2x: { icon: "🪙", name: "2x Coins Boost" }
            };
            
            var html = "";
            active.forEach(function(boost) {
                var remaining = Math.max(0, boost.expiresAt - Date.now());
                var mins = Math.floor(remaining / 60000);
                var boostInfo = info[boost.type] || { icon: "⚡", name: boost.type };
                html += '<div class="boost-active">' +
                    '<div class="icon">' + boostInfo.icon + '</div>' +
                    '<div class="info"><div class="name">' + boostInfo.name + '</div>' +
                    '<div class="timer">' + mins + ' minutes remaining</div></div></div>';
            });
            list.innerHTML = html;
        }
        
        async function openAllBoxes() {

            var boxes = userData.inventory && userData.inventory.lootboxes ? userData.inventory.lootboxes : [];

            if (boxes.length === 0) {

                alert("No loot boxes to open!");

                return;

            }

            

            var btn = document.getElementById("openAllBtn");

            btn.disabled = true;

            btn.textContent = "Opening...";

            

            var rewards = [];

            var totalBoxes = boxes.length;

            

            for (var i = 0; i < totalBoxes; i++) {

                try {

                    var resp = await fetch("api/lootbox.php", {

                        method: "POST",

                        credentials: "include",

                        headers: { "Content-Type": "application/json" },

                        body: JSON.stringify({ action: "openFromInventory", boxType: boxes[0] })

                    });

                    var data = await resp.json();

                    

                    if (data.success) {

                        userData.coins = data.coins;

                        userData.inventory = data.inventory;

                        boxes = userData.inventory.lootboxes || [];

                        rewards.push(data.reward);

                        btn.textContent = "Opening... (" + (i + 1) + "/" + totalBoxes + ")";

                    }

                } catch (e) {

                    console.log("Error opening box", e);

                }

            }

            

            updateDisplay();

            btn.disabled = false;

            btn.textContent = "Open All";

            

            if (rewards.length > 0) {

                showAllResults(rewards);

            }

        }

        

        function showAllResults(rewards) {

            var summary = {};

            rewards.forEach(function(r) {

                var key = r.name;

                summary[key] = summary[key] || { count: 0, icon: r.icon, rarity: r.rarity };

                summary[key].count++;

            });

            

            var html = "<div style='max-height: 60vh; overflow-y: auto; padding: 10px;'>";

            for (var name in summary) {

                var item = summary[name];

                html += "<div style='display: flex; align-items: center; gap: 10px; margin: 10px 0; padding: 10px; background: rgba(0,0,0,0.3); border-radius: 10px;'>";

                html += "<span style='font-size: 1.5rem;'>" + item.icon + "</span>";

                html += "<span class='result-" + item.rarity + "'>" + name + "</span>";

                html += "<span style='margin-left: auto; color: #ffd700;'>x" + item.count + "</span>";

                html += "</div>";

            }

            html += "</div>";

            

            var modal = document.getElementById("resultModal");

            document.getElementById("resultIcon").textContent = "🎉";

            document.getElementById("resultTitle").textContent = "Opened " + rewards.length + " boxes!";

            document.getElementById("resultTitle").className = "title result-legendary";

            document.getElementById("resultDesc").innerHTML = html;

            modal.classList.add("active");

        }

        async function openBox(type) {
            try {
                var resp = await fetch("api/lootbox.php", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "openFromInventory", boxType: type })
                });
                var data = await resp.json();
                
                if (data.success) {
                    userData.coins = data.coins;
                    userData.inventory = data.inventory;
                    updateDisplay();
                    showResult(data.reward);
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert("Failed to open box");
            }
        }
        
        async function openCrate(crateType) {
            try {
                var resp = await fetch("api/lootbox.php", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "openCrate", crateType: crateType })
                });
                var data = await resp.json();
                
                if (data.success) {
                    userData.coins = data.coins;
                    userData.inventory = data.inventory;
                    updateDisplay();
                    showResult(data.reward);
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert("Failed to open crate");
            }
        }
        
        async function activateBooster(type) {
            try {
                var resp = await fetch("api/shop.php", {
                    method: "POST",
                    credentials: "include",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "activateBoost", boostType: type })
                });
                var data = await resp.json();
                
                if (data.success) {
                    userData.inventory = data.inventory;
                    userData.activeBoosts = data.activeBoosts;
                    updateDisplay();
                    showResult({ name: "Boost Activated!", icon: "⚡", rarity: "uncommon" });
                } else {
                    alert(data.error);
                }
            } catch (e) {
                alert("Failed to activate booster");
            }
        }
        
        function showResult(reward) {
            var modal = document.getElementById("resultModal");
            document.getElementById("resultIcon").textContent = reward.icon || "🎉";
            document.getElementById("resultTitle").textContent = reward.name;
            document.getElementById("resultTitle").className = "title result-" + (reward.rarity || "common");
            document.getElementById("resultDesc").textContent = reward.duplicate ? "Duplicate! Coins refunded." : "";
            modal.classList.add("active");
        }
        
        function closeModal() {
            document.getElementById("resultModal").classList.remove("active");
        }
        
        init();
    </script>
</body>
</html>
