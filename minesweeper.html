<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minesweeper - St. Paddy's Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0d4f21 0%, #116b35 50%, #1a8f4a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 { font-size: 2.5rem; color: #ffd700; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); margin-bottom: 10px; }
        .back-link { color: #98FB98; text-decoration: none; margin-bottom: 15px; }
        .back-link:hover { text-decoration: underline; }

        .game-header { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .info-box { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 10px; border: 2px solid #ffd700; text-align: center; min-width: 80px; }
        .info-value { font-size: 1.5rem; font-weight: bold; color: #ffd700; }

        .difficulty { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn { padding: 10px 20px; background: rgba(0,0,0,0.4); color: #98FB98; border: 2px solid #98FB98; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .diff-btn:hover, .diff-btn.active { background: #32CD32; color: #fff; border-color: #ffd700; }

        .grid { background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; border: 3px solid #ffd700; display: inline-block; }
        .row { display: flex; }
        .cell {
            width: 35px; height: 35px; border: 1px solid #444;
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem; font-weight: bold; cursor: pointer;
            background: linear-gradient(135deg, #555, #333);
            transition: all 0.1s; user-select: none;
        }
        .cell:hover:not(.revealed):not(.flagged) { background: linear-gradient(135deg, #666, #444); }
        .cell.revealed { background: #222; cursor: default; }
        .cell.mine { background: #ff4444; }
        .cell.flagged { background: linear-gradient(135deg, #ffd700, #ff8c00); }
        .cell.flagged::after { content: '🚩'; }

        .n1 { color: #0000ff; } .n2 { color: #008000; } .n3 { color: #ff0000; }
        .n4 { color: #000080; } .n5 { color: #800000; } .n6 { color: #008080; }
        .n7 { color: #000; } .n8 { color: #808080; }

        .btn { padding: 12px 30px; font-size: 1rem; background: linear-gradient(135deg, #228B22, #32CD32); color: #fff; border: 2px solid #ffd700; border-radius: 25px; cursor: pointer; margin-top: 20px; }
        .btn:hover { transform: scale(1.05); }

        .controls { margin-top: 15px; color: #98FB98; text-align: center; font-size: 0.9rem; }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .overlay.hidden { display: none; }
        .overlay h2 { font-size: 2.5rem; color: #ffd700; margin-bottom: 20px; }
        .overlay p { color: #98FB98; margin-bottom: 15px; }

        .leaderboard-form { margin: 20px 0; padding: 20px; background: rgba(50,205,50,0.1); border-radius: 15px; border: 2px solid #32CD32; }
        .leaderboard-form input { padding: 10px 15px; border-radius: 20px; border: 2px solid #32CD32; background: rgba(0,0,0,0.5); color: #fff; font-size: 1rem; width: 150px; margin-right: 10px; }
    </style>
<script src="js/pets.js"></script>
</head>
<body>
    <h1>Minesweeper</h1>
    <a href="index.html" class="back-link">&larr; Back to Arcade</a>

    <div class="difficulty">
        <button class="diff-btn active" data-diff="easy">Easy (9x9)</button>
        <button class="diff-btn" data-diff="medium">Medium (16x16)</button>
        <button class="diff-btn" data-diff="hard">Hard (16x30)</button>
    </div>

    <div class="game-header">
        <div class="info-box"><span id="mineCount">10</span> 💣</div>
        <div class="info-box"><span id="timer">0</span> ⏱️</div>
        <div class="info-box"><span id="flagCount">0</span> 🚩</div>
    </div>

    <div class="grid" id="grid"></div>

    <button class="btn" onclick="newGame()">New Game</button>

    <div class="controls">
        <p>Click to reveal | Right-click or long-press to flag</p>
    </div>

    <div class="overlay hidden" id="winOverlay">
        <h2>You Win! 🎉</h2>
        <p>Time: <span id="winTime">0</span> seconds</p>
        <div class="leaderboard-form">
            <p style="color: #32CD32; margin-bottom: 10px;">Submit to Leaderboard (fastest time wins!):</p>
            <input type="text" id="playerName" placeholder="Your name" maxlength="15">
            <button class="btn" id="submitScoreBtn">Submit</button>
            <p id="leaderboardMsg" style="margin-top: 10px; min-height: 1.2em;"></p>
        </div>
        <button class="btn" onclick="newGame()">Play Again</button>
    </div>

    <div class="overlay hidden" id="loseOverlay">
        <h2>Game Over! 💥</h2>
        <p>You hit a mine!</p>
        <button class="btn" onclick="newGame()">Try Again</button>
    </div>

    <script>
        // Tournament Mode
        const urlParams = new URLSearchParams(window.location.search);
        const tournamentId = urlParams.get('tournament') ? parseInt(urlParams.get('tournament')) : null;
        if (tournamentId) {
            const banner = document.createElement('div');
            banner.style.cssText = 'position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 1000;';
            banner.innerHTML = '&#127942; TOURNAMENT MODE <a href="tournaments.html" style="color: #000; margin-left: 15px;">View</a>';
            document.body.prepend(banner);
            document.body.style.paddingTop = '40px';
        }

        const DIFFICULTIES = {
            easy: { rows: 9, cols: 9, mines: 10 },
            medium: { rows: 16, cols: 16, mines: 40 },
            hard: { rows: 16, cols: 30, mines: 99 }
        };

        let difficulty = 'easy';
        let grid = [];
        let revealed = [];
        let flagged = [];
        let mines = [];
        let gameOver = false;
        let gameWon = false;
        let firstClick = true;
        let timer = 0;
        let timerInterval = null;
        let rows, cols, mineCount;

        function newGame() {
            const diff = DIFFICULTIES[difficulty];
            rows = diff.rows;
            cols = diff.cols;
            mineCount = diff.mines;

            grid = Array(rows).fill(null).map(() => Array(cols).fill(0));
            revealed = Array(rows).fill(null).map(() => Array(cols).fill(false));
            flagged = Array(rows).fill(null).map(() => Array(cols).fill(false));
            mines = [];
            gameOver = false;
            gameWon = false;
            firstClick = true;
            timer = 0;

            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timer').textContent = '0';
            document.getElementById('mineCount').textContent = mineCount;
            document.getElementById('flagCount').textContent = '0';
            document.getElementById('winOverlay').classList.add('hidden');
            document.getElementById('loseOverlay').classList.add('hidden');

            render();
        }

        function placeMines(excludeR, excludeC) {
            let placed = 0;
            while (placed < mineCount) {
                const r = Math.floor(Math.random() * rows);
                const c = Math.floor(Math.random() * cols);
                if (grid[r][c] !== -1 && !(Math.abs(r - excludeR) <= 1 && Math.abs(c - excludeC) <= 1)) {
                    grid[r][c] = -1;
                    mines.push({r, c});
                    placed++;
                }
            }

            // Calculate numbers
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (grid[r][c] === -1) continue;
                    let count = 0;
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) {
                                count++;
                            }
                        }
                    }
                    grid[r][c] = count;
                }
            }
        }

        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;

            revealed[r][c] = true;

            if (grid[r][c] === 0) {
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function cellClick(r, c) {
            if (gameOver || flagged[r][c] || revealed[r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                timerInterval = setInterval(() => {
                    timer++;
                    document.getElementById('timer').textContent = timer;
                }, 1000);
            }

            if (grid[r][c] === -1) {
                // Hit mine
                gameOver = true;
                clearInterval(timerInterval);
                revealAllMines();
                render();
                setTimeout(() => {
                    document.getElementById('loseOverlay').classList.remove('hidden');
                }, 500);
                return;
            }

            reveal(r, c);
            render();
            checkWin();
        }

        function toggleFlag(r, c, e) {
            e.preventDefault();
            if (gameOver || revealed[r][c]) return;

            flagged[r][c] = !flagged[r][c];
            const flagCount = flagged.flat().filter(f => f).length;
            document.getElementById('flagCount').textContent = flagCount;
            render();
        }

        function revealAllMines() {
            mines.forEach(({r, c}) => {
                revealed[r][c] = true;
            });
        }

        function checkWin() {
            let unrevealedSafe = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (!revealed[r][c] && grid[r][c] !== -1) {
                        unrevealedSafe++;
                    }
                }
            }
            if (unrevealedSafe === 0) {
                gameOver = true;
                gameWon = true;
                clearInterval(timerInterval);
                document.getElementById('winTime').textContent = timer;
                document.getElementById('winOverlay').classList.remove('hidden');

                const submitBtn = document.getElementById('submitScoreBtn');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Submit';
                document.getElementById('leaderboardMsg').textContent = '';
                const saved = localStorage.getItem('arcadePlayerName');
                if (saved) document.getElementById('playerName').value = saved;
            }
        }

        function render() {
            const gridEl = document.getElementById('grid');
            gridEl.innerHTML = '';

            for (let r = 0; r < rows; r++) {
                const rowEl = document.createElement('div');
                rowEl.className = 'row';

                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (grid[r][c] === -1) {
                            cell.classList.add('mine');
                            cell.textContent = '💣';
                        } else if (grid[r][c] > 0) {
                            cell.textContent = grid[r][c];
                            cell.classList.add('n' + grid[r][c]);
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flagged');
                    }

                    cell.onclick = () => cellClick(r, c);
                    cell.oncontextmenu = (e) => toggleFlag(r, c, e);

                    // Long press for mobile
                    let pressTimer;
                    cell.ontouchstart = () => {
                        pressTimer = setTimeout(() => toggleFlag(r, c, {preventDefault: () => {}}), 500);
                    };
                    cell.ontouchend = () => clearTimeout(pressTimer);

                    rowEl.appendChild(cell);
                }
                gridEl.appendChild(rowEl);
            }
        }

        // Difficulty buttons
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                difficulty = btn.dataset.diff;
                newGame();
            };
        });

        // Leaderboard submission (lower time = higher score)
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const playerName = document.getElementById('playerName').value.trim() || 'Anonymous';
            // For minesweeper, lower time is better, so we invert for scoring
            const playerScore = Math.max(1, 10000 - timer * 10);
            const msgEl = document.getElementById('leaderboardMsg');

            localStorage.setItem('arcadePlayerName', playerName);
            this.disabled = true;
            this.textContent = '...';

            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: 'minesweeper', name: playerName, score: playerScore, time: timer, difficulty })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#32CD32';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    this.textContent = 'Done!';

                    if (tournamentId) {
                        fetch('tournament.php', { method: 'POST', headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ action: 'submit', tournamentId, name: playerName, score: playerScore })
                        }).then(r => r.json()).then(t => { if (t.success) msgEl.textContent += ' | T#' + t.rank; }).catch(() => {});
                    }
                } else { throw new Error(data.error); }
            } catch (error) {
                msgEl.style.color = '#ff6b6b';
                msgEl.textContent = 'Failed. Try again!';
                this.disabled = false;
                this.textContent = 'Submit';
            }
        });

        newGame();
    </script>
</body>
</html>
