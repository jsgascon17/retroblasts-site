<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboards - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
        }
        .header h1 { font-size: 2rem; color: #ffd700; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link {
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); }

        .leaderboard-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .lb-tab {
            padding: 12px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .lb-tab:hover { border-color: rgba(255,215,0,0.3); }
        .lb-tab.active {
            background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,140,0,0.2));
            border-color: #ffd700;
        }
        .lb-tab .icon { font-size: 1.3rem; }

        .my-rank-card {
            background: linear-gradient(135deg, rgba(139,92,246,0.2), rgba(99,102,241,0.2));
            border: 2px solid #8b5cf6;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .my-rank-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .my-rank-position {
            font-size: 2rem;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0,0,0,0.3);
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .my-rank-text h3 { color: #fff; margin-bottom: 5px; }
        .my-rank-text p { color: #888; font-size: 0.9rem; }
        .my-rank-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd700;
        }

        .leaderboard-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            overflow: hidden;
        }
        .leaderboard-header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .leaderboard-header h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.3rem;
        }
        .updated-time { color: #888; font-size: 0.85rem; }

        .leaderboard-list {
            padding: 10px 0;
        }
        .lb-entry {
            display: flex;
            align-items: center;
            padding: 12px 20px;
            transition: background 0.2s;
        }
        .lb-entry:hover { background: rgba(255,255,255,0.05); }
        .lb-entry.top-1 { background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent); }
        .lb-entry.top-2 { background: linear-gradient(90deg, rgba(192,192,192,0.1), transparent); }
        .lb-entry.top-3 { background: linear-gradient(90deg, rgba(205,127,50,0.1), transparent); }
        .lb-entry.me { background: rgba(139,92,246,0.15); border-left: 3px solid #8b5cf6; }

        .lb-position {
            width: 50px;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .lb-position.gold { color: #ffd700; }
        .lb-position.silver { color: #c0c0c0; }
        .lb-position.bronze { color: #cd7f32; }

        .lb-medal {
            width: 30px;
            font-size: 1.3rem;
        }

        .lb-player {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .lb-avatar {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
        }
        .lb-name { font-weight: bold; }
        .lb-rank-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .rank-bronze { background: #cd7f32; color: #000; }
        .rank-silver { background: #c0c0c0; color: #000; }
        .rank-gold { background: #ffd700; color: #000; }
        .rank-platinum { background: #e5e4e2; color: #000; }
        .rank-diamond { background: #b9f2ff; color: #000; }
        .rank-master { background: #8b5cf6; color: #fff; }
        .rank-legend { background: linear-gradient(135deg, #ff6b6b, #ffd700); color: #000; }

        .lb-value {
            font-weight: bold;
            font-size: 1.1rem;
            color: #ffd700;
            min-width: 100px;
            text-align: right;
        }
        .lb-value .label {
            font-size: 0.75rem;
            color: #888;
            font-weight: normal;
        }

        .load-more {
            text-align: center;
            padding: 20px;
        }
        .load-more button {
            padding: 12px 30px;
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
            cursor: pointer;
            font-weight: bold;
        }
        .load-more button:hover { background: rgba(255,255,255,0.2); }

        .no-data {
            text-align: center;
            padding: 60px;
            color: #888;
        }
        .no-data .icon { font-size: 4rem; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 Leaderboards</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">🏠 Home</a>
                <a href="profile.html" class="nav-link">👤 Profile</a>
            </div>
        </div>

        <div class="leaderboard-tabs">
            <button class="lb-tab active" onclick="showLeaderboard('coins')">
                <span class="icon">🪙</span> Coins
            </button>
            <button class="lb-tab" onclick="showLeaderboard('xp')">
                <span class="icon">⭐</span> XP
            </button>
            <button class="lb-tab" onclick="showLeaderboard('gamesPlayed')">
                <span class="icon">🎮</span> Games Played
            </button>
            <button class="lb-tab" onclick="showLeaderboard('winStreak')">
                <span class="icon">🔥</span> Win Streak
            </button>
            <button class="lb-tab" onclick="showLeaderboard('totalWins')">
                <span class="icon">🏅</span> Total Wins
            </button>
            <button class="lb-tab" onclick="showLeaderboard('highScores')">
                <span class="icon">📊</span> High Scores
            </button>
        </div>

        <div class="my-rank-card" id="myRankCard" style="display: none;">
            <div class="my-rank-info">
                <div class="my-rank-position" id="myPosition">#1</div>
                <div class="my-rank-text">
                    <h3>Your Ranking</h3>
                    <p id="myRankDesc">Top 1% of players</p>
                </div>
            </div>
            <div class="my-rank-value" id="myValue">0</div>
        </div>

        <div class="leaderboard-card">
            <div class="leaderboard-header">
                <h2 id="lbTitle">
                    <span>🪙</span>
                    <span>Richest Players</span>
                </h2>
                <span class="updated-time" id="updatedTime">Updated just now</span>
            </div>
            <div class="leaderboard-list" id="leaderboardList"></div>
            <div class="load-more" id="loadMore" style="display: none;">
                <button onclick="loadMore()">Load More</button>
            </div>
        </div>
    </div>

    <script>
        let currentType = 'coins';
        let currentOffset = 0;
        let totalPlayers = 0;
        let currentUser = null;

        const typeConfig = {
            coins: { icon: '🪙', title: 'Richest Players', label: 'coins' },
            xp: { icon: '⭐', title: 'Most Experienced', label: 'XP' },
            gamesPlayed: { icon: '🎮', title: 'Most Active Players', label: 'games' },
            winStreak: { icon: '🔥', title: 'Longest Win Streaks', label: 'streak' },
            totalWins: { icon: '🏅', title: 'Most Victorious', label: 'wins' },
            highScores: { icon: '📊', title: 'Highest Scorers', label: 'points' }
        };

        async function init() {
            try {
                const resp = await fetch('api/auth.php?action=check', { credentials: 'include' });
                const data = await resp.json();
                if (data.loggedIn) currentUser = data.user;

                showLeaderboard('coins');
            } catch (e) {
                console.error(e);
                showLeaderboard('coins');
            }
        }

        async function showLeaderboard(type) {
            currentType = type;
            currentOffset = 0;

            document.querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
            event?.target?.classList.add('active');

            const config = typeConfig[type];
            document.getElementById('lbTitle').innerHTML = `<span>${config.icon}</span><span>${config.title}</span>`;

            await loadLeaderboard();
        }

        async function loadLeaderboard() {
            try {
                const resp = await fetch(`api/leaderboards.php?action=${currentType}&limit=50&offset=${currentOffset}`, { credentials: 'include' });
                const data = await resp.json();

                if (!data.success) throw new Error(data.error);

                totalPlayers = data.total;

                if (currentOffset === 0) {
                    renderLeaderboard(data.leaderboard, data.myPosition);
                } else {
                    appendLeaderboard(data.leaderboard);
                }

                document.getElementById('updatedTime').textContent = 'Updated ' + formatTime(data.updated);
                document.getElementById('loadMore').style.display = currentOffset + 50 < totalPlayers ? 'block' : 'none';

            } catch (e) {
                console.error(e);
                document.getElementById('leaderboardList').innerHTML = `
                    <div class="no-data">
                        <div class="icon">📊</div>
                        <p>Unable to load leaderboard</p>
                    </div>
                `;
            }
        }

        function renderLeaderboard(entries, myPosition) {
            const list = document.getElementById('leaderboardList');
            const config = typeConfig[currentType];

            // Show my rank card if logged in and has position
            const myRankCard = document.getElementById('myRankCard');
            if (myPosition && currentUser) {
                myRankCard.style.display = 'flex';
                document.getElementById('myPosition').textContent = '#' + myPosition.position;
                document.getElementById('myValue').textContent = myPosition.value.toLocaleString() + ' ' + config.label;

                const percentile = Math.round((1 - myPosition.position / totalPlayers) * 100);
                document.getElementById('myRankDesc').textContent = `Top ${Math.max(1, 100 - percentile)}% of ${totalPlayers.toLocaleString()} players`;
            } else {
                myRankCard.style.display = 'none';
            }

            if (entries.length === 0) {
                list.innerHTML = `
                    <div class="no-data">
                        <div class="icon">🏆</div>
                        <p>No rankings yet. Be the first!</p>
                    </div>
                `;
                return;
            }

            list.innerHTML = entries.map(e => renderEntry(e, config)).join('');
        }

        function appendLeaderboard(entries) {
            const list = document.getElementById('leaderboardList');
            const config = typeConfig[currentType];
            list.innerHTML += entries.map(e => renderEntry(e, config)).join('');
        }

        function renderEntry(entry, config) {
            const isMe = currentUser && entry.username === currentUser.username;
            const posClass = entry.position === 1 ? 'top-1' : entry.position === 2 ? 'top-2' : entry.position === 3 ? 'top-3' : '';
            const meClass = isMe ? 'me' : '';

            let medal = '';
            let posColor = '';
            if (entry.position === 1) { medal = '🥇'; posColor = 'gold'; }
            else if (entry.position === 2) { medal = '🥈'; posColor = 'silver'; }
            else if (entry.position === 3) { medal = '🥉'; posColor = 'bronze'; }

            const rankClass = (entry.rank || 'Bronze').toLowerCase();

            return `
                <div class="lb-entry ${posClass} ${meClass}">
                    <div class="lb-position ${posColor}">#${entry.position}</div>
                    <div class="lb-medal">${medal}</div>
                    <div class="lb-player">
                        <div class="lb-avatar">${entry.avatar || '👤'}</div>
                        <span class="lb-name">${entry.username}</span>
                        <span class="lb-rank-badge rank-${rankClass}">${entry.rank || 'Bronze'}</span>
                    </div>
                    <div class="lb-value">
                        ${entry.value.toLocaleString()}
                        <span class="label">${config.label}</span>
                    </div>
                </div>
            `;
        }

        function loadMore() {
            currentOffset += 50;
            loadLeaderboard();
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = (now - date) / 1000;

            if (diff < 60) return 'just now';
            if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
            if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
            return Math.floor(diff / 86400) + 'd ago';
        }

        init();
    </script>
</body>
</html>
