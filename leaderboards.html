<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Leaderboards - Game Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0d4f21 0%, #116b35 50%, #1a8f4a 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 6px rgba(0,0,0,0.4);
        }

        .subtitle {
            color: #98FB98;
            font-size: 1.1rem;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            color: #0d4f21;
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            z-index: 100;
        }

        .back-btn:hover {
            transform: scale(1.05);
        }

        /* Game Filter Tabs */
        .game-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .game-tab {
            padding: 10px 20px;
            background: rgba(0,0,0,0.3);
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 25px;
            color: #98FB98;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }

        .game-tab:hover {
            border-color: #ffd700;
            color: #fff;
        }

        .game-tab.active {
            background: linear-gradient(135deg, #228B22, #32CD32);
            border-color: #ffd700;
            color: #fff;
        }

        /* Leaderboard Grid */
        .leaderboards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .leaderboard-card {
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            padding: 25px;
            border: 3px solid rgba(255,215,0,0.3);
            backdrop-filter: blur(10px);
        }

        .leaderboard-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,215,0,0.2);
        }

        .game-icon {
            font-size: 2.5rem;
            background: rgba(255,215,0,0.2);
            width: 60px;
            height: 60px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .game-title {
            font-size: 1.3rem;
            color: #ffd700;
        }

        .score-list {
            list-style: none;
        }

        .score-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            margin-bottom: 8px;
            transition: all 0.2s;
        }

        .score-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .rank {
            font-size: 1.2rem;
            font-weight: bold;
            width: 35px;
            text-align: center;
        }

        .rank.gold { color: #ffd700; }
        .rank.silver { color: #c0c0c0; }
        .rank.bronze { color: #cd7f32; }

        .player-name {
            flex: 1;
            margin-left: 10px;
            color: #fff;
            font-weight: 500;
        }

        .player-score {
            font-weight: bold;
            color: #98FB98;
            font-size: 1.1rem;
        }

        .no-scores {
            text-align: center;
            padding: 30px;
            color: #888;
        }

        /* Single Game View */
        .single-leaderboard {
            max-width: 600px;
            margin: 0 auto;
        }

        .single-leaderboard .leaderboard-card {
            border-color: #ffd700;
        }

        .single-leaderboard .score-item {
            padding: 15px 20px;
        }

        .single-leaderboard .rank {
            font-size: 1.5rem;
        }

        .single-leaderboard .player-name {
            font-size: 1.1rem;
        }

        .single-leaderboard .player-score {
            font-size: 1.3rem;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #98FB98;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,215,0,0.3);
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Date formatting */
        .score-date {
            font-size: 0.75rem;
            color: #888;
            margin-left: 10px;
        }

        /* Refresh button */
        .refresh-btn {
            display: inline-block;
            padding: 10px 25px;
            background: linear-gradient(135deg, #228B22, #32CD32);
            color: #fff;
            border: 2px solid #ffd700;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,215,0,0.4);
        }

        footer {
            text-align: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 2px solid rgba(255,215,0,0.2);
            color: #98FB98;
        }

        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .leaderboards-grid { grid-template-columns: 1fr; }
            .game-tabs { gap: 8px; }
            .game-tab { padding: 8px 15px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← Back</a>

    <div class="container">
        <header>
            <h1>🏆 Global Leaderboards 🏆</h1>
            <p class="subtitle">Compete for the top spot!</p>
        </header>

        <div style="text-align: center;">
            <button class="refresh-btn" onclick="loadLeaderboards()">🔄 Refresh</button>
        </div>

        <div class="game-tabs" id="gameTabs">
            <button class="game-tab active" data-game="all">🎮 All Games</button>
        </div>

        <div id="leaderboardsContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>Loading leaderboards...</p>
            </div>
        </div>

        <footer>
            <p>☘️ Play games to get on the leaderboard! ☘️</p>
        </footer>
    </div>

    <script>
        let currentGame = 'all';
        let gamesData = {};

        async function loadLeaderboards() {
            const container = document.getElementById('leaderboardsContainer');
            container.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Loading leaderboards...</p>
                </div>
            `;

            try {
                const response = await fetch('leaderboard-global.php?game=' + currentGame);
                const data = await response.json();

                if (!data.success) {
                    throw new Error(data.error || 'Failed to load');
                }

                if (currentGame === 'all') {
                    gamesData = data.games;
                    renderAllLeaderboards(data.leaderboards, data.games);
                    updateTabs(data.games);
                } else {
                    renderSingleLeaderboard(data);
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="no-scores">
                        <p>Failed to load leaderboards. Try again!</p>
                        <button class="refresh-btn" onclick="loadLeaderboards()">🔄 Retry</button>
                    </div>
                `;
            }
        }

        function updateTabs(games) {
            const tabsContainer = document.getElementById('gameTabs');
            let tabs = '<button class="game-tab active" data-game="all">🎮 All Games</button>';

            for (const [gameId, gameInfo] of Object.entries(games)) {
                tabs += `<button class="game-tab" data-game="${gameId}">${gameInfo.icon} ${gameInfo.name}</button>`;
            }

            tabsContainer.innerHTML = tabs;

            // Add click handlers
            tabsContainer.querySelectorAll('.game-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentGame = tab.dataset.game;
                    loadLeaderboards();
                });
            });
        }

        function renderAllLeaderboards(leaderboards, games) {
            const container = document.getElementById('leaderboardsContainer');

            if (Object.keys(leaderboards).length === 0) {
                container.innerHTML = `
                    <div class="no-scores">
                        <p>No scores yet! Be the first to play!</p>
                    </div>
                `;
                return;
            }

            let html = '<div class="leaderboards-grid">';

            for (const [gameId, gameData] of Object.entries(leaderboards)) {
                html += `
                    <div class="leaderboard-card">
                        <div class="leaderboard-header">
                            <div class="game-icon">${gameData.icon}</div>
                            <h2 class="game-title">${gameData.name}</h2>
                        </div>
                        <ul class="score-list">
                            ${renderScores(gameData.scores)}
                        </ul>
                    </div>
                `;
            }

            html += '</div>';
            container.innerHTML = html;
        }

        function renderSingleLeaderboard(data) {
            const container = document.getElementById('leaderboardsContainer');

            if (!data.scores || data.scores.length === 0) {
                container.innerHTML = `
                    <div class="single-leaderboard">
                        <div class="leaderboard-card">
                            <div class="leaderboard-header">
                                <div class="game-icon">${data.gameInfo.icon}</div>
                                <h2 class="game-title">${data.gameInfo.name}</h2>
                            </div>
                            <div class="no-scores">
                                <p>No scores yet! Be the first!</p>
                            </div>
                        </div>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="single-leaderboard">
                    <div class="leaderboard-card">
                        <div class="leaderboard-header">
                            <div class="game-icon">${data.gameInfo.icon}</div>
                            <h2 class="game-title">${data.gameInfo.name}</h2>
                        </div>
                        <ul class="score-list">
                            ${renderScores(data.scores, true)}
                        </ul>
                    </div>
                </div>
            `;
        }

        function renderScores(scores, showDate = false) {
            if (!scores || scores.length === 0) {
                return '<li class="no-scores">No scores yet!</li>';
            }

            return scores.map((score, index) => {
                const rank = index + 1;
                let rankClass = '';
                let rankDisplay = rank;

                if (rank === 1) { rankClass = 'gold'; rankDisplay = '🥇'; }
                else if (rank === 2) { rankClass = 'silver'; rankDisplay = '🥈'; }
                else if (rank === 3) { rankClass = 'bronze'; rankDisplay = '🥉'; }

                const dateStr = showDate && score.date ?
                    `<span class="score-date">${formatDate(score.date)}</span>` : '';

                return `
                    <li class="score-item">
                        <span class="rank ${rankClass}">${rankDisplay}</span>
                        <span class="player-name">${escapeHtml(score.name)}</span>
                        ${dateStr}
                        <span class="player-score">${formatNumber(score.score)}</span>
                    </li>
                `;
            }).join('');
        }

        function formatNumber(n) {
            if (n >= 1e12) return (n / 1e12).toFixed(1) + 'T';
            if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
            if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
            if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
            return n.toLocaleString();
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString();
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Load on page load
        loadLeaderboards();
    </script>
</body>
</html>
