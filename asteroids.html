<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #gameCanvas {
            border: 2px solid #fff;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.2);
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 4rem;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 10px;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
        }
        .overlay h2 {
            font-size: 2.5rem;
            color: #ff0;
            margin-bottom: 20px;
        }
        .overlay p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .overlay .score-display {
            font-size: 3rem;
            color: #fff;
            margin: 20px 0;
        }
        .overlay .high-score {
            color: #ff0;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        .stats-bar {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            color: #aaa;
            font-size: 0.9rem;
        }
        .stats-bar span { color: #fff; }
        .btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-family: 'Courier New', monospace;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            cursor: pointer;
            margin: 10px;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }
        .btn:hover {
            background: #fff;
            color: #000;
        }
        .btn-small {
            padding: 10px 25px;
            font-size: 1rem;
        }
        .btn-shop {
            border-color: #0ff;
            color: #0ff;
        }
        .btn-shop:hover {
            background: #0ff;
            color: #000;
        }
        .controls {
            margin-top: 20px;
            text-align: center;
        }
        .controls p {
            margin: 5px 0;
        }
        .key {
            display: inline-block;
            background: #333;
            border: 1px solid #666;
            padding: 5px 12px;
            border-radius: 4px;
            margin: 0 3px;
        }
        .back-link {
            position: fixed;
            bottom: 10px;
            left: 10px;
            color: #555;
            text-decoration: none;
            font-size: 0.9rem;
            z-index: 200;
        }
        .back-link:hover { color: #fff; }

        /* Shop Styles */
        .shop-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.98);
            z-index: 150;
            overflow-y: auto;
            padding: 20px;
        }
        .shop-overlay.hidden { display: none; }
        .shop-container {
            max-width: 900px;
            margin: 0 auto;
        }
        .shop-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #333;
        }
        .shop-header h2 {
            color: #fff;
            font-size: 2rem;
            letter-spacing: 5px;
        }
        .coins-display {
            color: #ffd700;
            font-size: 1.5rem;
        }
        .shop-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        .shop-tab {
            padding: 10px 20px;
            background: #1a1a2e;
            border: 2px solid #333;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Courier New', monospace;
        }
        .shop-tab:hover { border-color: #666; color: #fff; }
        .shop-tab.active {
            border-color: #0ff;
            color: #0ff;
            background: rgba(0, 255, 255, 0.1);
        }
        .shop-section { display: none; }
        .shop-section.active { display: block; }
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .shop-item {
            background: #1a1a2e;
            border: 2px solid #333;
            padding: 15px;
            text-align: center;
            transition: all 0.2s;
            cursor: pointer;
        }
        .shop-item:hover { border-color: #666; transform: translateY(-2px); }
        .shop-item.owned { border-color: #0f0; }
        .shop-item.equipped { border-color: #ff0; background: rgba(255, 255, 0, 0.1); }
        .shop-item-preview {
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 10px;
        }
        .shop-item-preview canvas {
            max-width: 100%;
            max-height: 80px;
        }
        .shop-item-name {
            color: #fff;
            font-size: 1rem;
            margin-bottom: 5px;
        }
        .shop-item-price {
            color: #ffd700;
            font-size: 0.9rem;
        }
        .shop-item-price.owned { color: #0f0; }
        .achievement-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #1a1a2e;
            border: 2px solid #333;
            padding: 15px;
            margin-bottom: 10px;
        }
        .achievement-item.unlocked {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        .achievement-icon {
            font-size: 2.5rem;
            filter: grayscale(100%);
            opacity: 0.3;
        }
        .achievement-item.unlocked .achievement-icon {
            filter: none;
            opacity: 1;
        }
        .achievement-info {
            flex: 1;
            text-align: left;
        }
        .achievement-name {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 5px;
        }
        .achievement-desc {
            color: #888;
            font-size: 0.9rem;
        }
        .achievement-reward {
            color: #ffd700;
            font-size: 0.9rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
        }
        .stat-item {
            background: #1a1a2e;
            border: 2px solid #333;
            padding: 20px;
            text-align: center;
        }
        .stat-value {
            color: #0ff;
            font-size: 2rem;
            margin-bottom: 5px;
        }
        .stat-label {
            color: #888;
            font-size: 0.9rem;
        }
        .close-shop {
            position: fixed;
            top: 20px;
            right: 30px;
            font-size: 2rem;
            color: #666;
            cursor: pointer;
            z-index: 160;
        }
        .close-shop:hover { color: #fff; }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #ffd700;
            color: #fff;
            padding: 15px 30px;
            border-radius: 5px;
            z-index: 200;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { transform: translateX(-50%) translateY(-100px); opacity: 0; }
            to { transform: translateX(-50%) translateY(0); opacity: 1; }
        }
    </style>
<script src="js/duel.js"></script>
<script src="js/victory.js"></script>
<script src="js/pets.js"></script>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>ASTEROIDS</h1>
        <div class="stats-bar">
            <div>Coins: <span id="coinsDisplay">0</span></div>
            <div>High Score: <span id="highScoreDisplay">0</span></div>
        </div>
        <p>Destroy the asteroids before they destroy you!</p>
        <div>
            <button class="btn" id="startBtn">START GAME</button>
            <button class="btn btn-small btn-shop" id="shopBtn">HANGAR</button>
        </div>
        <div class="controls">
            <p><span class="key">←</span> <span class="key">→</span> Rotate</p>
            <p><span class="key">↑</span> Thrust</p>
            <p><span class="key">SPACE</span> Fire</p>
            <p><span class="key">SHIFT</span> Hyperspace</p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="score-display">SCORE: <span id="finalScore">0</span></div>
        <div class="high-score">HIGH SCORE: <span id="finalHighScore">0</span></div>
        <p id="newHighScore" style="color: #0f0; display: none;">NEW HIGH SCORE!</p>
        <p style="color: #ffd700;">+<span id="coinsEarned">0</span> coins earned</p>

        <!-- Leaderboard Submission -->
        <div id="leaderboardSubmit" style="margin: 15px 0; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px; border: 1px solid #fff;">
            <p style="color: #fff; margin-bottom: 10px; font-size: 0.9rem;">Submit to Global Leaderboard:</p>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <input type="text" id="playerName" placeholder="Your name" maxlength="15"
                       style="width: 120px; padding: 8px 12px; border: 2px solid #fff; border-radius: 8px; background: #000; color: #fff; font-family: inherit;">
                <button class="btn" id="submitScoreBtn" style="padding: 8px 15px;">Submit</button>
            </div>
            <p id="leaderboardMsg" style="margin-top: 8px; font-size: 0.8rem; min-height: 1.2em;"></p>
        </div>

        <button class="btn" id="restartBtn">PLAY AGAIN</button>
        <button class="btn btn-small btn-shop" id="shopBtn2">HANGAR</button>
    </div>

    <!-- Shop/Hangar -->
    <div class="shop-overlay hidden" id="shopOverlay">
        <span class="close-shop" id="closeShop">&times;</span>
        <div class="shop-container">
            <div class="shop-header">
                <h2>HANGAR</h2>
                <div class="coins-display">⬡ <span id="shopCoins">0</span></div>
            </div>
            <div class="shop-tabs">
                <div class="shop-tab active" data-tab="ships">Ships</div>
                <div class="shop-tab" data-tab="trails">Trails</div>
                <div class="shop-tab" data-tab="achievements">Achievements</div>
                <div class="shop-tab" data-tab="stats">Stats</div>
            </div>
            <div class="shop-section active" id="shipsSection">
                <div class="shop-grid" id="shipsGrid"></div>
            </div>
            <div class="shop-section" id="trailsSection">
                <div class="shop-grid" id="trailsGrid"></div>
            </div>
            <div class="shop-section" id="achievementsSection">
                <div id="achievementsList"></div>
            </div>
            <div class="shop-section" id="statsSection">
                <div class="stats-grid" id="statsGrid"></div>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-link">&larr; Back to Arcade</a>

    <script>
        // ============================================
        // TOURNAMENT MODE - Auto-detect active tournaments
        // ============================================
        const GAME_ID = "asteroids";
        const urlParams = new URLSearchParams(window.location.search);
        let tournamentId = urlParams.get("tournament") ? parseInt(urlParams.get("tournament")) : null;
        let tournamentBanner = null;

        function createTournamentBanner() {
            if (tournamentBanner) return tournamentBanner;
            tournamentBanner = document.createElement("div");
            tournamentBanner.id = "tournamentBanner";
            tournamentBanner.style.cssText = "position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 10000; display: flex; justify-content: center; align-items: center; gap: 15px;";
            document.body.prepend(tournamentBanner);
            document.body.style.paddingTop = "40px";
            return tournamentBanner;
        }

        function showTournamentActive(tournament) {
            const banner = createTournamentBanner();
            banner.innerHTML = "&#127942; " + tournament.name + " - " + tournament.timeRemaining + " <a href=\"tournaments.html\" style=\"color: #000; margin-left: 15px;\">View Standings</a>";
        }

        function showTournamentJoinOffer(tournament) {
            const banner = createTournamentBanner();
            banner.innerHTML = "<span>&#127942; Active Tournament: <strong>" + tournament.name + "</strong> (" + tournament.timeRemaining + ")</span> <button onclick=\"joinTournament(" + tournament.id + ")\" style=\"background: #000; color: #ffd700; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;\">JOIN</button> <button onclick=\"dismissTournament()\" style=\"background: transparent; color: #333; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; cursor: pointer;\">X</button>";
        }

        function joinTournament(id) {
            tournamentId = id;
            localStorage.setItem("joinedTournament_" + GAME_ID, id);
            fetch("tournament.php?action=scores&id=" + id).then(function(r) { return r.json(); }).then(function(data) {
                if (data.success) showTournamentActive(data.tournament);
            });
        }

        function dismissTournament() {
            if (tournamentBanner) { tournamentBanner.remove(); tournamentBanner = null; document.body.style.paddingTop = "0"; }
            sessionStorage.setItem("dismissedTournament_" + GAME_ID, "true");
        }

        function submitToTournament(playerName, score) {
            if (tournamentId) {
                fetch("tournament.php", { method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "submit", tournamentId: tournamentId, name: playerName, score: score })
                }).then(function(r) { return r.json(); }).then(function(t) { 
                    if (t.success) console.log("Tournament rank: #" + t.rank);
                }).catch(function() {});
            }
        }

        (function initTournament() {
            if (tournamentId) {
                fetch("tournament.php?action=scores&id=" + tournamentId)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.tournament.status === "active") showTournamentActive(data.tournament);
                    }).catch(function() {});
                return;
            }
            var joinedId = localStorage.getItem("joinedTournament_" + GAME_ID);
            if (joinedId) {
                fetch("tournament.php?action=scores&id=" + joinedId)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.tournament.status === "active") {
                            tournamentId = parseInt(joinedId);
                            showTournamentActive(data.tournament);
                        } else { localStorage.removeItem("joinedTournament_" + GAME_ID); }
                    }).catch(function() {});
                return;
            }
            if (sessionStorage.getItem("dismissedTournament_" + GAME_ID)) return;
            fetch("tournament.php?action=active")
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success && data.tournaments) {
                        var gameTournament = data.tournaments.find(function(t) { return t.game === GAME_ID; });
                        if (gameTournament) { tournamentId = gameTournament.id; showTournamentJoinOffer(gameTournament); }
                    }
                }).catch(function() {});
        })();

        // ============================================
        // SHIP SKINS
        // ============================================
        const SHIPS = [
            { id: 'classic', name: 'Classic', price: 0, colors: ['#fff'], style: 'classic' },
            { id: 'neon', name: 'Neon Blue', price: 100, colors: ['#0ff', '#00f'], style: 'classic' },
            { id: 'fire', name: 'Inferno', price: 150, colors: ['#ff4500', '#ff8c00', '#ffd700'], style: 'classic' },
            { id: 'toxic', name: 'Toxic', price: 150, colors: ['#0f0', '#8f0'], style: 'classic' },
            { id: 'stealth', name: 'Stealth', price: 200, colors: ['#333', '#666'], style: 'sleek' },
            { id: 'plasma', name: 'Plasma', price: 250, colors: ['#ff00ff', '#8800ff'], style: 'classic' },
            { id: 'golden', name: 'Golden', price: 500, colors: ['#ffd700', '#ff8c00'], style: 'classic' },
            { id: 'diamond', name: 'Diamond', price: 750, colors: ['#b9f2ff', '#fff', '#e0ffff'], style: 'sleek' },
            { id: 'rainbow', name: 'Rainbow', price: 1000, colors: ['rainbow'], style: 'classic' },
            { id: 'ghost', name: 'Ghost', price: 400, colors: ['rgba(255,255,255,0.5)'], style: 'ghost' }
        ];

        // ============================================
        // THRUST TRAILS
        // ============================================
        const TRAILS = [
            { id: 'classic', name: 'Classic', price: 0, colors: ['#ff0', '#f80'] },
            { id: 'blue', name: 'Blue Flame', price: 75, colors: ['#0ff', '#00f'] },
            { id: 'green', name: 'Green Energy', price: 75, colors: ['#0f0', '#8f0'] },
            { id: 'purple', name: 'Purple Haze', price: 100, colors: ['#ff00ff', '#8800ff'] },
            { id: 'rainbow', name: 'Rainbow Trail', price: 200, colors: ['rainbow'] },
            { id: 'ice', name: 'Ice', price: 150, colors: ['#fff', '#b9f2ff'] },
            { id: 'fire', name: 'Fire Trail', price: 150, colors: ['#ff4500', '#ff0'] },
            { id: 'electric', name: 'Electric', price: 175, colors: ['#ff0', '#fff'] }
        ];

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        const ACHIEVEMENTS = [
            { id: 'firstBlood', name: 'First Blood', desc: 'Destroy your first asteroid', icon: '🎯', reward: 25, check: s => s.totalAsteroidsDestroyed >= 1 },
            { id: 'asteroid50', name: 'Rock Crusher', desc: 'Destroy 50 asteroids', icon: '💥', reward: 50, check: s => s.totalAsteroidsDestroyed >= 50 },
            { id: 'asteroid200', name: 'Asteroid Hunter', desc: 'Destroy 200 asteroids', icon: '☄️', reward: 100, check: s => s.totalAsteroidsDestroyed >= 200 },
            { id: 'asteroid1000', name: 'Space Cleaner', desc: 'Destroy 1000 asteroids', icon: '🌟', reward: 250, check: s => s.totalAsteroidsDestroyed >= 1000 },
            { id: 'saucer1', name: 'UFO Down', desc: 'Destroy a UFO', icon: '🛸', reward: 50, check: s => s.saucersDestroyed >= 1 },
            { id: 'saucer10', name: 'Alien Hunter', desc: 'Destroy 10 UFOs', icon: '👽', reward: 150, check: s => s.saucersDestroyed >= 10 },
            { id: 'level5', name: 'Warming Up', desc: 'Reach level 5', icon: '⭐', reward: 50, check: s => s.highestLevel >= 5 },
            { id: 'level10', name: 'Getting Good', desc: 'Reach level 10', icon: '🌙', reward: 100, check: s => s.highestLevel >= 10 },
            { id: 'level20', name: 'Expert Pilot', desc: 'Reach level 20', icon: '🚀', reward: 200, check: s => s.highestLevel >= 20 },
            { id: 'score10k', name: 'Ten Thousand', desc: 'Score 10,000 points', icon: '📈', reward: 75, check: s => s.highScore >= 10000 },
            { id: 'score50k', name: 'Fifty Grand', desc: 'Score 50,000 points', icon: '💰', reward: 150, check: s => s.highScore >= 50000 },
            { id: 'score100k', name: 'Centurion', desc: 'Score 100,000 points', icon: '👑', reward: 300, check: s => s.highScore >= 100000 },
            { id: 'games10', name: 'Regular', desc: 'Play 10 games', icon: '🎮', reward: 50, check: s => s.gamesPlayed >= 10 },
            { id: 'games50', name: 'Veteran', desc: 'Play 50 games', icon: '🎖️', reward: 150, check: s => s.gamesPlayed >= 50 },
            { id: 'hyperspace', name: 'Risky Business', desc: 'Use hyperspace 20 times', icon: '⚡', reward: 75, check: s => s.hyperspaceUses >= 20 },
            { id: 'powerup', name: 'Powered Up', desc: 'Collect 10 power-ups', icon: '💎', reward: 50, check: s => s.powerupsCollected >= 10 }
        ];

        // ============================================
        // POWER-UPS
        // ============================================
        const POWERUP_TYPES = [
            { id: 'shield', name: 'Shield', color: '#0ff', duration: 300, icon: '🛡️' },
            { id: 'rapidfire', name: 'Rapid Fire', color: '#ff0', duration: 300, icon: '⚡' },
            { id: 'tripleshot', name: 'Triple Shot', color: '#f0f', duration: 300, icon: '🔱' },
            { id: 'extralife', name: 'Extra Life', color: '#0f0', duration: 0, icon: '❤️' },
            { id: 'bomb', name: 'Bomb', color: '#f80', duration: 0, icon: '💣' },
            { id: 'slowmo', name: 'Slow Motion', color: '#88f', duration: 180, icon: '⏱️' }
        ];

        // ============================================
        // SAVE DATA
        // ============================================
        let saveData = {
            coins: 0,
            totalCoinsEarned: 0,
            highScore: 0,
            gamesPlayed: 0,
            totalAsteroidsDestroyed: 0,
            saucersDestroyed: 0,
            highestLevel: 1,
            hyperspaceUses: 0,
            powerupsCollected: 0,
            totalShotsFired: 0,
            ownedShips: ['classic'],
            equippedShip: 'classic',
            ownedTrails: ['classic'],
            equippedTrail: 'classic',
            achievements: []
        };

        function loadSave() {
            const saved = localStorage.getItem('asteroidsProSave');
            if (saved) {
                const parsed = JSON.parse(saved);
                saveData = { ...saveData, ...parsed };
            }
            updateDisplays();
        }

        function saveSave() {
            localStorage.setItem('asteroidsProSave', JSON.stringify(saveData));
        }

        // ============================================
        // ARCADE STATS TRACKING
        // ============================================
        let gameStartTime = 0;
        function loadArcadeStats() { return JSON.parse(localStorage.getItem('arcadeStats')) || { totalGamesPlayed: 0, totalTimePlayed: 0, totalCoinsEarned: 0, games: {} }; }
        function saveArcadeStats(stats) { localStorage.setItem('arcadeStats', JSON.stringify(stats)); }
        function trackGameStart() { gameStartTime = Date.now(); }
        function trackGameEnd(finalScore, coinsEarned, waveReached) {
            const stats = loadArcadeStats();
            const gameId = 'asteroids';
            if (!stats.games[gameId]) stats.games[gameId] = { gamesPlayed: 0, timePlayed: 0, highScore: 0, totalScore: 0, coinsEarned: 0, highestWave: 0 };
            const gameStats = stats.games[gameId];
            const sessionTime = (Date.now() - gameStartTime) / 1000;
            gameStats.gamesPlayed++; gameStats.timePlayed += sessionTime; gameStats.totalScore += finalScore; gameStats.coinsEarned += coinsEarned;
            if (finalScore > gameStats.highScore) gameStats.highScore = finalScore;
            if (waveReached > gameStats.highestWave) gameStats.highestWave = waveReached;
            stats.totalGamesPlayed++; stats.totalTimePlayed += sessionTime; stats.totalCoinsEarned += coinsEarned;
            saveArcadeStats(stats);
        }

        function updateDisplays() {
            document.getElementById('coinsDisplay').textContent = saveData.coins;
            document.getElementById('highScoreDisplay').textContent = saveData.highScore;
            document.getElementById('shopCoins').textContent = saveData.coins;
        }

        // ============================================
        // AUDIO
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            const sounds = {
                shoot: () => {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now); osc.stop(now + 0.1);
                },
                explodeSmall: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.15);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                },
                explodeMedium: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(40, now + 0.25);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now); osc.stop(now + 0.25);
                },
                explodeLarge: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.4);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                },
                thrust: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(50 + Math.random() * 20, now);
                    gain.gain.setValueAtTime(0.05, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now); osc.stop(now + 0.05);
                },
                death: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(50, now + 0.8);
                    gain.gain.setValueAtTime(0.25, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);
                    osc.start(now); osc.stop(now + 0.8);
                },
                hyperspace: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.exponentialRampToValueAtTime(2000, now + 0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now); osc.stop(now + 0.3);
                },
                extraLife: () => {
                    osc.type = 'sine';
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        osc.frequency.setValueAtTime(freq, now + i * 0.1);
                    });
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now); osc.stop(now + 0.5);
                },
                powerup: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                },
                bomb: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(80, now);
                    osc.frequency.exponentialRampToValueAtTime(20, now + 0.6);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now); osc.stop(now + 0.6);
                },
                saucerBig: () => {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(100, now);
                    osc.frequency.setValueAtTime(120, now + 0.1);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now); osc.stop(now + 0.2);
                },
                saucerSmall: () => {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.setValueAtTime(250, now + 0.05);
                    osc.frequency.setValueAtTime(200, now + 0.1);
                    gain.gain.setValueAtTime(0.08, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                    osc.start(now); osc.stop(now + 0.15);
                },
                achievement: () => {
                    osc.type = 'sine';
                    [523, 659, 784, 1047].forEach((freq, i) => {
                        osc.frequency.setValueAtTime(freq, now + i * 0.08);
                    });
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now); osc.stop(now + 0.4);
                }
            };
            if (sounds[type]) sounds[type]();
        }

        // ============================================
        // CANVAS
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // ============================================
        // GAME CONSTANTS
        // ============================================
        const SHIP_SIZE = 20;
        const TURN_SPEED = 0.1;
        const THRUST_POWER = 0.15;
        const FRICTION = 0.99;
        const MAX_SPEED = 8;
        const BULLET_SPEED = 10;
        const BULLET_LIFE = 50;
        const SHOOT_COOLDOWN = 10;
        const INVINCIBLE_TIME = 180;
        const EXTRA_LIFE_SCORE = 10000;

        const ASTEROID_SIZES = {
            large: { radius: 40, points: 20, speed: 1.5 },
            medium: { radius: 20, points: 50, speed: 2.5 },
            small: { radius: 10, points: 100, speed: 3.5 }
        };

        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let level = 1;
        let nextExtraLife = EXTRA_LIFE_SCORE;
        let frameCount = 0;
        let coinsThisGame = 0;
        let asteroidsThisGame = 0;
        let slowMoActive = false;

        // Ship
        let ship = null;

        // Game objects
        let asteroids = [];
        let bullets = [];
        let particles = [];
        let saucer = null;
        let saucerBullets = [];
        let saucerTimer = 0;
        let powerups = [];
        let activePowerups = {};

        // Input
        const keys = {};

        // ============================================
        // SHIP
        // ============================================
        function createShip() {
            return {
                x: W / 2,
                y: H / 2,
                vx: 0,
                vy: 0,
                angle: -Math.PI / 2,
                radius: SHIP_SIZE,
                thrusting: false,
                shootCooldown: 0,
                invincible: INVINCIBLE_TIME,
                visible: true,
                dead: false,
                hyperspaceUsed: false
            };
        }

        function getShipColors() {
            const shipData = SHIPS.find(s => s.id === saveData.equippedShip) || SHIPS[0];
            if (shipData.colors[0] === 'rainbow') {
                const hue = (frameCount * 3) % 360;
                return [`hsl(${hue}, 100%, 50%)`, `hsl(${(hue + 60) % 360}, 100%, 50%)`];
            }
            return shipData.colors;
        }

        function getTrailColors() {
            const trailData = TRAILS.find(t => t.id === saveData.equippedTrail) || TRAILS[0];
            if (trailData.colors[0] === 'rainbow') {
                const hue = (frameCount * 5) % 360;
                return [`hsl(${hue}, 100%, 50%)`, `hsl(${(hue + 30) % 360}, 100%, 50%)`];
            }
            return trailData.colors;
        }

        function updateShip() {
            if (ship.dead) return;

            const speedMult = slowMoActive ? 0.5 : 1;

            // Rotation
            if (keys['ArrowLeft'] || keys['KeyA']) {
                ship.angle -= TURN_SPEED * speedMult;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                ship.angle += TURN_SPEED * speedMult;
            }

            // Thrust
            ship.thrusting = keys['ArrowUp'] || keys['KeyW'];
            if (ship.thrusting) {
                ship.vx += Math.cos(ship.angle) * THRUST_POWER * speedMult;
                ship.vy += Math.sin(ship.angle) * THRUST_POWER * speedMult;

                const speed = Math.sqrt(ship.vx * ship.vx + ship.vy * ship.vy);
                if (speed > MAX_SPEED) {
                    ship.vx = (ship.vx / speed) * MAX_SPEED;
                    ship.vy = (ship.vy / speed) * MAX_SPEED;
                }

                // Thrust particles
                if (frameCount % 2 === 0) {
                    const thrustAngle = ship.angle + Math.PI + (Math.random() - 0.5) * 0.5;
                    const trailColors = getTrailColors();
                    particles.push({
                        x: ship.x - Math.cos(ship.angle) * SHIP_SIZE,
                        y: ship.y - Math.sin(ship.angle) * SHIP_SIZE,
                        vx: Math.cos(thrustAngle) * (2 + Math.random() * 2),
                        vy: Math.sin(thrustAngle) * (2 + Math.random() * 2),
                        life: 0.5 + Math.random() * 0.3,
                        color: trailColors[Math.floor(Math.random() * trailColors.length)]
                    });
                }

                if (frameCount % 4 === 0) playSound('thrust');
            }

            // Friction
            ship.vx *= FRICTION;
            ship.vy *= FRICTION;

            // Move
            ship.x += ship.vx * speedMult;
            ship.y += ship.vy * speedMult;

            // Screen wrap
            ship.x = (ship.x + W) % W;
            ship.y = (ship.y + H) % H;

            // Shooting
            if (ship.shootCooldown > 0) ship.shootCooldown--;
            const rapidFire = activePowerups.rapidfire;
            const cooldown = rapidFire ? SHOOT_COOLDOWN / 3 : SHOOT_COOLDOWN;
            if ((keys['Space'] || keys['KeyX']) && ship.shootCooldown === 0) {
                shoot();
                ship.shootCooldown = cooldown;
            }

            // Hyperspace
            if (keys['ShiftLeft'] || keys['ShiftRight']) {
                if (!ship.hyperspaceUsed) {
                    hyperspace();
                    ship.hyperspaceUsed = true;
                }
            } else {
                ship.hyperspaceUsed = false;
            }

            // Invincibility
            if (ship.invincible > 0) {
                ship.invincible--;
                ship.visible = Math.floor(ship.invincible / 10) % 2 === 0;
            } else {
                ship.visible = true;
            }
        }

        function shoot() {
            const tripleShot = activePowerups.tripleshot;
            const angles = tripleShot ? [-0.2, 0, 0.2] : [0];

            angles.forEach(offset => {
                const angle = ship.angle + offset;
                bullets.push({
                    x: ship.x + Math.cos(angle) * SHIP_SIZE,
                    y: ship.y + Math.sin(angle) * SHIP_SIZE,
                    vx: Math.cos(angle) * BULLET_SPEED + ship.vx * 0.5,
                    vy: Math.sin(angle) * BULLET_SPEED + ship.vy * 0.5,
                    life: BULLET_LIFE
                });
            });

            saveData.totalShotsFired++;
            playSound('shoot');
        }

        function hyperspace() {
            playSound('hyperspace');
            ship.x = Math.random() * W;
            ship.y = Math.random() * H;
            ship.vx = 0;
            ship.vy = 0;
            saveData.hyperspaceUses++;

            if (Math.random() < 0.1 && !activePowerups.shield) {
                destroyShip();
            }
        }

        function destroyShip() {
            if (activePowerups.shield) {
                delete activePowerups.shield;
                showNotification('Shield absorbed the hit!');
                ship.invincible = 60;
                return;
            }

            ship.dead = true;
            playSound('death');

            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                const colors = getShipColors();
                particles.push({
                    x: ship.x,
                    y: ship.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1 + Math.random() * 0.5,
                    color: colors[Math.floor(Math.random() * colors.length)]
                });
            }

            for (let i = 0; i < 4; i++) {
                const angle = Math.random() * Math.PI * 2;
                particles.push({
                    x: ship.x,
                    y: ship.y,
                    vx: Math.cos(angle) * 2,
                    vy: Math.sin(angle) * 2,
                    life: 2,
                    isDebris: true,
                    angle: Math.random() * Math.PI * 2,
                    length: 10 + Math.random() * 10
                });
            }

            lives--;
            activePowerups = {};

            if (lives > 0) {
                setTimeout(() => {
                    ship = createShip();
                }, 2000);
            } else {
                setTimeout(() => {
                    gameOver();
                }, 1500);
            }
        }

        function drawShip() {
            if (ship.dead || !ship.visible) return;

            const colors = getShipColors();
            const shipData = SHIPS.find(s => s.id === saveData.equippedShip) || SHIPS[0];

            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);

            // Shield effect
            if (activePowerups.shield) {
                ctx.strokeStyle = '#0ff';
                ctx.lineWidth = 2;
                ctx.globalAlpha = 0.5 + Math.sin(frameCount * 0.2) * 0.3;
                ctx.beginPath();
                ctx.arc(0, 0, SHIP_SIZE + 8, 0, Math.PI * 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            ctx.strokeStyle = colors[0];
            ctx.lineWidth = 2;

            if (shipData.style === 'ghost') {
                ctx.globalAlpha = 0.5;
            }

            ctx.beginPath();
            if (shipData.style === 'sleek') {
                ctx.moveTo(SHIP_SIZE * 1.2, 0);
                ctx.lineTo(-SHIP_SIZE * 0.5, -SHIP_SIZE * 0.5);
                ctx.lineTo(-SHIP_SIZE * 0.3, 0);
                ctx.lineTo(-SHIP_SIZE * 0.5, SHIP_SIZE * 0.5);
            } else {
                ctx.moveTo(SHIP_SIZE, 0);
                ctx.lineTo(-SHIP_SIZE * 0.7, -SHIP_SIZE * 0.6);
                ctx.lineTo(-SHIP_SIZE * 0.4, 0);
                ctx.lineTo(-SHIP_SIZE * 0.7, SHIP_SIZE * 0.6);
            }
            ctx.closePath();
            ctx.stroke();

            // Glow effect for special ships
            if (colors.length > 1 && colors[0] !== 'rainbow') {
                ctx.shadowColor = colors[0];
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            ctx.globalAlpha = 1;

            // Thrust flame
            if (ship.thrusting) {
                const trailColors = getTrailColors();
                ctx.strokeStyle = trailColors[Math.floor(Math.random() * trailColors.length)];
                ctx.beginPath();
                ctx.moveTo(-SHIP_SIZE * 0.4, -SHIP_SIZE * 0.3);
                ctx.lineTo(-SHIP_SIZE * (0.8 + Math.random() * 0.4), 0);
                ctx.lineTo(-SHIP_SIZE * 0.4, SHIP_SIZE * 0.3);
                ctx.stroke();
            }

            ctx.restore();
        }

        // ============================================
        // ASTEROIDS
        // ============================================
        function createAsteroid(x, y, size) {
            const sizeData = ASTEROID_SIZES[size];
            const speed = sizeData.speed * (0.5 + Math.random());
            const angle = Math.random() * Math.PI * 2;

            const vertices = [];
            const numVertices = 8 + Math.floor(Math.random() * 5);
            for (let i = 0; i < numVertices; i++) {
                const vertexAngle = (i / numVertices) * Math.PI * 2;
                const variance = 0.6 + Math.random() * 0.4;
                vertices.push({
                    angle: vertexAngle,
                    distance: sizeData.radius * variance
                });
            }

            return {
                x,
                y,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                radius: sizeData.radius,
                size,
                points: sizeData.points,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.05,
                vertices
            };
        }

        function spawnAsteroids(count) {
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * W;
                    y = Math.random() * H;
                } while (ship && distance(x, y, ship.x, ship.y) < 150);

                asteroids.push(createAsteroid(x, y, 'large'));
            }
        }

        function updateAsteroids() {
            const speedMult = slowMoActive ? 0.5 : 1;
            asteroids.forEach(a => {
                a.x += a.vx * speedMult;
                a.y += a.vy * speedMult;
                a.rotation += a.rotationSpeed * speedMult;

                a.x = (a.x + W) % W;
                a.y = (a.y + H) % H;
            });
        }

        function destroyAsteroid(asteroid, index) {
            score += asteroid.points;
            asteroidsThisGame++;
            saveData.totalAsteroidsDestroyed++;
            checkExtraLife();

            if (asteroid.size === 'large') playSound('explodeLarge');
            else if (asteroid.size === 'medium') playSound('explodeMedium');
            else playSound('explodeSmall');

            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1 + Math.random() * 3;
                particles.push({
                    x: asteroid.x,
                    y: asteroid.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.5 + Math.random() * 0.5,
                    color: '#fff'
                });
            }

            // Chance to spawn power-up
            if (Math.random() < 0.05 && asteroid.size === 'large') {
                spawnPowerup(asteroid.x, asteroid.y);
            }

            if (asteroid.size === 'large') {
                asteroids.push(createAsteroid(asteroid.x, asteroid.y, 'medium'));
                asteroids.push(createAsteroid(asteroid.x, asteroid.y, 'medium'));
            } else if (asteroid.size === 'medium') {
                asteroids.push(createAsteroid(asteroid.x, asteroid.y, 'small'));
                asteroids.push(createAsteroid(asteroid.x, asteroid.y, 'small'));
            }

            asteroids.splice(index, 1);

            if (asteroids.length === 0) {
                nextLevel();
            }
        }

        function drawAsteroid(asteroid) {
            ctx.save();
            ctx.translate(asteroid.x, asteroid.y);
            ctx.rotate(asteroid.rotation);

            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();

            asteroid.vertices.forEach((v, i) => {
                const x = Math.cos(v.angle) * v.distance;
                const y = Math.sin(v.angle) * v.distance;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            });

            ctx.closePath();
            ctx.stroke();
            ctx.restore();
        }

        // ============================================
        // POWER-UPS
        // ============================================
        function spawnPowerup(x, y) {
            const type = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
            powerups.push({
                x,
                y,
                type,
                radius: 15,
                rotation: 0,
                life: 600
            });
        }

        function updatePowerups() {
            powerups.forEach((p, i) => {
                p.rotation += 0.05;
                p.life--;

                if (p.life <= 0) {
                    powerups.splice(i, 1);
                    return;
                }

                if (ship && !ship.dead && distance(p.x, p.y, ship.x, ship.y) < p.radius + ship.radius) {
                    collectPowerup(p);
                    powerups.splice(i, 1);
                }
            });

            // Update active powerups
            Object.keys(activePowerups).forEach(key => {
                activePowerups[key]--;
                if (activePowerups[key] <= 0) {
                    delete activePowerups[key];
                }
            });

            slowMoActive = !!activePowerups.slowmo;
        }

        function collectPowerup(powerup) {
            playSound('powerup');
            saveData.powerupsCollected++;

            switch (powerup.type.id) {
                case 'extralife':
                    lives++;
                    playSound('extraLife');
                    showNotification('Extra Life!');
                    break;
                case 'bomb':
                    playSound('bomb');
                    // Destroy all asteroids on screen
                    for (let i = asteroids.length - 1; i >= 0; i--) {
                        score += asteroids[i].points;
                        asteroidsThisGame++;
                        saveData.totalAsteroidsDestroyed++;

                        for (let j = 0; j < 5; j++) {
                            const angle = Math.random() * Math.PI * 2;
                            const speed = 1 + Math.random() * 3;
                            particles.push({
                                x: asteroids[i].x,
                                y: asteroids[i].y,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed,
                                life: 0.5,
                                color: '#f80'
                            });
                        }
                    }
                    asteroids = [];
                    showNotification('BOMB!');
                    setTimeout(() => nextLevel(), 500);
                    break;
                default:
                    activePowerups[powerup.type.id] = powerup.type.duration;
                    showNotification(powerup.type.name + '!');
            }
        }

        function drawPowerups() {
            powerups.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation);

                // Pulsing glow
                const pulse = 0.5 + Math.sin(frameCount * 0.1) * 0.3;
                ctx.shadowColor = p.type.color;
                ctx.shadowBlur = 15 * pulse;

                // Hexagon shape
                ctx.strokeStyle = p.type.color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2;
                    const x = Math.cos(angle) * p.radius;
                    const y = Math.sin(angle) * p.radius;
                    if (i === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }
                ctx.closePath();
                ctx.stroke();

                // Icon
                ctx.fillStyle = '#fff';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(p.type.icon, 0, 0);

                ctx.restore();
            });
        }

        // ============================================
        // SAUCER (UFO)
        // ============================================
        function spawnSaucer() {
            const isSmall = score > 10000 && Math.random() < 0.5;
            const fromLeft = Math.random() < 0.5;

            saucer = {
                x: fromLeft ? -30 : W + 30,
                y: 100 + Math.random() * (H - 200),
                vx: fromLeft ? 2 : -2,
                vy: 0,
                radius: isSmall ? 15 : 25,
                isSmall,
                shootTimer: 60,
                directionTimer: 60
            };
        }

        function updateSaucer() {
            if (!saucer) {
                saucerTimer++;
                if (saucerTimer > 600 && Math.random() < 0.005) {
                    spawnSaucer();
                    saucerTimer = 0;
                }
                return;
            }

            const speedMult = slowMoActive ? 0.5 : 1;

            saucer.x += saucer.vx * speedMult;
            saucer.y += saucer.vy * speedMult;

            saucer.directionTimer--;
            if (saucer.directionTimer <= 0) {
                saucer.vy = (Math.random() - 0.5) * 3;
                saucer.directionTimer = 30 + Math.random() * 60;
            }

            if (saucer.y < 50) saucer.vy = Math.abs(saucer.vy);
            if (saucer.y > H - 50) saucer.vy = -Math.abs(saucer.vy);

            saucer.shootTimer--;
            if (saucer.shootTimer <= 0 && ship && !ship.dead) {
                saucerShoot();
                saucer.shootTimer = saucer.isSmall ? 40 : 60;
            }

            if (frameCount % 20 === 0) {
                playSound(saucer.isSmall ? 'saucerSmall' : 'saucerBig');
            }

            if (saucer.x < -50 || saucer.x > W + 50) {
                saucer = null;
            }
        }

        function saucerShoot() {
            let angle;
            if (saucer.isSmall) {
                angle = Math.atan2(ship.y - saucer.y, ship.x - saucer.x);
                angle += (Math.random() - 0.5) * 0.2;
            } else {
                angle = Math.random() * Math.PI * 2;
            }

            saucerBullets.push({
                x: saucer.x,
                y: saucer.y,
                vx: Math.cos(angle) * 5,
                vy: Math.sin(angle) * 5,
                life: BULLET_LIFE
            });

            playSound('shoot');
        }

        function destroySaucer() {
            score += saucer.isSmall ? 1000 : 200;
            saveData.saucersDestroyed++;
            checkExtraLife();
            playSound('explodeLarge');

            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: saucer.x,
                    y: saucer.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 0.8 + Math.random() * 0.4,
                    color: '#0f0'
                });
            }

            // Saucer always drops power-up
            spawnPowerup(saucer.x, saucer.y);

            saucer = null;
        }

        function drawSaucer() {
            if (!saucer) return;

            ctx.save();
            ctx.translate(saucer.x, saucer.y);

            ctx.strokeStyle = '#0f0';
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.ellipse(0, 0, saucer.radius, saucer.radius * 0.4, 0, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.ellipse(0, -saucer.radius * 0.2, saucer.radius * 0.5, saucer.radius * 0.3, 0, Math.PI, 0);
            ctx.stroke();

            ctx.restore();
        }

        // ============================================
        // BULLETS
        // ============================================
        function updateBullets() {
            const speedMult = slowMoActive ? 0.5 : 1;

            bullets.forEach((b, i) => {
                b.x += b.vx * speedMult;
                b.y += b.vy * speedMult;
                b.life--;

                b.x = (b.x + W) % W;
                b.y = (b.y + H) % H;

                if (b.life <= 0) {
                    bullets.splice(i, 1);
                }
            });

            saucerBullets.forEach((b, i) => {
                b.x += b.vx * speedMult;
                b.y += b.vy * speedMult;
                b.life--;

                b.x = (b.x + W) % W;
                b.y = (b.y + H) % H;

                if (b.life <= 0) {
                    saucerBullets.splice(i, 1);
                }
            });
        }

        function drawBullets() {
            const shipColors = getShipColors();
            ctx.fillStyle = shipColors[0];

            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            ctx.fillStyle = '#0f0';
            saucerBullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        // ============================================
        // PARTICLES
        // ============================================
        function updateParticles() {
            particles.forEach((p, i) => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.02;

                if (p.isDebris) {
                    p.angle += 0.1;
                }

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            });
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;

                if (p.isDebris) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.angle);
                    ctx.strokeStyle = '#fff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(-p.length / 2, 0);
                    ctx.lineTo(p.length / 2, 0);
                    ctx.stroke();
                    ctx.restore();
                } else {
                    ctx.fillStyle = p.color || '#fff';
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;
        }

        // ============================================
        // COLLISIONS
        // ============================================
        function checkCollisions() {
            // Bullets vs Asteroids
            for (let i = bullets.length - 1; i >= 0; i--) {
                for (let j = asteroids.length - 1; j >= 0; j--) {
                    if (distance(bullets[i].x, bullets[i].y, asteroids[j].x, asteroids[j].y) < asteroids[j].radius) {
                        bullets.splice(i, 1);
                        destroyAsteroid(asteroids[j], j);
                        break;
                    }
                }
            }

            // Bullets vs Saucer
            if (saucer) {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    if (distance(bullets[i].x, bullets[i].y, saucer.x, saucer.y) < saucer.radius) {
                        bullets.splice(i, 1);
                        destroySaucer();
                        break;
                    }
                }
            }

            // Ship vs Asteroids
            if (ship && !ship.dead && ship.invincible <= 0) {
                for (let i = 0; i < asteroids.length; i++) {
                    if (distance(ship.x, ship.y, asteroids[i].x, asteroids[i].y) < asteroids[i].radius + ship.radius * 0.5) {
                        destroyShip();
                        break;
                    }
                }
            }

            // Ship vs Saucer
            if (ship && !ship.dead && ship.invincible <= 0 && saucer) {
                if (distance(ship.x, ship.y, saucer.x, saucer.y) < saucer.radius + ship.radius * 0.5) {
                    destroyShip();
                    destroySaucer();
                }
            }

            // Ship vs Saucer bullets
            if (ship && !ship.dead && ship.invincible <= 0) {
                for (let i = saucerBullets.length - 1; i >= 0; i--) {
                    if (distance(ship.x, ship.y, saucerBullets[i].x, saucerBullets[i].y) < ship.radius * 0.5) {
                        saucerBullets.splice(i, 1);
                        destroyShip();
                        break;
                    }
                }
            }
        }

        function distance(x1, y1, x2, y2) {
            return Math.sqrt((x2 - x1) ** 2 + (y2 - y1) ** 2);
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function checkExtraLife() {
            if (score >= nextExtraLife) {
                lives++;
                nextExtraLife += EXTRA_LIFE_SCORE;
                playSound('extraLife');
                showNotification('Extra Life!');
            }
        }

        function nextLevel() {
            level++;
            if (level > saveData.highestLevel) {
                saveData.highestLevel = level;
            }
            setTimeout(() => {
                spawnAsteroids(3 + level);
            }, 1500);
        }

        function startGame() {
            initAudio();
            trackGameStart();

            score = 0;
            lives = 3;
            level = 1;
            nextExtraLife = EXTRA_LIFE_SCORE;
            frameCount = 0;
            coinsThisGame = 0;
            asteroidsThisGame = 0;

            ship = createShip();
            asteroids = [];
            bullets = [];
            particles = [];
            saucerBullets = [];
            saucer = null;
            saucerTimer = 0;
            powerups = [];
            activePowerups = {};
            slowMoActive = false;

            spawnAsteroids(4);

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            saveData.gamesPlayed++;
            saveSave();

            gameRunning = true;
            gameLoop();
        }

        function gameOver() {
            // Add XP to pet
            if (typeof PetSystem !== "undefined" && PetSystem.loaded) {
                PetSystem.addPetXP(Math.max(5, Math.floor(score / 10)));
            }
            gameRunning = false;

            // Calculate coins earned
            coinsThisGame = Math.floor(score / 100) + Math.floor(asteroidsThisGame / 2);
            saveData.coins += coinsThisGame;
            saveData.totalCoinsEarned += coinsThisGame;

            // Check high score
            const isNewHigh = score > saveData.highScore;
            if (isNewHigh) {
                saveData.highScore = score;
            }

            // Check achievements
            checkAchievements();
            saveSave();
            trackGameEnd(score, coinsThisGame, level);

            // Submit duel score if in a challenge
            if (typeof DuelSystem !== "undefined" && DuelSystem.isInDuel()) {
                DuelSystem.submitScore(score);
            }

            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = saveData.highScore;
            document.getElementById('newHighScore').style.display = isNewHigh ? 'block' : 'none';
            document.getElementById('coinsEarned').textContent = coinsThisGame;

            // Reset leaderboard submit
            const submitBtn = document.getElementById('submitScoreBtn');
            submitBtn.disabled = false; submitBtn.textContent = 'Submit';
            document.getElementById('leaderboardMsg').textContent = '';

            document.getElementById('gameOverScreen').classList.remove('hidden');

            // Award coins on server (if logged in)
            fetch('api/add-coins.php', { credentials: 'include', method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ game: 'asteroids', coins: coinsThisGame })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    document.getElementById('coinsEarned').textContent = data.coinsEarned;
                }
            }).catch(() => {});
        }

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        function checkAchievements() {
            let newAchievements = false;

            ACHIEVEMENTS.forEach(achievement => {
                if (!saveData.achievements.includes(achievement.id) && achievement.check(saveData)) {
                    saveData.achievements.push(achievement.id);
                    saveData.coins += achievement.reward;
                    showNotification(`🏆 ${achievement.name}! +${achievement.reward} coins`);
                    playSound('achievement');
                    newAchievements = true;
                }
            });

            if (newAchievements) saveSave();
        }

        // ============================================
        // NOTIFICATIONS
        // ============================================
        function showNotification(message) {
            const existing = document.querySelector('.notification');
            if (existing) existing.remove();

            const notif = document.createElement('div');
            notif.className = 'notification';
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => notif.remove(), 2000);
        }

        // ============================================
        // DRAW HUD
        // ============================================
        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Courier New';
            ctx.textAlign = 'left';
            ctx.fillText(score.toString().padStart(6, '0'), 20, 35);

            // Coins
            ctx.fillStyle = '#ffd700';
            ctx.font = '16px Courier New';
            ctx.fillText('⬡ ' + (saveData.coins + coinsThisGame), 20, 90);

            // Lives
            ctx.save();
            for (let i = 0; i < lives; i++) {
                ctx.translate(30 + i * 25, 60);
                ctx.rotate(-Math.PI / 2);
                const colors = getShipColors();
                ctx.strokeStyle = colors[0];
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(10, 0);
                ctx.lineTo(-7, -6);
                ctx.lineTo(-4, 0);
                ctx.lineTo(-7, 6);
                ctx.closePath();
                ctx.stroke();
                ctx.setTransform(1, 0, 0, 1, 0, 0);
            }
            ctx.restore();

            // Level
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'right';
            ctx.font = '16px Courier New';
            ctx.fillText('LEVEL ' + level, W - 20, 30);

            // Active power-ups
            let powerupY = 50;
            Object.keys(activePowerups).forEach(key => {
                const type = POWERUP_TYPES.find(p => p.id === key);
                if (type) {
                    const remaining = Math.ceil(activePowerups[key] / 60);
                    ctx.fillStyle = type.color;
                    ctx.fillText(`${type.icon} ${remaining}s`, W - 20, powerupY);
                    powerupY += 20;
                }
            });
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            if (!gameRunning) return;

            frameCount++;

            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            // Draw starfield
            ctx.fillStyle = '#333';
            for (let i = 0; i < 50; i++) {
                const x = (i * 73 + frameCount * 0.1) % W;
                const y = (i * 127) % H;
                ctx.fillRect(x, y, 1, 1);
            }

            if (ship && !ship.dead) updateShip();
            updateAsteroids();
            updateBullets();
            updateParticles();
            updateSaucer();
            updatePowerups();
            checkCollisions();

            asteroids.forEach(drawAsteroid);
            drawBullets();
            drawParticles();
            drawPowerups();
            drawSaucer();
            if (ship) drawShip();
            drawHUD();

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // INPUT
        // ============================================
        document.addEventListener('keydown', e => {
            keys[e.code] = true;

            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });

        // ============================================
        // SHOP
        // ============================================
        function openShop() {
            document.getElementById('shopOverlay').classList.remove('hidden');
            renderShop();
        }

        function closeShop() {
            document.getElementById('shopOverlay').classList.add('hidden');
            updateDisplays();
        }

        function renderShop() {
            updateDisplays();

            // Ships
            const shipsGrid = document.getElementById('shipsGrid');
            shipsGrid.innerHTML = '';
            SHIPS.forEach(ship => {
                const owned = saveData.ownedShips.includes(ship.id);
                const equipped = saveData.equippedShip === ship.id;

                const item = document.createElement('div');
                item.className = `shop-item ${owned ? 'owned' : ''} ${equipped ? 'equipped' : ''}`;

                const preview = document.createElement('div');
                preview.className = 'shop-item-preview';
                const previewCanvas = document.createElement('canvas');
                previewCanvas.width = 80;
                previewCanvas.height = 80;
                preview.appendChild(previewCanvas);
                drawShipPreview(previewCanvas, ship);

                const name = document.createElement('div');
                name.className = 'shop-item-name';
                name.textContent = ship.name;

                const price = document.createElement('div');
                price.className = `shop-item-price ${owned ? 'owned' : ''}`;
                price.textContent = owned ? (equipped ? 'EQUIPPED' : 'OWNED') : `⬡ ${ship.price}`;

                item.appendChild(preview);
                item.appendChild(name);
                item.appendChild(price);

                item.onclick = () => {
                    if (owned) {
                        saveData.equippedShip = ship.id;
                        saveSave();
                        renderShop();
                    } else if (saveData.coins >= ship.price) {
                        saveData.coins -= ship.price;
                        saveData.ownedShips.push(ship.id);
                        saveData.equippedShip = ship.id;
                        saveSave();
                        renderShop();
                        playSound('powerup');
                    }
                };

                shipsGrid.appendChild(item);
            });

            // Trails
            const trailsGrid = document.getElementById('trailsGrid');
            trailsGrid.innerHTML = '';
            TRAILS.forEach(trail => {
                const owned = saveData.ownedTrails.includes(trail.id);
                const equipped = saveData.equippedTrail === trail.id;

                const item = document.createElement('div');
                item.className = `shop-item ${owned ? 'owned' : ''} ${equipped ? 'equipped' : ''}`;

                const preview = document.createElement('div');
                preview.className = 'shop-item-preview';
                preview.style.background = `linear-gradient(90deg, ${trail.colors[0] === 'rainbow' ? 'red, orange, yellow, green, blue, purple' : trail.colors.join(', ')})`;
                preview.style.borderRadius = '5px';
                preview.style.height = '30px';
                preview.style.marginTop = '25px';

                const name = document.createElement('div');
                name.className = 'shop-item-name';
                name.textContent = trail.name;

                const price = document.createElement('div');
                price.className = `shop-item-price ${owned ? 'owned' : ''}`;
                price.textContent = owned ? (equipped ? 'EQUIPPED' : 'OWNED') : `⬡ ${trail.price}`;

                item.appendChild(preview);
                item.appendChild(name);
                item.appendChild(price);

                item.onclick = () => {
                    if (owned) {
                        saveData.equippedTrail = trail.id;
                        saveSave();
                        renderShop();
                    } else if (saveData.coins >= trail.price) {
                        saveData.coins -= trail.price;
                        saveData.ownedTrails.push(trail.id);
                        saveData.equippedTrail = trail.id;
                        saveSave();
                        renderShop();
                        playSound('powerup');
                    }
                };

                trailsGrid.appendChild(item);
            });

            // Achievements
            const achievementsList = document.getElementById('achievementsList');
            achievementsList.innerHTML = '';
            ACHIEVEMENTS.forEach(achievement => {
                const unlocked = saveData.achievements.includes(achievement.id);

                const item = document.createElement('div');
                item.className = `achievement-item ${unlocked ? 'unlocked' : ''}`;

                item.innerHTML = `
                    <div class="achievement-icon">${achievement.icon}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-desc">${achievement.desc}</div>
                    </div>
                    <div class="achievement-reward">${unlocked ? '✓' : `⬡ ${achievement.reward}`}</div>
                `;

                achievementsList.appendChild(item);
            });

            // Stats
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';
            const stats = [
                { label: 'High Score', value: saveData.highScore.toLocaleString() },
                { label: 'Games Played', value: saveData.gamesPlayed },
                { label: 'Total Coins Earned', value: saveData.totalCoinsEarned },
                { label: 'Asteroids Destroyed', value: saveData.totalAsteroidsDestroyed },
                { label: 'UFOs Destroyed', value: saveData.saucersDestroyed },
                { label: 'Highest Level', value: saveData.highestLevel },
                { label: 'Hyperspace Uses', value: saveData.hyperspaceUses },
                { label: 'Power-ups Collected', value: saveData.powerupsCollected },
                { label: 'Shots Fired', value: saveData.totalShotsFired },
                { label: 'Achievements', value: `${saveData.achievements.length}/${ACHIEVEMENTS.length}` }
            ];

            stats.forEach(stat => {
                const item = document.createElement('div');
                item.className = 'stat-item';
                item.innerHTML = `
                    <div class="stat-value">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                `;
                statsGrid.appendChild(item);
            });
        }

        function drawShipPreview(canvas, shipData) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.rotate(-Math.PI / 2);

            let color = shipData.colors[0];
            if (color === 'rainbow') {
                const gradient = ctx.createLinearGradient(-20, 0, 20, 0);
                gradient.addColorStop(0, 'red');
                gradient.addColorStop(0.5, 'yellow');
                gradient.addColorStop(1, 'blue');
                color = gradient;
            }

            ctx.strokeStyle = color;
            ctx.lineWidth = 2;

            ctx.beginPath();
            if (shipData.style === 'sleek') {
                ctx.moveTo(20 * 1.2, 0);
                ctx.lineTo(-20 * 0.5, -20 * 0.5);
                ctx.lineTo(-20 * 0.3, 0);
                ctx.lineTo(-20 * 0.5, 20 * 0.5);
            } else {
                ctx.moveTo(20, 0);
                ctx.lineTo(-20 * 0.7, -20 * 0.6);
                ctx.lineTo(-20 * 0.4, 0);
                ctx.lineTo(-20 * 0.7, 20 * 0.6);
            }
            ctx.closePath();
            ctx.stroke();

            ctx.restore();
        }

        // Shop tab switching
        document.querySelectorAll('.shop-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.shop-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.shop-section').forEach(s => s.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Section').classList.add('active');
            });
        });

        // Event listeners
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('shopBtn').addEventListener('click', openShop);
        document.getElementById('shopBtn2').addEventListener('click', openShop);
        document.getElementById('closeShop').addEventListener('click', closeShop);

        // Leaderboard submission
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const nameInput = document.getElementById('playerName');
            const msgEl = document.getElementById('leaderboardMsg');
            const btn = this;
            const playerName = nameInput.value.trim() || 'Anonymous';
            const playerScore = score;

            btn.disabled = true; btn.textContent = '...';
            msgEl.textContent = 'Submitting...'; msgEl.style.color = '#888';

            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: 'asteroids', name: playerName, score: playerScore })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#fff';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    btn.textContent = 'Done!';
                    submitToTournament(playerName, playerScore);
                    localStorage.setItem('asteroidsPlayerName', playerName);
                } else { throw new Error(data.error); }
            } catch (error) {
                msgEl.style.color = '#f00'; msgEl.textContent = 'Failed. Try again!';
                btn.disabled = false; btn.textContent = 'Submit';
            }
        });
        const savedAsteroidsName = localStorage.getItem('asteroidsPlayerName');
        if (savedAsteroidsName) document.getElementById('playerName').value = savedAsteroidsName;

        // Touch controls
        let touchControls = { left: false, right: false, thrust: false, fire: false };

        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            handleTouch(e.touches);
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            handleTouch(e.touches);
        });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            touchControls = { left: false, right: false, thrust: false, fire: false };
            updateTouchKeys();
        });

        function handleTouch(touches) {
            touchControls = { left: false, right: false, thrust: false, fire: false };

            for (let touch of touches) {
                const rect = canvas.getBoundingClientRect();
                const x = touch.clientX - rect.left;
                const y = touch.clientY - rect.top;

                if (x < W / 3) touchControls.left = true;
                else if (x > W * 2 / 3) touchControls.right = true;

                if (y < H / 2) touchControls.thrust = true;
                else touchControls.fire = true;
            }

            updateTouchKeys();
        }

        function updateTouchKeys() {
            keys['ArrowLeft'] = touchControls.left;
            keys['ArrowRight'] = touchControls.right;
            keys['ArrowUp'] = touchControls.thrust;
            keys['Space'] = touchControls.fire;
        }

        // Initialize
        loadSave();
    </script>
</body>
