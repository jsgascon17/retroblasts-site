<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Profile - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', 'Chalkboard', -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 2.5rem; color: #ffd700; text-shadow: 3px 3px 6px rgba(0,0,0,0.4); margin-bottom: 10px; }
        .subtitle { color: #98FB98; font-size: 1.1rem; }
        .nav-links { display: flex; gap: 15px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .nav-link { padding: 10px 25px; background: rgba(0,0,0,0.3); color: #ffd700; text-decoration: none; border-radius: 25px; border: 2px solid #ffd700; transition: all 0.3s; }
        .nav-link:hover { background: #ffd700; color: #1a1a2e; }

        .profile-header { display: flex; align-items: center; gap: 25px; background: rgba(0,0,0,0.4); padding: 25px; border-radius: 20px; border: 3px solid #ffd700; margin-bottom: 25px; flex-wrap: wrap; justify-content: center; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; background: linear-gradient(135deg, #ffd700, #ff8c00); display: flex; align-items: center; justify-content: center; font-size: 4rem; border: 4px solid #fff; }
        .profile-info { flex: 1; min-width: 200px; }
        .player-name { font-size: 2rem; color: #ffd700; margin-bottom: 5px; }
        .player-title { color: #98FB98; font-size: 1rem; margin-bottom: 10px; }
        .shop-title { color: #ffd700; font-size: 1.1rem; margin-bottom: 5px; }
        .name-gold { color: #ffd700; text-shadow: 0 0 5px rgba(255,215,0,0.5); }
        .name-rainbow { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .name-neon_green { color: #39ff14; text-shadow: 0 0 10px #39ff14; }
        .name-fire { background: linear-gradient(180deg, #ff0, #f00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .name-ice { color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #0080ff; }
        .name-purple { color: #9b59b6; text-shadow: 0 0 8px rgba(155,89,182,0.6); }
        .name-neon_pink { color: #ff1493; text-shadow: 0 0 10px #ff1493; }
        .name-cyan { color: #00bcd4; text-shadow: 0 0 8px rgba(0,188,212,0.6); }
        .name-crimson { color: #dc143c; text-shadow: 0 0 8px rgba(220,20,60,0.6); }
        .name-silver { color: #c0c0c0; text-shadow: 0 0 5px rgba(192,192,192,0.5); }
        .name-lime { color: #00ff00; text-shadow: 0 0 8px rgba(0,255,0,0.5); }
        .name-animated_rainbow { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8f00ff, #ff0000); background-size: 200% 100%; -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; animation: rainbow-scroll 2s linear infinite; }
        @keyframes rainbow-scroll {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .edit-name { padding: 8px 15px; font-size: 0.9rem; background: rgba(255,255,255,0.1); color: #fff; border: 2px solid #98FB98; border-radius: 20px; cursor: pointer; transition: all 0.3s; }
        .edit-name:hover { background: #32CD32; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 15px; text-align: center; border: 2px solid rgba(255,215,0,0.3); }
        .stat-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .stat-value { font-size: 1.8rem; font-weight: bold; color: #ffd700; }
        .stat-label { color: #98FB98; font-size: 0.85rem; margin-top: 5px; }

        .section-title { font-size: 1.5rem; color: #ffd700; margin: 25px 0 15px; text-align: center; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }

        .games-list { background: rgba(0,0,0,0.4); border-radius: 15px; border: 2px solid rgba(255,215,0,0.3); overflow: hidden; }
        .game-row { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid rgba(255,215,0,0.2); }
        .game-row:last-child { border-bottom: none; }
        .game-row:hover { background: rgba(255,215,0,0.1); }
        .game-icon { font-size: 2rem; margin-right: 15px; }
        .game-info { flex: 1; }
        .game-name { font-weight: bold; color: #fff; }
        .game-stats { font-size: 0.85rem; color: #98FB98; }
        .game-best { text-align: right; }
        .best-label { font-size: 0.8rem; color: #98FB98; }
        .best-value { font-size: 1.3rem; font-weight: bold; color: #ffd700; }

        .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 15px; }
        .achievement { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; text-align: center; border: 2px solid #333; opacity: 0.5; }
        .achievement.unlocked { border-color: #ffd700; opacity: 1; background: rgba(255,215,0,0.1); }
        .achievement-icon { font-size: 2.5rem; }
        .achievement-name { font-size: 0.75rem; margin-top: 8px; color: #98FB98; }

        .level-bar { background: rgba(0,0,0,0.5); border-radius: 10px; height: 30px; margin: 15px 0; overflow: hidden; border: 2px solid #ffd700; }
        .level-progress { height: 100%; background: linear-gradient(90deg, #32CD32, #ffd700); display: flex; align-items: center; justify-content: flex-end; padding-right: 10px; font-weight: bold; color: #000; transition: width 0.5s; }

        .name-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .name-modal.hidden { display: none; }
        .name-modal-content { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 30px; border-radius: 20px; border: 3px solid #ffd700; text-align: center; max-width: 400px; }
        .name-modal input { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 2px solid #ffd700; background: rgba(0,0,0,0.5); color: #fff; width: 100%; margin: 15px 0; }
        .btn { padding: 12px 30px; font-size: 1rem; background: linear-gradient(135deg, #228B22, #32CD32); color: #fff; border: 2px solid #ffd700; border-radius: 25px; cursor: pointer; margin: 5px; }
        .btn:hover { transform: scale(1.05); }

        


        /* Avatar Ring Colors */
        .ring-white { border-color: #fff !important; }
        .ring-gold { border-color: #ffd700 !important; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .ring-rainbow { border: 4px solid transparent !important; background: linear-gradient(#ffd700, #ff8c00) padding-box, linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8f00ff, #ff0000) border-box !important; background-size: 100% 100%, 200% 100%; animation: ring-rainbow 2s linear infinite; }
        .ring-neon-pink { border-color: #ff1493 !important; box-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493; }
        .ring-neon-blue { border-color: #00bfff !important; box-shadow: 0 0 10px #00bfff, 0 0 20px #00bfff; }
        .ring-neon-green { border-color: #39ff14 !important; box-shadow: 0 0 10px #39ff14, 0 0 20px #39ff14; }
        .ring-fire { border-color: #ff4500 !important; box-shadow: 0 0 10px #ff4500, 0 0 20px #ff6600; animation: ring-fire 0.5s ease-in-out infinite alternate; }
        .ring-ice { border-color: #00ffff !important; box-shadow: 0 0 10px #00ffff, 0 0 20px #87ceeb; }
        @keyframes ring-rainbow { 0% { background-position: 100% 100%, 0% 50%; } 100% { background-position: 100% 100%, 200% 50%; } }
        @keyframes ring-fire { 0% { box-shadow: 0 0 10px #ff4500, 0 0 20px #ff6600; } 100% { box-shadow: 0 0 15px #ff6600, 0 0 30px #ff8800; } }
        /* Avatar Effects */
        .avatar-effect-sparkle { animation: sparkle 1s ease-in-out infinite; }
        .avatar-effect-bounce { animation: bounce 0.6s ease-in-out infinite; }
        .avatar-effect-glow { animation: avatar-glow 1.5s ease-in-out infinite; box-shadow: 0 0 20px #ffd700; }
        .avatar-effect-shake { animation: shake 0.5s ease-in-out infinite; }
        .avatar-effect-pulse { animation: pulse 1s ease-in-out infinite; }
        .avatar-effect-ghost { animation: ghost 2s ease-in-out infinite; }
        .avatar-effect-fire_aura { box-shadow: 0 0 20px #ff4500, 0 0 40px #ff6600, 0 0 60px #ff8800; animation: fire-aura 0.5s ease-in-out infinite alternate; }
        .avatar-effect-rainbow_trail { animation: rainbow-trail 2s linear infinite; }
        .avatar-effect-glitch { animation: glitch 0.3s ease-in-out infinite; }
        
        @keyframes sparkle { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.5) drop-shadow(0 0 10px gold); } }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        @keyframes avatar-glow { 0%, 100% { box-shadow: 0 0 20px #ffd700; } 50% { box-shadow: 0 0 40px #ffd700, 0 0 60px #ffaa00; } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-3px); } 75% { transform: translateX(3px); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes ghost { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes fire-aura { 0% { box-shadow: 0 0 20px #ff4500, 0 0 40px #ff6600; } 100% { box-shadow: 0 0 30px #ff6600, 0 0 60px #ff8800; } }
        @keyframes rainbow-trail { 0% { filter: hue-rotate(0deg); } 100% { filter: hue-rotate(360deg); } }
        @keyframes glitch { 0%, 100% { transform: translate(0); filter: none; } 33% { transform: translate(-2px, 2px); filter: hue-rotate(90deg); } 66% { transform: translate(2px, -2px); filter: hue-rotate(180deg); } }
        .animated-border { animation: border-pulse 1.5s ease-in-out infinite; }
        @keyframes border-pulse { 0%, 100% { filter: brightness(1); } 50% { filter: brightness(1.3); } }
        .animated-banner { background-size: 200% 200% !important; animation: banner-shift 3s ease infinite; }
        @keyframes banner-shift { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .ring-options { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .ring-option { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 3px solid #333; transition: all 0.2s; }
        .ring-option:hover { transform: scale(1.1); }
        .ring-option.selected { border-color: #ffd700; box-shadow: 0 0 10px #ffd700; }
        .ring-option-white { background: #fff; }
        .ring-option-gold { background: linear-gradient(135deg, #ffd700, #ffaa00); }
        .ring-option-rainbow { background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8f00ff); }
        .ring-option-neon-pink { background: #ff1493; box-shadow: 0 0 10px #ff1493; }
        .ring-option-neon-blue { background: #00bfff; box-shadow: 0 0 10px #00bfff; }
        .ring-option-neon-green { background: #39ff14; box-shadow: 0 0 10px #39ff14; }
        .ring-option-fire { background: linear-gradient(135deg, #ff4500, #ff6600); }
        .ring-option-ice { background: linear-gradient(135deg, #00ffff, #87ceeb); }
        .avatar-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; max-height: 300px; overflow-y: auto; padding: 10px; }
        .avatar-option { width: 50px; height: 50px; font-size: 2rem; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 10px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
        .avatar-option:hover { background: rgba(255,215,0,0.2); border-color: #ffd700; transform: scale(1.1); }
        .avatar-option.selected { border-color: #ffd700; background: rgba(255,215,0,0.3); }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .avatar { width: 80px; height: 80px; font-size: 2.5rem; }
            .player-name { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>&#127942; Player Profile &#127942;</h1>
            <p class="subtitle">Your gaming journey across RetroBlasts!</p>
            <div class="nav-links">
                <a href="index.html" class="nav-link">&#127968; Home</a>
                <a href="leaderboards.html" class="nav-link">&#127942; Leaderboards</a>
                <a href="tournaments.html" class="nav-link">&#127942; Tournaments</a>
            </div>
        </header>

        <div class="profile-header">
            <div class="avatar" id="avatar">&#127920;</div>
            <div class="profile-info">
                <div class="player-name" id="playerName">Player</div>
                <div class="shop-title" id="shopTitle" style="display: none;"></div>
                <div class="player-title" id="playerTitle">Arcade Newbie</div>
                <div>Level <span id="playerLevel">1</span></div>
                <div class="level-bar">
                    <div class="level-progress" id="levelProgress" style="width: 0%">0%</div>
                </div>
                <button class="edit-name" onclick="showNameModal()">Edit Name</button>
                <button class="edit-name" onclick="showCustomizeModal()" style="margin-left: 10px; border-color: #ffd700;">⚙️ Customize</button>
                <button class="edit-name admin-only" id="adminBtn" onclick="showAdminModal()" style="margin-left: 10px; border-color: #ff4444; color: #ff4444; display: none;">🔧 Admin</button>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">&#127918;</div>
                <div class="stat-value" id="totalGames">0</div>
                <div class="stat-label">Games Played</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">&#9203;</div>
                <div class="stat-value" id="totalTime">0h</div>
                <div class="stat-label">Time Played</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">&#127942;</div>
                <div class="stat-value" id="totalAchievements">0</div>
                <div class="stat-label">Achievements</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">&#128176;</div>
                <div class="stat-value" id="totalCoins">0</div>
                <div class="stat-label">Coins Earned</div>
            </div>
        </div>

        <h2 class="section-title">&#127918; Game Statistics</h2>
        <div class="games-list" id="gamesList"></div>

        <h2 class="section-title">&#127942; Achievements</h2>
        <div class="achievements-grid" id="achievementsGrid"></div>
    </div>

    <div class="name-modal hidden" id="nameModal">
        <div class="name-modal-content">
            <h2 style="color: #ffd700; margin-bottom: 15px;">Set Your Name</h2>
            <input type="text" id="nameInput" placeholder="Enter your name" maxlength="20">
            <div>
                <button class="btn" onclick="saveName()">Save</button>
                <button class="btn" onclick="hideNameModal()" style="background: #666;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const GAME_INFO = {
            'snake': { name: 'Snake', icon: '&#128013;' },
            'flappy-bird': { name: 'Flappy Bird', icon: '&#128036;' },
            'space-invaders': { name: 'Space Invaders', icon: '&#128126;' },
            'pac-man': { name: 'Pac-Man', icon: '&#128993;' },
            'whack-a-mole': { name: 'Whack-a-Mole', icon: '&#128057;' },
            'cookie-clicker': { name: 'Cookie Clicker', icon: '&#127850;' },
            'zombie-shooter': { name: 'Zombie Shooter', icon: '&#129503;' },
            'geometry-dash': { name: 'Geometry Dash', icon: '&#128310;' },
            'doodle-jump': { name: 'Doodle Jump', icon: '&#129432;' },
            'knife-hit': { name: 'Knife Hit', icon: '&#128298;' },
            'tower-defense': { name: 'Tower Defense', icon: '&#127984;' },
            'asteroids': { name: 'Asteroids', icon: '&#11088;' },
            'fruit-ninja': { name: 'Fruit Ninja', icon: '&#127819;' },
            'crossy-road': { name: 'Crossy Road', icon: '&#128020;' },
            'platformer': { name: 'Platformer', icon: '&#127939;' },
            'fishing': { name: 'Fishing', icon: '&#127907;' },
            'capybara-clicker': { name: 'Capybara Clicker', icon: '&#129451;' },
            'retro-bowl': { name: 'Retro Bowl', icon: '&#127944;' },
            'pop-the-lock': { name: 'Pop the Lock', icon: '&#128274;' },
            'dropper': { name: 'Dropper', icon: '&#128998;' },
            'war-simulator': { name: 'War Simulator', icon: '&#9876;' },
            '2048': { name: '2048', icon: '&#128290;' },
            'tetris': { name: 'Tetris', icon: '&#129513;' },
            'minesweeper': { name: 'Minesweeper', icon: '&#128163;' }
        };

        const ACHIEVEMENTS = [
            { id: 'first_game', name: 'First Steps', icon: '&#128095;', desc: 'Play your first game', check: s => s.totalGamesPlayed >= 1 },
            { id: 'games_10', name: 'Casual Gamer', icon: '&#127918;', desc: 'Play 10 games', check: s => s.totalGamesPlayed >= 10 },
            { id: 'games_50', name: 'Dedicated', icon: '&#127942;', desc: 'Play 50 games', check: s => s.totalGamesPlayed >= 50 },
            { id: 'games_100', name: 'Arcade Master', icon: '&#128081;', desc: 'Play 100 games', check: s => s.totalGamesPlayed >= 100 },
            { id: 'time_1h', name: 'Time Flies', icon: '&#9203;', desc: 'Play for 1 hour', check: s => s.totalTimePlayed >= 3600 },
            { id: 'time_5h', name: 'Marathon', icon: '&#127939;', desc: 'Play for 5 hours', check: s => s.totalTimePlayed >= 18000 },
            { id: 'coins_1000', name: 'Coin Collector', icon: '&#128176;', desc: 'Earn 1,000 coins', check: s => s.totalCoinsEarned >= 1000 },
            { id: 'coins_10000', name: 'Rich', icon: '&#128176;', desc: 'Earn 10,000 coins', check: s => s.totalCoinsEarned >= 10000 },
            { id: 'games_5_types', name: 'Variety', icon: '&#127922;', desc: 'Play 5 different games', check: s => Object.keys(s.games || {}).length >= 5 },
            { id: 'games_10_types', name: 'Explorer', icon: '&#127758;', desc: 'Play 10 different games', check: s => Object.keys(s.games || {}).length >= 10 },
            { id: 'games_all', name: 'Completionist', icon: '&#127775;', desc: 'Play every game', check: s => Object.keys(s.games || {}).length >= Object.keys(GAME_INFO).length },
            { id: 'lucky', name: 'Lucky', icon: '&#127808;', desc: 'Find a secret code', check: s => s.secretCodesFound >= 1 }
        ];

        const TITLES = [
            { level: 1, title: 'Arcade Newbie' },
            { level: 5, title: 'Casual Gamer' },
            { level: 10, title: 'Game Enthusiast' },
            { level: 20, title: 'Arcade Regular' },
            { level: 30, title: 'Pro Gamer' },
            { level: 50, title: 'Arcade Master' },
            { level: 75, title: 'Gaming Legend' },
            { level: 100, title: 'Arcade God' }
        ];

        // Initialize with defaults - will be overwritten by server data if logged in
        let playerName = 'Player';
        let stats = {
            totalGamesPlayed: 0,
            totalTimePlayed: 0,
            totalCoinsEarned: 0,
            games: {},
            achievements: [],
            secretCodesFound: 0
        };
        let serverXP = 0; // XP from server for accurate level calculation
        let isLoggedIn = false;

        // Load user data from server (priority) or localStorage (fallback for guests)
        async function loadUserData() {
            try {
                const response = await fetch('api/auth.php?action=check', {
                    credentials: 'include'
                });
                const data = await response.json();

                if (data.success && data.loggedIn && data.user) {
                    isLoggedIn = true;
                    const user = data.user;

                    // Use server data
                    playerName = user.displayName || user.username;
                    serverXP = user.xp || 0;

                    // Map server stats to our stats object
                    stats = {
                        totalGamesPlayed: user.stats?.totalGamesPlayed || 0,
                        totalTimePlayed: user.stats?.totalTimePlayed || 0,
                        totalCoinsEarned: user.coins || 0,
                        games: user.stats?.games || {},
                        achievements: user.achievements || [],
                        secretCodesFound: user.stats?.secretCodesFound || 0
                    };

                    // Set avatar from server
                    if (user.avatar) {
                        document.getElementById('avatar').textContent = user.avatar;
                        currentAvatar = user.avatar;
                    }

                    console.log('Loaded profile from server:', user.username, 'XP:', serverXP, 'Level:', calculateLevel());
                } else {
                    // Not logged in - use localStorage as fallback for guests
                    playerName = localStorage.getItem('arcadePlayerName') || 'Guest';
                    const savedStats = localStorage.getItem('arcadeStats');
                    if (savedStats) {
                        stats = JSON.parse(savedStats);
                    }
                    serverXP = 0;
                    console.log('Not logged in - using localStorage');
                }
            } catch (err) {
                console.error('Failed to load user data from server:', err);
                // Fallback to localStorage
                playerName = localStorage.getItem('arcadePlayerName') || 'Guest';
                const savedStats = localStorage.getItem('arcadeStats');
                if (savedStats) {
                    stats = JSON.parse(savedStats);
                }
            }

            // Now update the profile display
            updateProfile();
            loadCosmetics();
            loadAvatar();
            checkAdmin();
        }

        function calculateLevel() {
            // Use server XP if available (logged in users), otherwise calculate from stats
            if (serverXP > 0) {
                return Math.floor(Math.sqrt(serverXP / 10)) + 1;
            }
            const xp = stats.totalGamesPlayed * 10 + Math.floor(stats.totalTimePlayed / 60) + Math.floor(stats.totalCoinsEarned / 100);
            return Math.floor(Math.sqrt(xp / 10)) + 1;
        }

        function getLevelProgress() {
            const level = calculateLevel();
            const currentLevelXP = Math.pow(level - 1, 2) * 10;
            const nextLevelXP = Math.pow(level, 2) * 10;

            // Use server XP if available
            let xp;
            if (serverXP > 0) {
                xp = serverXP;
            } else {
                xp = stats.totalGamesPlayed * 10 + Math.floor(stats.totalTimePlayed / 60) + Math.floor(stats.totalCoinsEarned / 100);
            }
            return Math.min(100, Math.floor(((xp - currentLevelXP) / (nextLevelXP - currentLevelXP)) * 100));
        }

        function getTitle(level) {
            let title = TITLES[0].title;
            for (const t of TITLES) {
                if (level >= t.level) title = t.title;
            }
            return title;
        }

        function formatTime(seconds) {
            const hours = Math.floor(seconds / 3600);
            const mins = Math.floor((seconds % 3600) / 60);
            if (hours > 0) return hours + 'h ' + mins + 'm';
            return mins + 'm';
        }

        async function loadCosmetics() {
            try {
                const response = await fetch('api/shop.php?action=status', {
                    credentials: 'include'
                });
                const data = await response.json();
                if (data.success && data.equipped) {
                    // Apply name color
                    const nameEl = document.getElementById('playerName');
                    if (data.equipped.name_color) {
                        nameEl.className = 'player-name name-' + data.equipped.name_color;
                    }
                    
                    // Show equipped title from shop
                    if (data.equipped.title) {
                        const shopTitles = {
                            'champion': 'Champion 👑',
                            'legend': 'Legend ⭐',
                            'whale': 'Whale 🐋',
                            'og': 'OG 🔥'
                        };
                        const titleEl = document.getElementById('shopTitle');
                        if (shopTitles[data.equipped.title]) {
                            titleEl.textContent = shopTitles[data.equipped.title];
                            titleEl.style.display = 'block';
                        }
                    }
                    
                    // Apply profile banner
                    if (data.equipped.banner) {
                        const bannerGradients = {
                            'sunset': 'linear-gradient(135deg, #ff6b6b, #feca57, #ff9f43)',
                            'ocean': 'linear-gradient(135deg, #667eea, #764ba2, #f953c6)',
                            'forest': 'linear-gradient(135deg, #11998e, #38ef7d)',
                            'galaxy': 'linear-gradient(135deg, #0f0c29, #302b63, #24243e)',
                            'fire': 'linear-gradient(135deg, #f12711, #f5af19)',
                            'neon': 'linear-gradient(135deg, #00d2ff, #3a7bd5, #f953c6, #f5576c)',
                            'rainbow': 'linear-gradient(135deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff)',
                            'gold': 'linear-gradient(135deg, #f7971e, #ffd200, #b38728)',
                            'diamond': 'linear-gradient(135deg, #00CED1, #7FFFD4, #E0FFFF, #00CED1)',
                            'animated_fire': 'linear-gradient(135deg, #f12711, #f5af19)',
                            'animated_water': 'linear-gradient(135deg, #667eea, #764ba2)'
                        };
                        const profileHeader = document.querySelector('.profile-header');
                        if (bannerGradients[data.equipped.banner]) {
                            profileHeader.style.background = bannerGradients[data.equipped.banner];
                            // Add animation for animated banners
                            if (data.equipped.banner.startsWith('animated_')) {
                                profileHeader.classList.add('animated-banner');
                            }
                        }
                    }
                    
                    // Apply profile border
                    if (data.equipped.border) {
                        const borderStyles = {
                            'bronze': 'border: 3px solid #cd7f32; box-shadow: 0 0 10px rgba(205,127,50,0.5)',
                            'silver': 'border: 3px solid #c0c0c0; box-shadow: 0 0 10px rgba(192,192,192,0.5)',
                            'gold': 'border: 3px solid #ffd700; box-shadow: 0 0 15px rgba(255,215,0,0.6)',
                            'diamond': 'border: 3px solid #b9f2ff; box-shadow: 0 0 20px #b9f2ff, inset 0 0 10px rgba(185,242,255,0.3)',
                            'rainbow': 'border: 3px solid transparent; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)) padding-box, linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8f00ff) border-box',
                            'animated_fire': 'border: 3px solid #ff4500; box-shadow: 0 0 15px #ff4500, 0 0 30px #ff6600',
                            'animated_ice': 'border: 3px solid #00bfff; box-shadow: 0 0 15px #00bfff, 0 0 30px #87ceeb',
                            'pixel': 'border: 4px dashed #00ff00; box-shadow: 0 0 0 2px #000, 0 0 10px #00ff00',
                            'neon_glow': 'border: 2px solid #fff; box-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff'
                        };
                        const profileHeader = document.querySelector('.profile-header');
                        if (borderStyles[data.equipped.border]) {
                            profileHeader.style.cssText += '; ' + borderStyles[data.equipped.border];
                            // Add animation for animated borders
                            if (data.equipped.border.startsWith('animated_')) {
                                profileHeader.classList.add('animated-border');
                            }
                        }
                    }
                    
                    // Apply avatar effect
                    if (data.equipped.avatar_effect) {
                        const avatar = document.getElementById('avatar');
                        avatar.classList.add('avatar-effect-' + data.equipped.avatar_effect);
                    }
                    
                    // Apply avatar ring
                    if (data.equipped.avatar_ring) {
                        applyRing(data.equipped.avatar_ring);
                    }
                }
            } catch (err) {
                console.error('Error loading cosmetics:', err);
            }
        }

        function updateProfile() {
            document.getElementById('playerName').textContent = playerName;

            const level = calculateLevel();
            const progress = getLevelProgress();
            document.getElementById('playerLevel').textContent = level;
            document.getElementById('playerTitle').textContent = getTitle(level);
            document.getElementById('levelProgress').style.width = progress + '%';
            document.getElementById('levelProgress').textContent = progress + '%';

            document.getElementById('totalGames').textContent = stats.totalGamesPlayed || 0;
            document.getElementById('totalTime').textContent = formatTime(stats.totalTimePlayed || 0);
            document.getElementById('totalCoins').textContent = (stats.totalCoinsEarned || 0).toLocaleString();

            // Check achievements
            let unlockedCount = 0;
            const achievedIds = stats.achievements || [];
            for (const a of ACHIEVEMENTS) {
                if (!achievedIds.includes(a.id) && a.check(stats)) {
                    achievedIds.push(a.id);
                }
                if (achievedIds.includes(a.id)) unlockedCount++;
            }
            stats.achievements = achievedIds;
            localStorage.setItem('arcadeStats', JSON.stringify(stats));
            document.getElementById('totalAchievements').textContent = unlockedCount;

            renderGames();
            renderAchievements();
        }

        function renderGames() {
            const container = document.getElementById('gamesList');
            container.innerHTML = '';

            for (const [gameId, info] of Object.entries(GAME_INFO)) {
                const gameStats = stats.games?.[gameId] || { gamesPlayed: 0, timePlayed: 0, highScore: 0 };
                if (gameStats.gamesPlayed === 0) continue;

                const row = document.createElement('div');
                row.className = 'game-row';
                row.innerHTML = `
                    <span class="game-icon">${info.icon}</span>
                    <div class="game-info">
                        <div class="game-name">${info.name}</div>
                        <div class="game-stats">${gameStats.gamesPlayed} games | ${formatTime(gameStats.timePlayed || 0)}</div>
                    </div>
                    <div class="game-best">
                        <div class="best-label">Best</div>
                        <div class="best-value">${(gameStats.highScore || 0).toLocaleString()}</div>
                    </div>
                `;
                container.appendChild(row);
            }

            if (container.children.length === 0) {
                container.innerHTML = '<div style="padding: 30px; text-align: center; color: #98FB98;">No games played yet! Go play some games!</div>';
            }
        }

        function renderAchievements() {
            const container = document.getElementById('achievementsGrid');
            container.innerHTML = '';
            const achieved = stats.achievements || [];

            for (const a of ACHIEVEMENTS) {
                const unlocked = achieved.includes(a.id);
                const div = document.createElement('div');
                div.className = 'achievement' + (unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="achievement-icon">${unlocked ? a.icon : '&#128274;'}</div>
                    <div class="achievement-name">${a.name}</div>
                `;
                div.title = a.desc;
                container.appendChild(div);
            }
        }

        function showNameModal() {
            document.getElementById('nameInput').value = playerName;
            document.getElementById('nameModal').classList.remove('hidden');
        }

        function hideNameModal() {
            document.getElementById('nameModal').classList.add('hidden');
        }

        function saveName() {
            const name = document.getElementById('nameInput').value.trim();
            if (name) {
                playerName = name;
                localStorage.setItem('arcadePlayerName', name);
                updateProfile();
                loadCosmetics();
            }
            hideNameModal();
        }



        // Admin functions (only for billybuffalo15)
        const ADMIN_USERS = ['billybuffalo15'];
        
        async function checkAdmin() {
            try {
                const response = await fetch('api/auth.php?action=check', { credentials: 'include' });
                const data = await response.json();
                if (data.success && data.loggedIn && data.user && ADMIN_USERS.includes(data.user.username)) {
                    document.getElementById('adminBtn').style.display = 'inline-block';
                }
            } catch (e) {
                console.error('Admin check failed:', e);
            }
        }
        
        function showAdminModal() {
            document.getElementById('adminModal').classList.remove('hidden');
            document.getElementById('coinAmount').value = '';
            document.getElementById('adminMsg').textContent = '';
        }
        
        function hideAdminModal() {
            document.getElementById('adminModal').classList.add('hidden');
        }
        
        async function addCoins() {
            const amount = parseInt(document.getElementById('coinAmount').value);
            if (!amount || amount <= 0) {
                document.getElementById('adminMsg').textContent = 'Enter a valid amount';
                document.getElementById('adminMsg').style.color = '#ff4444';
                return;
            }
            
            try {
                const response = await fetch('api/admin.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ action: 'add-coins', amount: amount })
                });
                const data = await response.json();
                if (data.success) {
                    document.getElementById('adminMsg').textContent = 'Added ' + amount + ' coins! New balance: ' + data.newBalance;
                    document.getElementById('adminMsg').style.color = '#98FB98';
                    document.getElementById('totalCoins').textContent = data.newBalance.toLocaleString();
                } else {
                    document.getElementById('adminMsg').textContent = data.error || 'Failed';
                    document.getElementById('adminMsg').style.color = '#ff4444';
                }
            } catch (e) {
                document.getElementById('adminMsg').textContent = 'Error: ' + e.message;
                document.getElementById('adminMsg').style.color = '#ff4444';
            }
        }


        const RING_OPTIONS = [
            { id: 'white', name: 'White', class: 'ring-white' },
            { id: 'gold', name: 'Gold', class: 'ring-gold' },
            { id: 'rainbow', name: 'Rainbow', class: 'ring-rainbow' },
            { id: 'neon-pink', name: 'Neon Pink', class: 'ring-neon-pink' },
            { id: 'neon-blue', name: 'Neon Blue', class: 'ring-neon-blue' },
            { id: 'neon-green', name: 'Neon Green', class: 'ring-neon-green' },
            { id: 'fire', name: 'Fire', class: 'ring-fire' },
            { id: 'ice', name: 'Ice', class: 'ring-ice' }
        ];
        
        let currentRing = 'white';
        
        function renderRingOptions() {
            const container = document.getElementById('ringOptions');
            container.innerHTML = RING_OPTIONS.map(ring => 
                `<div class="ring-option ring-option-${ring.id} ${ring.id === currentRing ? 'selected' : ''}" 
                     onclick="selectRing('${ring.id}')" title="${ring.name}"></div>`
            ).join('');
        }
        
        function selectRing(ringId) {
            currentRing = ringId;
            // Ring saved on server
            applyRing();
        }
        
        function applyRing(ringId) {
            const avatar = document.getElementById('avatar');
            // Remove all ring classes
            RING_OPTIONS.forEach(ring => avatar.classList.remove(ring.class));
            // Add selected ring class
            if (ringId) {
                const selected = RING_OPTIONS.find(r => r.id === ringId);
                if (selected) {
                    avatar.classList.add(selected.class);
                }
            }
        }

        const AVATAR_OPTIONS = [
            '😀', '😎', '🤓', '🥳', '😈', '👻', '🤖', '👽', '💀', '🎃',
            '🦊', '🐱', '🐶', '🐼', '🐨', '🦁', '🐯', '🐸', '🐵', '🦄',
            '🎮', '🕹️', '🎯', '🎲', '🏆', '⭐', '💎', '🔥', '⚡', '💥',
            '🚀', '🛸', '✈️', '🏎️', '🏍️', '⛵', '🎸', '🎹', '🎤', '🎧',
            '🍕', '🍔', '🍟', '🌮', '🍦', '🍩', '🎂', '🍪', '☕', '🧋',
            '⚽', '🏀', '🏈', '⚾', '🎾', '🏐', '🎱', '🏓', '🥊', '🎿'
        ];

        let currentAvatar = localStorage.getItem('arcadeAvatar') || '🎰';

        function showCustomizeModal() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = AVATAR_OPTIONS.map(emoji => 
                `<div class="avatar-option ${emoji === currentAvatar ? 'selected' : ''}" onclick="selectAvatar('${emoji}')">${emoji}</div>`
            ).join('');
            document.getElementById('customizeModal').classList.remove('hidden');
        }

        function hideCustomizeModal() {
            document.getElementById('customizeModal').classList.add('hidden');
        }

        function selectAvatar(emoji) {
            currentAvatar = emoji;
            localStorage.setItem('arcadeAvatar', emoji);
            document.getElementById('avatar').textContent = emoji;
            
            // Update selection UI
            document.querySelectorAll('.avatar-option').forEach(el => {
                el.classList.toggle('selected', el.textContent === emoji);
            });
            
            // Save to server if logged in
            fetch('api/users.php?action=update-avatar', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ avatar: emoji })
            }).catch(() => {});
        }

        function loadAvatar() {
            const saved = localStorage.getItem('arcadeAvatar');
            if (saved) {
                document.getElementById('avatar').textContent = saved;
            }
        }

        // Initialize: Load user data from server first, then update profile
        loadUserData();
    </script>

    
    <div class="name-modal hidden" id="adminModal">
        <div class="name-modal-content">
            <h2 style="color: #ffd700; margin-bottom: 15px;">🔧 Admin: Add Coins</h2>
            <input type="number" id="coinAmount" placeholder="Amount to add" style="padding: 15px; font-size: 1.2rem; border-radius: 10px; border: 2px solid #ffd700; background: rgba(0,0,0,0.5); color: #fff; width: 100%; margin: 15px 0;">
            <div>
                <button class="btn" onclick="addCoins()">Add Coins</button>
                <button class="btn" onclick="hideAdminModal()" style="background: #666;">Cancel</button>
            </div>
            <p id="adminMsg" style="margin-top: 15px; color: #98FB98;"></p>
        </div>
    </div>

    <div class="name-modal hidden" id="customizeModal">
        <div class="name-modal-content" style="max-width: 500px;">
            <h2 style="color: #ffd700; margin-bottom: 15px;">Choose Your Avatar</h2>
            <div class="avatar-grid" id="avatarGrid"></div>
            <div style="margin-top: 20px;">
                <button class="btn" onclick="hideCustomizeModal()">Close</button>
            </div>
        </div>
    </div>

</body>
