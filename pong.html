<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        h1 {
            font-size: 2.5rem;
            color: #667eea;
            text-shadow: 0 0 20px #667eea;
            margin-bottom: 10px;
            letter-spacing: 8px;
        }
        .back-link {
            color: #888;
            text-decoration: none;
            margin-bottom: 15px;
        }
        .back-link:hover { color: #667eea; }
        .score-display {
            display: flex;
            gap: 50px;
            font-size: 3rem;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .score-display .player { color: #4ade80; }
        .score-display .ai { color: #f87171; }
        .score-display .separator { color: #444; }
        #gameCanvas {
            border: 3px solid #667eea;
            border-radius: 5px;
            box-shadow: 0 0 30px rgba(102,126,234,0.3);
            background: #000;
        }
        .instructions {
            margin-top: 15px;
            color: #666;
            font-size: 0.9rem;
            text-align: center;
        }
        .mobile-controls {
            display: none;
            margin-top: 20px;
            gap: 20px;
        }
        .mobile-btn {
            width: 80px;
            height: 80px;
            font-size: 2rem;
            background: rgba(102,126,234,0.2);
            border: 3px solid #667eea;
            border-radius: 15px;
            color: #667eea;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .mobile-btn:active {
            background: rgba(102,126,234,0.5);
        }
        @media (max-width: 768px), (pointer: coarse) {
            .mobile-controls { display: flex; }
            .instructions { display: none; }
            #gameCanvas { max-width: 100%; height: auto; }
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h2 {
            font-size: 2.5rem;
            color: #667eea;
            margin-bottom: 20px;
        }
        .overlay p {
            color: #888;
            margin-bottom: 10px;
        }
        .btn {
            padding: 15px 40px;
            font-size: 1.2rem;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 25px rgba(102,126,234,0.5);
        }
        .mode-select {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }
        .mode-btn {
            padding: 20px 30px;
            background: rgba(102,126,234,0.1);
            border: 2px solid #667eea;
            border-radius: 15px;
            color: #fff;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }
        .mode-btn:hover, .mode-btn.selected {
            background: rgba(102,126,234,0.3);
            transform: scale(1.05);
        }
        .mode-btn .icon { font-size: 2rem; display: block; margin-bottom: 10px; }
        .difficulty-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .diff-btn {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 2px solid #444;
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
        }
        .diff-btn.selected { border-color: #667eea; background: rgba(102,126,234,0.2); }
        .leaderboard-form {
            margin: 20px 0;
            padding: 20px;
            background: rgba(102,126,234,0.1);
            border-radius: 15px;
            border: 2px solid #667eea;
        }
        .leaderboard-form input {
            padding: 10px 15px;
            border-radius: 20px;
            border: 2px solid #667eea;
            background: rgba(0,0,0,0.5);
            color: #fff;
            font-size: 1rem;
            width: 150px;
            margin-right: 10px;
        }
        #leaderboardMsg { margin-top: 10px; min-height: 1.2em; }
    </style>
</head>
<body>
    <h1>PONG</h1>
    <a href="index.html" class="back-link">← Back to Arcade</a>

    <div class="score-display">
        <span class="player" id="playerScore">0</span>
        <span class="separator">:</span>
        <span class="ai" id="aiScore">0</span>
    </div>

    <canvas id="gameCanvas" width="800" height="500"></canvas>

    <p class="instructions">Use ↑ ↓ or W S to move your paddle | First to 7 wins!</p>

    <div class="mobile-controls">
        <button class="mobile-btn" id="upBtn">▲</button>
        <button class="mobile-btn" id="downBtn">▼</button>
    </div>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h2>PONG</h2>
        <p>The Classic Arcade Game</p>

        <p style="color: #667eea; margin-top: 20px;">Select Mode:</p>
        <div class="mode-select">
            <div class="mode-btn selected" data-mode="ai">
                <span class="icon">🤖</span>
                <span>vs AI</span>
            </div>
            <div class="mode-btn" data-mode="local">
                <span class="icon">👥</span>
                <span>2 Players</span>
            </div>
        </div>

        <p style="color: #667eea;">AI Difficulty:</p>
        <div class="difficulty-select" id="difficultySelect">
            <button class="diff-btn" data-diff="easy">Easy</button>
            <button class="diff-btn selected" data-diff="medium">Medium</button>
            <button class="diff-btn" data-diff="hard">Hard</button>
        </div>

        <button class="btn" id="startBtn">START</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2 id="winnerText">You Win!</h2>
        <p>Final Score: <span id="finalPlayerScore">0</span> - <span id="finalAiScore">0</span></p>
        <p id="coinsDisplay" style="color: #ffd700;">+<span id="coinsEarned">0</span> Coins</p>

        <div class="leaderboard-form" id="leaderboardForm">
            <p style="color: #667eea; margin-bottom: 10px;">Submit to Leaderboard:</p>
            <input type="text" id="playerName" placeholder="Your name" maxlength="15">
            <button class="btn" id="submitScoreBtn" style="padding: 10px 25px; font-size: 1rem;">Submit</button>
            <p id="leaderboardMsg"></p>
        </div>

        <button class="btn" id="playAgainBtn">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // Game settings
        let gameMode = 'ai';
        let difficulty = 'medium';
        let gameRunning = false;
        let playerScore = 0, aiScore = 0;
        const WIN_SCORE = 7;

        // Paddle settings
        const PADDLE_W = 12, PADDLE_H = 100;
        const PADDLE_SPEED = 8;

        // Ball settings
        const BALL_SIZE = 15;
        let ballSpeedX = 6, ballSpeedY = 6;

        // Game objects
        let player = { y: H/2 - PADDLE_H/2, dy: 0 };
        let ai = { y: H/2 - PADDLE_H/2, dy: 0 };
        let ball = { x: W/2, y: H/2, dx: 5, dy: 3 };

        // AI difficulty settings
        const AI_SPEED = { easy: 3, medium: 5, hard: 7 };
        const AI_REACTION = { easy: 0.02, medium: 0.05, hard: 0.1 };

        function resetBall(direction = 1) {
            ball.x = W/2;
            ball.y = H/2;
            const angle = (Math.random() - 0.5) * Math.PI/2;
            ball.dx = direction * ballSpeedX * Math.cos(angle);
            ball.dy = ballSpeedY * Math.sin(angle);
        }

        function drawRect(x, y, w, h, color) {
            ctx.fillStyle = color;
            ctx.shadowColor = color;
            ctx.shadowBlur = 15;
            ctx.fillRect(x, y, w, h);
            ctx.shadowBlur = 0;
        }

        function drawBall() {
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff';
            ctx.shadowBlur = 20;
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, BALL_SIZE/2, 0, Math.PI*2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }

        function drawNet() {
            ctx.setLineDash([15, 15]);
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(W/2, 0);
            ctx.lineTo(W/2, H);
            ctx.stroke();
            ctx.setLineDash([]);
        }

        function draw() {
            // Clear
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);

            // Net
            drawNet();

            // Paddles
            drawRect(20, player.y, PADDLE_W, PADDLE_H, '#4ade80');
            drawRect(W - 20 - PADDLE_W, ai.y, PADDLE_W, PADDLE_H, '#f87171');

            // Ball
            drawBall();
        }

        function updateAI() {
            const speed = AI_SPEED[difficulty];
            const reaction = AI_REACTION[difficulty];
            const paddleCenter = ai.y + PADDLE_H/2;
            const diff = ball.y - paddleCenter;

            // Add some randomness/delay to make AI beatable
            if (Math.random() < reaction || Math.abs(diff) > 30) {
                if (diff > 10) ai.y += Math.min(speed, diff);
                else if (diff < -10) ai.y -= Math.min(speed, -diff);
            }

            // Keep in bounds
            ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));
        }

        function update() {
            if (!gameRunning) return;

            // Move player paddle
            player.y += player.dy;
            player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));

            // Move AI/Player 2
            if (gameMode === 'ai') {
                updateAI();
            } else {
                ai.y += ai.dy;
                ai.y = Math.max(0, Math.min(H - PADDLE_H, ai.y));
            }

            // Move ball
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top/bottom walls
            if (ball.y - BALL_SIZE/2 <= 0 || ball.y + BALL_SIZE/2 >= H) {
                ball.dy *= -1;
                ball.y = Math.max(BALL_SIZE/2, Math.min(H - BALL_SIZE/2, ball.y));
            }

            // Player paddle collision
            if (ball.x - BALL_SIZE/2 <= 20 + PADDLE_W &&
                ball.y >= player.y && ball.y <= player.y + PADDLE_H &&
                ball.dx < 0) {
                ball.dx *= -1.05; // Speed up slightly
                const hitPos = (ball.y - player.y) / PADDLE_H - 0.5;
                ball.dy = hitPos * 10;
                ball.x = 20 + PADDLE_W + BALL_SIZE/2;
            }

            // AI paddle collision
            if (ball.x + BALL_SIZE/2 >= W - 20 - PADDLE_W &&
                ball.y >= ai.y && ball.y <= ai.y + PADDLE_H &&
                ball.dx > 0) {
                ball.dx *= -1.05;
                const hitPos = (ball.y - ai.y) / PADDLE_H - 0.5;
                ball.dy = hitPos * 10;
                ball.x = W - 20 - PADDLE_W - BALL_SIZE/2;
            }

            // Scoring
            if (ball.x < 0) {
                aiScore++;
                updateScoreDisplay();
                if (aiScore >= WIN_SCORE) {
                    gameOver(false);
                } else {
                    resetBall(-1);
                }
            } else if (ball.x > W) {
                playerScore++;
                updateScoreDisplay();
                if (playerScore >= WIN_SCORE) {
                    gameOver(true);
                } else {
                    resetBall(1);
                }
            }
        }

        function updateScoreDisplay() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('aiScore').textContent = aiScore;
        }

        function gameLoop() {
            update();
            draw();
            if (gameRunning) requestAnimationFrame(gameLoop);
        }

        function startGame() {
            playerScore = 0;
            aiScore = 0;
            updateScoreDisplay();
            player.y = H/2 - PADDLE_H/2;
            ai.y = H/2 - PADDLE_H/2;
            ballSpeedX = 6;
            ballSpeedY = 6;
            resetBall(Math.random() < 0.5 ? 1 : -1);
            gameRunning = true;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            requestAnimationFrame(gameLoop);
        }

        function gameOver(playerWon) {
            gameRunning = false;

            document.getElementById('winnerText').textContent = playerWon ? 'You Win!' : 'You Lose!';
            document.getElementById('winnerText').style.color = playerWon ? '#4ade80' : '#f87171';
            document.getElementById('finalPlayerScore').textContent = playerScore;
            document.getElementById('finalAiScore').textContent = aiScore;

            // Calculate coins
            const coins = playerWon ? 50 + (playerScore * 5) : playerScore * 2;
            document.getElementById('coinsEarned').textContent = coins;

            // Award coins on server
            fetch('api/add-coins.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ coins: coins, score: playerScore * 100, game: 'pong' })
            }).catch(() => {});

            // Only show leaderboard for wins
            document.getElementById('leaderboardForm').style.display = playerWon ? 'block' : 'none';

            // Reset submit button
            const submitBtn = document.getElementById('submitScoreBtn');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Submit';
            document.getElementById('leaderboardMsg').textContent = '';

            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // Keyboard controls
        document.addEventListener('keydown', e => {
            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    player.dy = -PADDLE_SPEED;
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    player.dy = PADDLE_SPEED;
                    break;
                // Player 2 controls (local multiplayer)
                case 'i':
                case 'I':
                    if (gameMode === 'local') ai.dy = -PADDLE_SPEED;
                    break;
                case 'k':
                case 'K':
                    if (gameMode === 'local') ai.dy = PADDLE_SPEED;
                    break;
            }
        });

        document.addEventListener('keyup', e => {
            switch(e.key) {
                case 'ArrowUp':
                case 'ArrowDown':
                case 'w':
                case 'W':
                case 's':
                case 'S':
                    player.dy = 0;
                    break;
                case 'i':
                case 'I':
                case 'k':
                case 'K':
                    if (gameMode === 'local') ai.dy = 0;
                    break;
            }
        });

        // Mobile controls
        const upBtn = document.getElementById('upBtn');
        const downBtn = document.getElementById('downBtn');

        upBtn.addEventListener('touchstart', e => { e.preventDefault(); player.dy = -PADDLE_SPEED; });
        upBtn.addEventListener('touchend', () => player.dy = 0);
        upBtn.addEventListener('mousedown', () => player.dy = -PADDLE_SPEED);
        upBtn.addEventListener('mouseup', () => player.dy = 0);

        downBtn.addEventListener('touchstart', e => { e.preventDefault(); player.dy = PADDLE_SPEED; });
        downBtn.addEventListener('touchend', () => player.dy = 0);
        downBtn.addEventListener('mousedown', () => player.dy = PADDLE_SPEED);
        downBtn.addEventListener('mouseup', () => player.dy = 0);

        // Touch drag on canvas
        let touchY = 0;
        canvas.addEventListener('touchstart', e => {
            touchY = e.touches[0].clientY;
        }, { passive: true });

        canvas.addEventListener('touchmove', e => {
            const newY = e.touches[0].clientY;
            const diff = newY - touchY;
            player.y += diff * 1.5;
            player.y = Math.max(0, Math.min(H - PADDLE_H, player.y));
            touchY = newY;
            e.preventDefault();
        }, { passive: false });

        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                gameMode = btn.dataset.mode;
                document.getElementById('difficultySelect').style.display =
                    gameMode === 'ai' ? 'flex' : 'none';
            });
        });

        // Difficulty selection
        document.querySelectorAll('.diff-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                difficulty = btn.dataset.diff;
            });
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('playAgainBtn').addEventListener('click', startGame);

        // Leaderboard submission
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const playerNameInput = document.getElementById('playerName');
            const msgEl = document.getElementById('leaderboardMsg');
            const btn = this;
            const name = playerNameInput.value.trim() || 'Anonymous';
            const score = playerScore * 100 + (7 - aiScore) * 10; // Score based on win margin

            btn.disabled = true;
            btn.textContent = '...';

            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: 'pong', name: name, score: score })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#4ade80';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    btn.textContent = 'Done!';
                    localStorage.setItem('pongPlayerName', name);
                } else {
                    throw new Error(data.error);
                }
            } catch (e) {
                msgEl.style.color = '#f87171';
                msgEl.textContent = 'Failed. Try again!';
                btn.disabled = false;
                btn.textContent = 'Submit';
            }
        });

        // Load saved name
        const savedName = localStorage.getItem('pongPlayerName');
        if (savedName) document.getElementById('playerName').value = savedName;

        // Initial draw
        draw();
    </script>
</body>
</html>
