<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Retro Bowl</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow-x: hidden;
            touch-action: manipulation;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            max-width: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 500px;
            margin-bottom: 10px;
            padding: 0 10px;
        }
        .team-score { text-align: center; }
        .team-name { font-size: 0.9rem; color: #888; }
        .score { font-size: 2rem; font-weight: bold; }
        .my-score { color: #4ecdc4; }
        .opp-score { color: #ff6b6b; }
        .game-info { text-align: center; }
        .quarter { font-size: 1rem; color: #ffd700; }
        .time { font-size: 1.5rem; font-weight: bold; }
        .down-info {
            background: rgba(0,0,0,0.5);
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        #gameCanvas {
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 205, 196, 0.2);
            touch-action: none;
        }
        .controls-info {
            margin-top: 10px;
            color: #888;
            font-size: 0.85rem;
            text-align: center;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { font-size: 2.5rem; margin-bottom: 10px; color: #4ecdc4; }
        .overlay h2 { font-size: 2rem; margin-bottom: 20px; }
        .overlay p { font-size: 1.1rem; margin: 5px 0; color: #aaa; }
        .btn {
            margin: 10px;
            padding: 15px 40px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-secondary { background: linear-gradient(135deg, #667eea, #764ba2); }
        .play-select {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
            max-width: 400px;
        }
        .play-btn {
            padding: 15px 25px;
            font-size: 1.1rem;
            background: rgba(78, 205, 196, 0.2);
            border: 2px solid #4ecdc4;
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-width: 140px;
        }
        .play-btn:hover { background: rgba(78, 205, 196, 0.4); transform: scale(1.05); }
        .home-link {
            position: fixed;
            top: 10px; left: 10px;
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            opacity: 0.7;
            z-index: 200;
        }
        .home-link:hover { opacity: 1; }
        .schedule {
            max-width: 350px;
            width: 100%;
            margin: 15px 0;
        }
        .schedule-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin: 5px 0;
        }
        .schedule-game.current { border: 2px solid #4ecdc4; background: rgba(78, 205, 196, 0.1); }
        .schedule-game.won { border-left: 4px solid #4ecdc4; }
        .schedule-game.lost { border-left: 4px solid #ff6b6b; }
        .week-num { color: #888; font-size: 0.9rem; }
        .opponent { flex: 1; margin-left: 10px; }
        .game-result { font-weight: bold; min-width: 60px; text-align: right; }
        .result-big { font-size: 3rem; margin: 20px 0; }
    </style>
<script src="js/pets.js"></script>
</head>
<body>
    <a href="index.html" class="home-link">< Back</a>

    <div class="game-container">
        <div class="header">
            <div class="team-score">
                <div class="team-name" id="myTeamName">MY TEAM</div>
                <div class="score my-score" id="myScore">0</div>
            </div>
            <div class="game-info">
                <div class="quarter" id="quarter">Q1</div>
                <div class="time" id="time">2:00</div>
            </div>
            <div class="team-score">
                <div class="team-name" id="oppTeamName">OPPONENT</div>
                <div class="score opp-score" id="oppScore">0</div>
            </div>
        </div>

        <div class="down-info" id="downInfo">1st & 10</div>

        <canvas id="gameCanvas" width="500" height="600"></canvas>

        <div class="controls-info">
            Tap a receiver to throw • Drag QB to run
        </div>
    </div>

    <!-- Main Menu -->
    <div class="overlay" id="menuOverlay">
        <h1>🏈 Retro Bowl</h1>
        <p>Lead your team to victory!</p>
        <button class="btn" id="playBtn">Play Season</button>
        <button class="btn btn-secondary" id="quickPlayBtn">Quick Game</button>
    </div>

    <!-- Play Selection -->
    <div class="overlay hidden" id="playOverlay">
        <h2>Choose Your Play</h2>
        <div class="play-select" id="playSelect"></div>
    </div>

    <!-- Result Overlay -->
    <div class="overlay hidden" id="resultOverlay">
        <div class="result-big" id="resultText"></div>
        <p id="resultDetails"></p>
        <button class="btn" id="continueBtn">Continue</button>
    </div>

    <!-- Game Over -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h2 id="gameOverTitle">Game Over</h2>
        <p id="finalScore" style="font-size: 1.5rem; margin: 15px 0;"></p>
        <p id="seasonRecord"></p>

        <!-- Leaderboard Submission -->
        <div id="leaderboardSubmit" style="margin: 15px 0; padding: 15px; background: rgba(76,175,80,0.2); border-radius: 10px; border: 1px solid #4caf50;">
            <p style="color: #4caf50; margin-bottom: 10px; font-size: 0.9rem;">Submit to Global Leaderboard:</p>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <input type="text" id="playerName" placeholder="Your name" maxlength="15" style="width: 120px; padding: 8px 12px; border: 2px solid #4caf50; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-family: inherit;">
                <button class="btn" id="submitScoreBtn" style="padding: 8px 15px;">Submit</button>
            </div>
            <p id="leaderboardMsg" style="margin-top: 8px; font-size: 0.8rem; min-height: 1.2em;"></p>
        </div>

        <button class="btn" id="nextGameBtn">Next Game</button>
        <button class="btn btn-secondary" id="menuBtn">Main Menu</button>
    </div>

    <!-- Season Schedule -->
    <div class="overlay hidden" id="scheduleOverlay">
        <h2>Season Schedule</h2>
        <div class="schedule" id="schedule"></div>
        <button class="btn" id="startSeasonBtn">Start Game</button>
    </div>

    <script>
        // ============================================
        // TOURNAMENT MODE - Auto-detect active tournaments
        // ============================================
        const GAME_ID = "retro-bowl";
        const urlParams = new URLSearchParams(window.location.search);
        let tournamentId = urlParams.get("tournament") ? parseInt(urlParams.get("tournament")) : null;
        let tournamentBanner = null;

        function createTournamentBanner() {
            if (tournamentBanner) return tournamentBanner;
            tournamentBanner = document.createElement("div");
            tournamentBanner.id = "tournamentBanner";
            tournamentBanner.style.cssText = "position: fixed; top: 0; left: 0; right: 0; background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; text-align: center; padding: 10px; font-weight: bold; z-index: 10000; display: flex; justify-content: center; align-items: center; gap: 15px;";
            document.body.prepend(tournamentBanner);
            document.body.style.paddingTop = "40px";
            return tournamentBanner;
        }

        function showTournamentActive(tournament) {
            const banner = createTournamentBanner();
            banner.innerHTML = "&#127942; " + tournament.name + " - " + tournament.timeRemaining + " <a href=\"tournaments.html\" style=\"color: #000; margin-left: 15px;\">View Standings</a>";
        }

        function showTournamentJoinOffer(tournament) {
            const banner = createTournamentBanner();
            banner.innerHTML = "<span>&#127942; Active Tournament: <strong>" + tournament.name + "</strong> (" + tournament.timeRemaining + ")</span> <button onclick=\"joinTournament(" + tournament.id + ")\" style=\"background: #000; color: #ffd700; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold;\">JOIN</button> <button onclick=\"dismissTournament()\" style=\"background: transparent; color: #333; border: 1px solid #333; padding: 5px 10px; border-radius: 5px; cursor: pointer;\">X</button>";
        }

        function joinTournament(id) {
            tournamentId = id;
            localStorage.setItem("joinedTournament_" + GAME_ID, id);
            fetch("tournament.php?action=scores&id=" + id).then(function(r) { return r.json(); }).then(function(data) {
                if (data.success) showTournamentActive(data.tournament);
            });
        }

        function dismissTournament() {
            if (tournamentBanner) { tournamentBanner.remove(); tournamentBanner = null; document.body.style.paddingTop = "0"; }
            sessionStorage.setItem("dismissedTournament_" + GAME_ID, "true");
        }

        function submitToTournament(playerName, score) {
            if (tournamentId) {
                fetch("tournament.php", { method: "POST", headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ action: "submit", tournamentId: tournamentId, name: playerName, score: score })
                }).then(function(r) { return r.json(); }).then(function(t) { 
                    if (t.success) console.log("Tournament rank: #" + t.rank);
                }).catch(function() {});
            }
        }

        (function initTournament() {
            if (tournamentId) {
                fetch("tournament.php?action=scores&id=" + tournamentId)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.tournament.status === "active") showTournamentActive(data.tournament);
                    }).catch(function() {});
                return;
            }
            var joinedId = localStorage.getItem("joinedTournament_" + GAME_ID);
            if (joinedId) {
                fetch("tournament.php?action=scores&id=" + joinedId)
                    .then(function(r) { return r.json(); })
                    .then(function(data) {
                        if (data.success && data.tournament.status === "active") {
                            tournamentId = parseInt(joinedId);
                            showTournamentActive(data.tournament);
                        } else { localStorage.removeItem("joinedTournament_" + GAME_ID); }
                    }).catch(function() {});
                return;
            }
            if (sessionStorage.getItem("dismissedTournament_" + GAME_ID)) return;
            fetch("tournament.php?action=active")
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    if (data.success && data.tournaments) {
                        var gameTournament = data.tournaments.find(function(t) { return t.game === GAME_ID; });
                        if (gameTournament) { tournamentId = gameTournament.id; showTournamentJoinOffer(gameTournament); }
                    }
                }).catch(function() {});
        })();

        // ============================================
        // SETUP
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width;
        const H = canvas.height;

        // Scale canvas for mobile
        function resizeCanvas() {
            const maxW = Math.min(500, window.innerWidth - 20);
            const scale = maxW / 500;
            canvas.style.width = maxW + 'px';
            canvas.style.height = (600 * scale) + 'px';
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        // TEAMS
        // ============================================
        const TEAMS = [
            { name: 'Rockets', color: '#e74c3c', abbr: 'RKT' },
            { name: 'Thunder', color: '#3498db', abbr: 'THN' },
            { name: 'Wolves', color: '#9b59b6', abbr: 'WLV' },
            { name: 'Eagles', color: '#27ae60', abbr: 'EGL' },
            { name: 'Bears', color: '#e67e22', abbr: 'BRS' },
            { name: 'Sharks', color: '#1abc9c', abbr: 'SHK' },
            { name: 'Lions', color: '#f1c40f', abbr: 'LNS' },
            { name: 'Hawks', color: '#c0392b', abbr: 'HWK' }
        ];

        const PLAYS = [
            { name: '📍 Short Pass', type: 'short' },
            { name: '🚀 Deep Ball', type: 'deep' },
            { name: '↔️ Spread', type: 'spread' },
            { name: '🏃 QB Run', type: 'run' }
        ];

        // ============================================
        // GAME STATE
        // ============================================
        let gameState = 'menu';
        let seasonMode = false;
        let currentWeek = 0;
        let seasonRecord = { wins: 0, losses: 0 };
        let schedule = [];

        let myTeam = { ...TEAMS[0] };
        let oppTeam = { ...TEAMS[1] };
        let myScore = 0;
        let oppScore = 0;
        let quarter = 1;
        let timeLeft = 120;
        let down = 1;
        let yardsToGo = 10;
        let ballYardLine = 25;
        let playRunning = false;
        let currentPlayType = 'short';

        // Field objects
        let qb = null;
        let receivers = [];
        let defenders = [];
        let ball = null;
        let ballInAir = false;
        let targetReceiver = null;

        // Input
        let isDragging = false;
        let dragStartPos = null;

        // ============================================
        // FIELD COORDINATES
        // ============================================
        // Behind-QB view: QB at bottom, end zone at top
        // Y = 0 is top (end zone), Y = H is bottom (behind QB)

        const FIELD_TOP = 50;      // End zone starts here
        const FIELD_BOTTOM = 550;  // QB starts here
        const SCRIMMAGE_Y = 480;   // Line of scrimmage

        function yardToFieldY(yardsFromScrimmage) {
            // 0 yards = scrimmage line, positive = toward end zone
            // 10 yards to go fills most of the visible field
            const pixelsPerYard = 30;
            return SCRIMMAGE_Y - (yardsFromScrimmage * pixelsPerYard);
        }

        // ============================================
        // DRAWING
        // ============================================
        function drawField() {
            // Sky/background at top
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, FIELD_TOP);

            // Green field
            ctx.fillStyle = '#2d5a27';
            ctx.fillRect(0, FIELD_TOP, W, FIELD_BOTTOM - FIELD_TOP);

            // End zone
            ctx.fillStyle = oppTeam.color;
            ctx.globalAlpha = 0.4;
            ctx.fillRect(0, FIELD_TOP, W, 60);
            ctx.globalAlpha = 1;

            // End zone text
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.globalAlpha = 0.5;
            ctx.fillText('END ZONE', W/2, FIELD_TOP + 40);
            ctx.globalAlpha = 1;

            // Yard lines (every 10 yards visible)
            ctx.strokeStyle = 'rgba(255,255,255,0.4)';
            ctx.lineWidth = 2;
            for (let yards = 0; yards <= 20; yards += 5) {
                const y = yardToFieldY(yards);
                if (y > FIELD_TOP && y < FIELD_BOTTOM) {
                    ctx.beginPath();
                    ctx.moveTo(30, y);
                    ctx.lineTo(W - 30, y);
                    ctx.stroke();
                }
            }

            // Line of scrimmage (yellow)
            ctx.strokeStyle = '#ffd700';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(20, SCRIMMAGE_Y);
            ctx.lineTo(W - 20, SCRIMMAGE_Y);
            ctx.stroke();

            // First down line (red dashed)
            const firstDownY = yardToFieldY(yardsToGo);
            if (firstDownY > FIELD_TOP) {
                ctx.strokeStyle = '#ff6b6b';
                ctx.lineWidth = 3;
                ctx.setLineDash([10, 10]);
                ctx.beginPath();
                ctx.moveTo(20, firstDownY);
                ctx.lineTo(W - 20, firstDownY);
                ctx.stroke();
                ctx.setLineDash([]);

                // First down marker
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'left';
                ctx.fillText('1ST', 5, firstDownY + 5);
            }

            // Sidelines
            ctx.fillStyle = '#fff';
            ctx.fillRect(15, FIELD_TOP, 3, FIELD_BOTTOM - FIELD_TOP);
            ctx.fillRect(W - 18, FIELD_TOP, 3, FIELD_BOTTOM - FIELD_TOP);
        }

        function drawPlayers() {
            // Draw receivers
            receivers.forEach((r, i) => {
                // Shadow
                ctx.beginPath();
                ctx.ellipse(r.x, r.y + 5, 12, 6, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();

                // Player body
                ctx.beginPath();
                ctx.arc(r.x, r.y, r.radius, 0, Math.PI * 2);
                ctx.fillStyle = r.hasBall ? '#ffd700' : myTeam.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                // Number
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(80 + i, r.x, r.y);

                // Target indicator
                if (!ballInAir && !r.hasBall && qb && qb.hasBall && playRunning) {
                    ctx.beginPath();
                    ctx.arc(r.x, r.y, r.radius + 8, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.6)';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            });

            // Draw defenders
            defenders.forEach(d => {
                // Shadow
                ctx.beginPath();
                ctx.ellipse(d.x, d.y + 5, 12, 6, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();

                // Player body
                ctx.beginPath();
                ctx.arc(d.x, d.y, d.radius, 0, Math.PI * 2);
                ctx.fillStyle = oppTeam.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            // Draw QB
            if (qb) {
                // Shadow
                ctx.beginPath();
                ctx.ellipse(qb.x, qb.y + 5, 15, 8, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();

                // QB body
                ctx.beginPath();
                ctx.arc(qb.x, qb.y, qb.radius, 0, Math.PI * 2);
                ctx.fillStyle = qb.hasBall ? '#ffd700' : myTeam.color;
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();

                // QB label
                ctx.fillStyle = qb.hasBall ? '#000' : '#fff';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('QB', qb.x, qb.y);
            }

            // Draw ball in air
            if (ball && ballInAir) {
                // Ball shadow
                ctx.beginPath();
                ctx.ellipse(ball.x, ball.shadowY, 8, 4, 0, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.3)';
                ctx.fill();

                // Ball
                ctx.save();
                ctx.translate(ball.x, ball.y);
                ctx.rotate(ball.rotation);
                ctx.beginPath();
                ctx.ellipse(0, 0, 12, 7, 0, 0, Math.PI * 2);
                ctx.fillStyle = '#8B4513';
                ctx.fill();
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.stroke();
                // Laces
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(-4, 0);
                ctx.lineTo(4, 0);
                ctx.stroke();
                ctx.restore();
            }
        }

        // ============================================
        // PLAY SETUP
        // ============================================
        function setupPlay(playType) {
            currentPlayType = playType;

            // QB at bottom center
            qb = {
                x: W / 2,
                y: SCRIMMAGE_Y + 40,
                radius: 18,
                hasBall: true,
                vx: 0,
                vy: 0
            };

            // Setup receivers based on play type
            receivers = [];

            if (playType === 'short') {
                receivers.push({ x: W/2 - 80, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 120, targetX: W/2 - 100, speed: 2.5 });
                receivers.push({ x: W/2, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 100, targetX: W/2, speed: 2.5 });
                receivers.push({ x: W/2 + 80, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 120, targetX: W/2 + 100, speed: 2.5 });
            } else if (playType === 'deep') {
                receivers.push({ x: W/2 - 100, y: SCRIMMAGE_Y - 20, targetY: FIELD_TOP + 100, targetX: W/2 - 80, speed: 3 });
                receivers.push({ x: W/2 + 100, y: SCRIMMAGE_Y - 20, targetY: FIELD_TOP + 100, targetX: W/2 + 80, speed: 3 });
            } else if (playType === 'spread') {
                receivers.push({ x: W/2 - 120, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 150, targetX: 60, speed: 2.8 });
                receivers.push({ x: W/2, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 180, targetX: W/2, speed: 2.8 });
                receivers.push({ x: W/2 + 120, y: SCRIMMAGE_Y - 20, targetY: SCRIMMAGE_Y - 150, targetX: W - 60, speed: 2.8 });
            } else if (playType === 'run') {
                // No receivers for run play, just blockers
                receivers.push({ x: W/2 - 60, y: SCRIMMAGE_Y - 10, targetY: SCRIMMAGE_Y - 50, targetX: W/2 - 80, speed: 1, isBlocker: true });
                receivers.push({ x: W/2 + 60, y: SCRIMMAGE_Y - 10, targetY: SCRIMMAGE_Y - 50, targetX: W/2 + 80, speed: 1, isBlocker: true });
            }

            // Add common properties to receivers
            receivers.forEach(r => {
                r.radius = 14;
                r.hasBall = false;
                r.startX = r.x;
                r.startY = r.y;
            });

            // Setup defenders - START THEM FURTHER BACK
            defenders = [];
            const defStartY = SCRIMMAGE_Y - 180; // Much further from scrimmage

            // Defensive line (slower, closer)
            defenders.push({ x: W/2 - 60, y: SCRIMMAGE_Y - 80, radius: 14, speed: 1.2, role: 'line' });
            defenders.push({ x: W/2 + 60, y: SCRIMMAGE_Y - 80, radius: 14, speed: 1.2, role: 'line' });

            // Linebackers
            defenders.push({ x: W/2 - 100, y: defStartY, radius: 13, speed: 1.8, role: 'lb' });
            defenders.push({ x: W/2, y: defStartY - 30, radius: 13, speed: 1.8, role: 'lb' });
            defenders.push({ x: W/2 + 100, y: defStartY, radius: 13, speed: 1.8, role: 'lb' });

            // Deep safety
            defenders.push({ x: W/2, y: FIELD_TOP + 120, radius: 13, speed: 2.2, role: 'safety' });

            ball = null;
            ballInAir = false;
            targetReceiver = null;
            playRunning = true;
            gameState = 'playing';

            hideAllOverlays();
        }

        // ============================================
        // UPDATE LOGIC
        // ============================================
        function update() {
            if (!playRunning) return;

            // Update receivers - run routes
            receivers.forEach(r => {
                if (r.hasBall) {
                    // Receiver with ball runs toward end zone
                    r.y -= 4;
                    r.x += (W/2 - r.x) * 0.02; // Drift toward center
                } else if (!r.isBlocker) {
                    // Run route
                    const dx = r.targetX - r.x;
                    const dy = r.targetY - r.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 5) {
                        r.x += (dx / dist) * r.speed;
                        r.y += (dy / dist) * r.speed;
                    }
                } else {
                    // Blockers move forward slowly
                    r.y += (r.targetY - r.y) * 0.05;
                    r.x += (r.targetX - r.x) * 0.05;
                }

                // Keep in bounds
                r.x = Math.max(30, Math.min(W - 30, r.x));
                r.y = Math.max(FIELD_TOP, Math.min(FIELD_BOTTOM, r.y));
            });

            // Update defenders
            defenders.forEach(d => {
                let targetX, targetY;

                if (ballInAir && ball) {
                    // Chase the ball
                    targetX = ball.x;
                    targetY = ball.y;
                } else if (qb && qb.hasBall) {
                    // Rush the QB (but line rushes, others cover)
                    if (d.role === 'line') {
                        targetX = qb.x;
                        targetY = qb.y;
                    } else if (d.role === 'safety') {
                        // Safety stays deep
                        targetX = W/2;
                        targetY = FIELD_TOP + 100;
                    } else {
                        // LBs cover receivers
                        const nearestRec = receivers.reduce((nearest, r) => {
                            const dist = Math.sqrt((d.x - r.x)**2 + (d.y - r.y)**2);
                            const nearestDist = nearest ? Math.sqrt((d.x - nearest.x)**2 + (d.y - nearest.y)**2) : Infinity;
                            return dist < nearestDist ? r : nearest;
                        }, null);
                        if (nearestRec) {
                            targetX = nearestRec.x;
                            targetY = nearestRec.y - 30; // Stay between receiver and end zone
                        }
                    }
                } else {
                    // Someone has ball, chase them
                    const ballCarrier = receivers.find(r => r.hasBall);
                    if (ballCarrier) {
                        targetX = ballCarrier.x;
                        targetY = ballCarrier.y;
                        d.speed = Math.min(d.speed + 0.01, 3); // Speed up to chase
                    }
                }

                if (targetX !== undefined) {
                    const dx = targetX - d.x;
                    const dy = targetY - d.y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist > 5) {
                        d.x += (dx / dist) * d.speed;
                        d.y += (dy / dist) * d.speed;
                    }
                }

                // Keep in bounds
                d.x = Math.max(20, Math.min(W - 20, d.x));
                d.y = Math.max(FIELD_TOP, Math.min(FIELD_BOTTOM, d.y));
            });

            // Update ball in flight
            if (ball && ballInAir) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.z += ball.vz;
                ball.vz -= 0.3; // Gravity
                ball.rotation += 0.2;

                // Shadow follows ball on ground
                ball.shadowY = ball.groundY;

                // Ball height affects actual Y position
                ball.y = ball.groundY - ball.z * 0.5;

                // Check if ball reached target or hit ground
                if (ball.z <= 0) {
                    // Ball at catch height
                    ball.z = 0;

                    // Check if receiver catches it
                    if (targetReceiver) {
                        const dist = Math.sqrt((ball.x - targetReceiver.x)**2 + (ball.groundY - targetReceiver.y)**2);
                        if (dist < 35) {
                            // Caught!
                            targetReceiver.hasBall = true;
                            ballInAir = false;
                            ball = null;
                        } else {
                            // Incomplete
                            endPlay('incomplete');
                            return;
                        }
                    } else {
                        endPlay('incomplete');
                        return;
                    }
                }

                // Check for interception
                defenders.forEach(d => {
                    if (ballInAir && ball) {
                        const dist = Math.sqrt((ball.x - d.x)**2 + (ball.groundY - d.y)**2);
                        if (dist < 25 && ball.z < 30) {
                            endPlay('interception');
                        }
                    }
                });
            }

            // Check for sack (defender reaches QB with ball)
            if (qb && qb.hasBall) {
                defenders.forEach(d => {
                    const dist = Math.sqrt((qb.x - d.x)**2 + (qb.y - d.y)**2);
                    if (dist < qb.radius + d.radius) {
                        endPlay('sack');
                    }
                });
            }

            // Check for tackle (defender reaches receiver with ball)
            receivers.forEach(r => {
                if (r.hasBall) {
                    defenders.forEach(d => {
                        const dist = Math.sqrt((r.x - d.x)**2 + (r.y - d.y)**2);
                        if (dist < r.radius + d.radius) {
                            const yardsGained = Math.floor((SCRIMMAGE_Y - r.y) / 30);
                            endPlay('tackle', yardsGained);
                        }
                    });

                    // Touchdown check
                    if (r.y <= FIELD_TOP + 60) {
                        endPlay('touchdown');
                    }

                    // Out of bounds
                    if (r.x < 25 || r.x > W - 25) {
                        const yardsGained = Math.floor((SCRIMMAGE_Y - r.y) / 30);
                        endPlay('tackle', yardsGained);
                    }
                }
            });

            // QB running
            if (qb && qb.hasBall && currentPlayType === 'run') {
                qb.y -= 2; // Auto run forward slowly

                // Touchdown check
                if (qb.y <= FIELD_TOP + 60) {
                    endPlay('touchdown');
                }
            }
        }

        // ============================================
        // INPUT
        // ============================================
        function getCanvasPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = W / rect.width;
            const scaleY = H / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', handleTapStart);
        canvas.addEventListener('touchstart', handleTapStart);
        canvas.addEventListener('mouseup', handleTapEnd);
        canvas.addEventListener('touchend', handleTapEnd);

        function handleTapStart(e) {
            e.preventDefault();
            if (!playRunning || !qb || !qb.hasBall) return;

            isDragging = true;
            dragStartPos = getCanvasPos(e);
        }

        function handleTapEnd(e) {
            e.preventDefault();
            if (!isDragging || !qb || !qb.hasBall || ballInAir) return;
            isDragging = false;

            const pos = dragStartPos;

            // Check if tapped on a receiver
            let tappedReceiver = null;
            let minDist = Infinity;

            receivers.forEach(r => {
                if (r.isBlocker) return;
                const dist = Math.sqrt((pos.x - r.x)**2 + (pos.y - r.y)**2);
                if (dist < 50 && dist < minDist) {
                    minDist = dist;
                    tappedReceiver = r;
                }
            });

            if (tappedReceiver) {
                throwBall(tappedReceiver);
            }
        }

        function throwBall(receiver) {
            if (!qb || !qb.hasBall) return;

            targetReceiver = receiver;
            qb.hasBall = false;

            // Calculate throw - lead the receiver
            const leadTime = 20;
            const targetX = receiver.x + (receiver.targetX - receiver.x) * 0.3;
            const targetY = receiver.y - 40; // Throw ahead of receiver

            const dx = targetX - qb.x;
            const dy = targetY - qb.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const speed = Math.min(dist / 15, 18);

            ball = {
                x: qb.x,
                y: qb.y,
                groundY: qb.y,
                z: 10, // Start a bit off ground
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed * 0.8,
                vz: 6, // Arc upward
                rotation: 0,
                shadowY: qb.y
            };

            ballInAir = true;
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function endPlay(result, yards = 0) {
            playRunning = false;

            let resultText = '';
            let details = '';

            switch (result) {
                case 'touchdown':
                    myScore += 7;
                    resultText = '🏈 TOUCHDOWN!';
                    details = '+7 points!';
                    resetForKickoff();
                    break;

                case 'tackle':
                    resultText = yards >= 0 ? `+${yards} YARDS` : `${yards} YARDS`;
                    details = advanceDown(yards);
                    break;

                case 'incomplete':
                    resultText = '❌ INCOMPLETE';
                    details = advanceDown(0);
                    break;

                case 'interception':
                    resultText = '😱 INTERCEPTED!';
                    details = 'Turnover!';
                    simulateCPUDrive();
                    break;

                case 'sack':
                    resultText = '💥 SACKED!';
                    details = advanceDown(-5);
                    break;
            }

            updateScoreDisplay();
            showResult(resultText, details);
        }

        function advanceDown(yards) {
            yardsToGo -= yards;
            ballYardLine += yards;
            timeLeft -= 15;

            let details = '';

            if (yardsToGo <= 0) {
                down = 1;
                yardsToGo = 10;
                details = 'First down!';
            } else {
                down++;
                if (down > 4) {
                    details = 'Turnover on downs!';
                    simulateCPUDrive();
                    return details;
                } else {
                    details = `${down}${getOrdinal(down)} & ${yardsToGo}`;
                }
            }

            if (timeLeft <= 0) {
                advanceQuarter();
            }

            updateGameInfo();
            return details;
        }

        function resetForKickoff() {
            ballYardLine = 25;
            down = 1;
            yardsToGo = 10;
            timeLeft -= 10;
            if (timeLeft <= 0) advanceQuarter();
            updateGameInfo();
        }

        function simulateCPUDrive() {
            // Simple CPU simulation
            setTimeout(() => {
                const scores = Math.random() > 0.6;
                if (scores) {
                    oppScore += 7;
                    updateScoreDisplay();
                }

                ballYardLine = 25;
                down = 1;
                yardsToGo = 10;
                timeLeft -= 45;

                if (timeLeft <= 0) advanceQuarter();
                updateGameInfo();
            }, 100);
        }

        function advanceQuarter() {
            quarter++;
            timeLeft = 120;

            if (quarter > 4) {
                setTimeout(() => endGame(), 500);
                return;
            }

            document.getElementById('quarter').textContent = 'Q' + quarter;
        }

        function endGame() {
            gameState = 'gameOver';

            const won = myScore > oppScore;
            if (seasonMode) {
                if (won) seasonRecord.wins++;
                else seasonRecord.losses++;
                schedule[currentWeek].result = `${myScore}-${oppScore}`;
                schedule[currentWeek].won = won;
            }

            document.getElementById('gameOverTitle').textContent = won ? '🏆 Victory!' : 'Defeat';
            document.getElementById('finalScore').textContent = `Final: ${myScore} - ${oppScore}`;
            document.getElementById('seasonRecord').textContent = seasonMode ?
                `Record: ${seasonRecord.wins}-${seasonRecord.losses}` : '';
            document.getElementById('nextGameBtn').style.display =
                (seasonMode && currentWeek < 7) ? 'inline-block' : 'none';

            // Reset leaderboard submit
            const submitBtn = document.getElementById('submitScoreBtn');
            if (submitBtn) { submitBtn.disabled = false; submitBtn.textContent = 'Submit'; }
            const msgEl = document.getElementById('leaderboardMsg');
            if (msgEl) msgEl.textContent = '';

            gameOverOverlay.classList.remove('hidden');
            trackGameEnd();

            // Award coins on server (if logged in)
            fetch('api/game-rewards.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ game: 'retro-bowl', score: myScore })
            }).then(r => r.json()).then(data => {
                if (data.success) {
                    const coinsEl = document.getElementById('coinsEarned');
                    if (coinsEl) coinsEl.textContent = data.coinsEarned;
                }
            }).catch(() => {});
        }

        function showResult(text, details) {
            document.getElementById('resultText').innerHTML = text;
            document.getElementById('resultDetails').textContent = details;
            resultOverlay.classList.remove('hidden');
            gameState = 'result';
        }

        function showPlaySelect() {
            const container = document.getElementById('playSelect');
            container.innerHTML = '';

            PLAYS.forEach(play => {
                const btn = document.createElement('button');
                btn.className = 'play-btn';
                btn.textContent = play.name;
                btn.onclick = () => setupPlay(play.type);
                container.appendChild(btn);
            });

            playOverlay.classList.remove('hidden');
            gameState = 'playSelect';
        }

        function updateGameInfo() {
            document.getElementById('downInfo').textContent = `${down}${getOrdinal(down)} & ${yardsToGo}`;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('time').textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function updateScoreDisplay() {
            document.getElementById('myScore').textContent = myScore;
            document.getElementById('oppScore').textContent = oppScore;
        }

        function getOrdinal(n) {
            return ['st', 'nd', 'rd'][n - 1] || 'th';
        }

        function hideAllOverlays() {
            document.querySelectorAll('.overlay').forEach(o => o.classList.add('hidden'));
        }

        // ============================================
        // SEASON
        // ============================================
        function generateSchedule() {
            schedule = [];
            const opponents = TEAMS.filter(t => t.name !== myTeam.name);
            for (let i = 0; i < 8; i++) {
                schedule.push({
                    week: i + 1,
                    opponent: opponents[i % opponents.length],
                    result: null,
                    won: null
                });
            }
        }

        function showSchedule() {
            generateSchedule();
            const container = document.getElementById('schedule');
            container.innerHTML = '';

            schedule.forEach((game, i) => {
                const div = document.createElement('div');
                div.className = 'schedule-game' +
                    (i === currentWeek ? ' current' : '') +
                    (game.won === true ? ' won' : '') +
                    (game.won === false ? ' lost' : '');
                div.innerHTML = `
                    <span class="week-num">Week ${game.week}</span>
                    <span class="opponent">${game.opponent.name}</span>
                    <span class="game-result">${game.result || '-'}</span>
                `;
                container.appendChild(div);
            });

            scheduleOverlay.classList.remove('hidden');
        }

        // ============================================
        // BUTTON HANDLERS
        // ============================================
        document.getElementById('playBtn').onclick = () => {
            seasonMode = true;
            currentWeek = 0;
            seasonRecord = { wins: 0, losses: 0 };
            myTeam = { ...TEAMS[0] };
            showSchedule();
        };

        document.getElementById('quickPlayBtn').onclick = () => {
            seasonMode = false;
            myTeam = { ...TEAMS[0] };
            oppTeam = { ...TEAMS[Math.floor(Math.random() * 7) + 1] };
            startGame();
        };

        document.getElementById('startSeasonBtn').onclick = () => {
            oppTeam = schedule[currentWeek].opponent;
            startGame();
        };

        document.getElementById('continueBtn').onclick = () => {
            resultOverlay.classList.add('hidden');
            if (quarter > 4) {
                endGame();
            } else {
                showPlaySelect();
            }
        };

        document.getElementById('nextGameBtn').onclick = () => {
            currentWeek++;
            currentWeek < 8 ? showSchedule() : (hideAllOverlays(), menuOverlay.classList.remove('hidden'));
        };

        document.getElementById('menuBtn').onclick = () => {
            hideAllOverlays();
            menuOverlay.classList.remove('hidden');
        };

        function startGame() {
            hideAllOverlays();
            myScore = 0;
            oppScore = 0;
            quarter = 1;
            timeLeft = 120;
            down = 1;
            yardsToGo = 10;
            ballYardLine = 25;

            document.getElementById('myTeamName').textContent = myTeam.abbr;
            document.getElementById('oppTeamName').textContent = oppTeam.abbr;
            document.getElementById('quarter').textContent = 'Q1';

            updateScoreDisplay();
            updateGameInfo();
            trackGameStart();
            showPlaySelect();
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            ctx.clearRect(0, 0, W, H);
            drawField();

            if (gameState === 'playing') {
                update();
                drawPlayers();
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // STATS
        // ============================================
        let gameStartTime = 0;
        function loadArcadeStats() {
            return JSON.parse(localStorage.getItem('arcadeStats') || '{"totalGamesPlayed":0,"totalTimePlayed":0,"totalCoinsEarned":0,"games":{}}');
        }
        function saveArcadeStats(s) { localStorage.setItem('arcadeStats', JSON.stringify(s)); }
        function trackGameStart() { gameStartTime = Date.now(); }
        function trackGameEnd() {
            const stats = loadArcadeStats();
            const t = Math.floor((Date.now() - gameStartTime) / 1000);
            stats.totalGamesPlayed++;
            stats.totalTimePlayed += t;
            if (!stats.games['retro-bowl']) stats.games['retro-bowl'] = { gamesPlayed: 0, timePlayed: 0, wins: 0, losses: 0, totalPoints: 0 };
            const g = stats.games['retro-bowl'];
            g.gamesPlayed++;
            g.timePlayed += t;
            g.totalPoints += myScore;
            myScore > oppScore ? g.wins++ : g.losses++;
            saveArcadeStats(stats);
        }

        // Leaderboard submission
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const nameInput = document.getElementById('playerName');
            const msgEl = document.getElementById('leaderboardMsg');
            const btn = this;
            const playerName = nameInput.value.trim() || 'Anonymous';
            const playerScore = myScore;
            btn.disabled = true; btn.textContent = '...';
            msgEl.textContent = 'Submitting...'; msgEl.style.color = '#888';
            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: 'retro-bowl', name: playerName, score: playerScore })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#4caf50';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    btn.textContent = 'Done!';
                    submitToTournament(playerName, playerScore);
                    localStorage.setItem('retroPlayerName', playerName);
                } else { throw new Error(data.error); }
            } catch (e) { msgEl.style.color = '#f00'; msgEl.textContent = 'Failed!'; btn.disabled = false; btn.textContent = 'Submit'; }
        });
        const sn = localStorage.getItem('retroPlayerName');
        if (sn) document.getElementById('playerName').value = sn;

        // Start
        gameLoop();
    </script>
