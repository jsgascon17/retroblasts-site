<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helicopter - RetroBlasts</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 10px;
        }
        .game-container {
            background: rgba(0,0,0,0.5);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        canvas {
            display: block;
            border-radius: 10px;
            cursor: pointer;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            gap: 20px;
            flex-wrap: wrap;
        }
        .header h1 { color: #ffd700; font-size: 1.5rem; }
        .back-btn {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
        }
        .back-btn:hover { background: rgba(255,255,255,0.2); }
        .stats {
            display: flex;
            gap: 30px;
            font-size: 1.1rem;
        }
        .stats span { color: #aaa; }
        .stats strong { color: #ffd700; }
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .modal {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #ffd700;
            max-width: 90%;
        }
        .modal h2 { color: #ffd700; font-size: 2rem; margin-bottom: 20px; }
        .modal p { color: #aaa; margin-bottom: 15px; font-size: 1.1rem; }
        .modal .score { font-size: 3rem; color: #fff; margin: 20px 0; }
        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: #fff;
            border: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            color: #888;
            font-size: 0.9rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>🚁 Helicopter</h1>
            <div class="stats">
                <div><span>Score:</span> <strong id="score">0</strong></div>
                <div><span>Best:</span> <strong id="best">0</strong></div>
            </div>
            <a href="index.html" class="back-btn">← Back</a>
        </div>
        <canvas id="game" width="600" height="400"></canvas>
        <p class="instructions">Click or tap to fly up • Avoid the walls!</p>
    </div>

    <div class="overlay" id="startScreen">
        <div class="modal">
            <h2>🚁 Helicopter</h2>
            <p>Click or tap to fly through the cave!</p>
            <p>Don't hit the walls or obstacles!</p>
            <button class="btn" id="startBtn">START</button>
        </div>
    </div>

    <div class="overlay hidden" id="gameOverScreen">
        <div class="modal">
            <h2>💥 Crashed!</h2>
            <div class="score" id="finalScore">0</div>
            <p>Best: <span id="finalBest">0</span></p>
            <button class="btn" id="restartBtn">PLAY AGAIN</button>
        </div>
    </div>

    <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;

    let gameRunning = false;
    let score = 0;
    let best = parseInt(localStorage.getItem('helicopterBest')) || 0;
    let heli = { x: 100, y: H/2, vy: 0, size: 20 };
    let obstacles = [];
    let caveTop = 50, caveBottom = H - 50;
    let caveTargetTop = 50, caveTargetBottom = H - 50;
    let frameCount = 0;
    let holding = false;
    let speed = 3;
    let obstacleTimer = 0;

    document.getElementById('best').textContent = best;
    document.getElementById('finalBest').textContent = best;

    function reset() {
        heli = { x: 100, y: H/2, vy: 0, size: 20 };
        obstacles = [];
        caveTop = 50;
        caveBottom = H - 50;
        caveTargetTop = 50;
        caveTargetBottom = H - 50;
        score = 0;
        frameCount = 0;
        speed = 3;
        obstacleTimer = 0;
        document.getElementById('score').textContent = 0;
    }

    function startGame() {
        reset();
        document.getElementById('startScreen').classList.add('hidden');
        document.getElementById('gameOverScreen').classList.add('hidden');
        gameRunning = true;
        gameLoop();
    }

    function gameOver() {
        gameRunning = false;
        
        if (score > best) {
            best = score;
            localStorage.setItem('helicopterBest', best);
            document.getElementById('best').textContent = best;
        }
        
        document.getElementById('finalScore').textContent = score;
        document.getElementById('finalBest').textContent = best;
        document.getElementById('gameOverScreen').classList.remove('hidden');

        // Save score to server
        fetch('api/add-coins.php', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ game: 'helicopter', coins: Math.floor(score / 10), score: score })
        }).catch(() => {});
    }

    function update() {
        frameCount++;
        
        // Increase difficulty
        if (frameCount % 500 === 0) speed = Math.min(6, speed + 0.5);
        
        // Physics
        if (holding) {
            heli.vy -= 0.6;
        } else {
            heli.vy += 0.4;
        }
        heli.vy = Math.max(-8, Math.min(8, heli.vy));
        heli.y += heli.vy;

        // Move cave
        if (frameCount % 60 === 0) {
            const gap = 150 - Math.min(50, Math.floor(score / 50) * 5);
            caveTargetTop = Math.random() * (H - gap - 100) + 20;
            caveTargetBottom = caveTargetTop + gap + 60;
        }
        caveTop += (caveTargetTop - caveTop) * 0.02;
        caveBottom += (caveTargetBottom - caveBottom) * 0.02;

        // Spawn obstacles
        obstacleTimer++;
        if (obstacleTimer > 150 - Math.min(80, score)) {
            obstacleTimer = 0;
            const obsH = 30 + Math.random() * 50;
            const fromTop = Math.random() > 0.5;
            obstacles.push({
                x: W + 50,
                y: fromTop ? caveTop : caveBottom - obsH,
                w: 30,
                h: obsH,
                fromTop
            });
        }

        // Move obstacles
        obstacles.forEach(o => o.x -= speed);
        obstacles = obstacles.filter(o => o.x > -50);

        // Score
        obstacles.forEach(o => {
            if (!o.scored && o.x + o.w < heli.x) {
                o.scored = true;
                score++;
                document.getElementById('score').textContent = score;
            }
        });

        // Collision with cave
        if (heli.y - heli.size/2 < caveTop || heli.y + heli.size/2 > caveBottom) {
            gameOver();
            return;
        }

        // Collision with obstacles
        for (let o of obstacles) {
            if (heli.x + heli.size/2 > o.x && heli.x - heli.size/2 < o.x + o.w &&
                heli.y + heli.size/2 > o.y && heli.y - heli.size/2 < o.y + o.h) {
                gameOver();
                return;
            }
        }
    }

    function draw() {
        // Sky gradient
        const grad = ctx.createLinearGradient(0, 0, 0, H);
        grad.addColorStop(0, '#1a1a2e');
        grad.addColorStop(1, '#0f3460');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        // Cave walls
        ctx.fillStyle = '#2d4a3e';
        ctx.fillRect(0, 0, W, caveTop);
        ctx.fillRect(0, caveBottom, W, H - caveBottom);

        // Cave edge detail
        ctx.strokeStyle = '#4a7c59';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(0, caveTop);
        ctx.lineTo(W, caveTop);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, caveBottom);
        ctx.lineTo(W, caveBottom);
        ctx.stroke();

        // Obstacles
        ctx.fillStyle = '#8b4513';
        obstacles.forEach(o => {
            ctx.fillRect(o.x, o.y, o.w, o.h);
            ctx.strokeStyle = '#654321';
            ctx.strokeRect(o.x, o.y, o.w, o.h);
        });

        // Helicopter
        ctx.save();
        ctx.translate(heli.x, heli.y);
        ctx.rotate(heli.vy * 0.05);
        
        // Body
        ctx.fillStyle = '#e74c3c';
        ctx.beginPath();
        ctx.ellipse(0, 0, 25, 12, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Cockpit
        ctx.fillStyle = '#3498db';
        ctx.beginPath();
        ctx.ellipse(8, -2, 10, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        
        // Tail
        ctx.fillStyle = '#c0392b';
        ctx.fillRect(-30, -3, 15, 6);
        
        // Rotor
        ctx.fillStyle = '#333';
        ctx.fillRect(-20 + (frameCount % 4) * 10, -18, 40, 4);
        
        ctx.restore();
    }

    function gameLoop() {
        if (!gameRunning) return;
        update();
        draw();
        requestAnimationFrame(gameLoop);
    }

    // Controls
    function startHold() { holding = true; }
    function endHold() { holding = false; }

    canvas.addEventListener('mousedown', startHold);
    canvas.addEventListener('mouseup', endHold);
    canvas.addEventListener('mouseleave', endHold);
    canvas.addEventListener('touchstart', e => { e.preventDefault(); startHold(); });
    canvas.addEventListener('touchend', e => { e.preventDefault(); endHold(); });
    document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); startHold(); }});
    document.addEventListener('keyup', e => { if (e.code === 'Space') endHold(); });

    document.getElementById('startBtn').addEventListener('click', startGame);
    document.getElementById('restartBtn').addEventListener('click', startGame);

    // Initial draw
    reset();
    draw();
    </script>
</body>
</html>
