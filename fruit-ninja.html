<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja - Learning Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
        }
        #gameCanvas {
            border: 4px solid #fff;
            border-radius: 10px;
            cursor: none;
            touch-action: none;
        }
        .overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 4rem;
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: none;
        }
        .overlay h2 {
            font-size: 2.5rem;
            color: #ff6b6b;
            margin-bottom: 20px;
        }
        .overlay p {
            color: #aaa;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            padding: 20px 40px;
            border-radius: 15px;
            margin: 20px 0;
            text-align: center;
        }
        .stats .score-big {
            font-size: 4rem;
            color: #ffd93d;
            margin-bottom: 10px;
        }
        .stats .detail {
            color: #6bcb77;
            font-size: 1.2rem;
            margin: 5px 0;
        }
        .btn {
            padding: 15px 50px;
            font-size: 1.3rem;
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: #fff;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 10px;
            transition: all 0.2s;
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.4);
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 107, 107, 0.6);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #6bcb77, #5ab868);
            box-shadow: 0 5px 20px rgba(107, 203, 119, 0.4);
        }
        .btn-secondary:hover {
            box-shadow: 0 8px 30px rgba(107, 203, 119, 0.6);
        }
        .mode-select {
            display: flex;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
            justify-content: center;
        }
        .mode-btn {
            padding: 20px 30px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            min-width: 150px;
        }
        .mode-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: #ffd93d;
            transform: translateY(-5px);
        }
        .mode-btn.selected {
            border-color: #ffd93d;
            background: rgba(255, 217, 61, 0.2);
        }
        .mode-btn .icon { font-size: 2rem; margin-bottom: 10px; }
        .mode-btn .name { font-size: 1.1rem; font-weight: bold; }
        .mode-btn .desc { font-size: 0.8rem; color: #888; margin-top: 5px; }
        .high-scores {
            margin-top: 20px;
            color: #888;
        }
        .instructions {
            position: fixed;
            bottom: 20px;
            color: #555;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>FRUIT NINJA</h1>
        <p>Slice the fruit! Avoid the bombs!</p>
        <div class="mode-select">
            <div class="mode-btn selected" data-mode="classic">
                <div class="icon">🍎</div>
                <div class="name">Classic</div>
                <div class="desc">3 lives, endless fruit</div>
            </div>
            <div class="mode-btn" data-mode="zen">
                <div class="icon">🧘</div>
                <div class="name">Zen</div>
                <div class="desc">90 seconds, no bombs</div>
            </div>
            <div class="mode-btn" data-mode="arcade">
                <div class="icon">🎮</div>
                <div class="name">Arcade</div>
                <div class="desc">60 seconds, power-ups!</div>
            </div>
        </div>
        <button class="btn" id="startBtn">START SLICING!</button>
        <div class="high-scores">
            <p>Best Classic: <span id="highClassic">0</span> | Best Zen: <span id="highZen">0</span> | Best Arcade: <span id="highArcade">0</span></p>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="stats">
            <div class="score-big" id="finalScore">0</div>
            <div class="detail">Fruits Sliced: <span id="fruitsSliced">0</span></div>
            <div class="detail">Best Combo: <span id="bestCombo">0</span>x</div>
            <div class="detail" id="newHighScore" style="color: #ffd93d; display: none;">NEW HIGH SCORE!</div>
        </div>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
        <button class="btn btn-secondary" id="menuBtn">MAIN MENU</button>
    </div>

    <div class="instructions">
        <a href="index.html" style="color: #555; text-decoration: none;">&larr; Back to Arcade</a>
    </div>

    <script>
        // ============================================
        // AUDIO
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            const sounds = {
                slice: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(800 + Math.random() * 400, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
                    osc.start(now);
                    osc.stop(now + 0.1);
                },
                bomb: () => {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(30, now + 0.5);
                    gain.gain.setValueAtTime(0.3, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                    osc.start(now);
                    osc.stop(now + 0.5);
                },
                miss: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.3);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                },
                combo: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.setValueAtTime(659, now + 0.08);
                    osc.frequency.setValueAtTime(784, now + 0.16);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
                    osc.start(now);
                    osc.stop(now + 0.25);
                },
                powerup: () => {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                },
                frenzy: () => {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(600, now);
                    osc.frequency.setValueAtTime(800, now + 0.05);
                    osc.frequency.setValueAtTime(1000, now + 0.1);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                }
            };

            if (sounds[type]) sounds[type]();
        }

        // ============================================
        // CANVAS
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // ============================================
        // FRUIT DATA
        // ============================================
        const FRUITS = [
            { name: 'apple', emoji: '🍎', color: '#ff6b6b', splashColor: '#ffaaaa', points: 1, size: 50 },
            { name: 'orange', emoji: '🍊', color: '#ffa500', splashColor: '#ffcc80', points: 1, size: 50 },
            { name: 'watermelon', emoji: '🍉', color: '#ff6b6b', splashColor: '#90EE90', points: 2, size: 60 },
            { name: 'banana', emoji: '🍌', color: '#ffd93d', splashColor: '#fff9c4', points: 1, size: 45 },
            { name: 'grape', emoji: '🍇', color: '#9b59b6', splashColor: '#d7bde2', points: 1, size: 45 },
            { name: 'strawberry', emoji: '🍓', color: '#e74c3c', splashColor: '#f5b7b1', points: 1, size: 40 },
            { name: 'pineapple', emoji: '🍍', color: '#f1c40f', splashColor: '#fcf3cf', points: 2, size: 55 },
            { name: 'coconut', emoji: '🥥', color: '#8b4513', splashColor: '#ffffff', points: 3, size: 55 },
            { name: 'kiwi', emoji: '🥝', color: '#27ae60', splashColor: '#abebc6', points: 1, size: 40 },
            { name: 'peach', emoji: '🍑', color: '#ffb6c1', splashColor: '#ffe4e9', points: 1, size: 45 },
            { name: 'mango', emoji: '🥭', color: '#ff8c00', splashColor: '#ffe4b5', points: 2, size: 50 },
            { name: 'lemon', emoji: '🍋', color: '#fff44f', splashColor: '#fffacd', points: 1, size: 42 }
        ];

        const POWERUPS = [
            { name: 'frenzy', emoji: '⚡', color: '#00d4ff', desc: 'Fruit Frenzy!' },
            { name: 'freeze', emoji: '❄️', color: '#87ceeb', desc: 'Freeze Time!' },
            { name: 'double', emoji: '✨', color: '#ffd700', desc: 'Double Points!' }
        ];

        // ============================================
        // GAME STATE
        // ============================================
        let gameMode = 'classic';
        let gameRunning = false;
        let score = 0;
        let lives = 3;
        let timeLeft = 0;
        let fruitsSliced = 0;
        let combo = 0;
        let bestCombo = 0;
        let comboTimer = 0;
        let frameCount = 0;

        // High scores
        let highScores = {
            classic: parseInt(localStorage.getItem('fruitNinjaClassic')) || 0,
            zen: parseInt(localStorage.getItem('fruitNinjaZen')) || 0,
            arcade: parseInt(localStorage.getItem('fruitNinjaArcade')) || 0
        };

        // Game objects
        let fruits = [];
        let sliceTrail = [];
        let particles = [];
        let splashes = [];
        let floatingTexts = [];

        // Power-ups (arcade mode)
        let activePowerup = null;
        let powerupTimer = 0;

        // Slice detection
        let isSlicing = false;
        let lastSlicePos = null;
        let sliceSpeed = 0;

        // Spawn timing
        let spawnTimer = 0;
        let spawnRate = 60; // frames between spawns
        let difficultyTimer = 0;

        // Update high score displays
        document.getElementById('highClassic').textContent = highScores.classic;
        document.getElementById('highZen').textContent = highScores.zen;
        document.getElementById('highArcade').textContent = highScores.arcade;

        // ============================================
        // SPAWNING
        // ============================================
        function spawnFruit() {
            const fruit = FRUITS[Math.floor(Math.random() * FRUITS.length)];
            const fromLeft = Math.random() < 0.5;
            const x = fromLeft ? -50 + Math.random() * 200 : W - 150 + Math.random() * 200;
            const targetX = W / 2 + (Math.random() - 0.5) * 300;

            // Calculate velocity to reach target
            const vx = (targetX - x) / 60 + (Math.random() - 0.5) * 3;
            const vy = -15 - Math.random() * 5; // Strong upward velocity

            fruits.push({
                ...fruit,
                x,
                y: H + 50,
                vx,
                vy,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.2,
                sliced: false,
                missed: false
            });
        }

        function spawnBomb() {
            if (gameMode === 'zen') return; // No bombs in zen mode

            const fromLeft = Math.random() < 0.5;
            const x = fromLeft ? -50 + Math.random() * 200 : W - 150 + Math.random() * 200;
            const targetX = W / 2 + (Math.random() - 0.5) * 300;
            const vx = (targetX - x) / 60 + (Math.random() - 0.5) * 3;
            const vy = -14 - Math.random() * 4;

            fruits.push({
                name: 'bomb',
                emoji: '💣',
                color: '#333',
                splashColor: '#ff0000',
                points: 0,
                size: 50,
                x,
                y: H + 50,
                vx,
                vy,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.15,
                sliced: false,
                missed: false,
                isBomb: true
            });
        }

        function spawnPowerup() {
            if (gameMode !== 'arcade') return;

            const powerup = POWERUPS[Math.floor(Math.random() * POWERUPS.length)];
            const fromLeft = Math.random() < 0.5;
            const x = fromLeft ? 100 : W - 100;
            const vx = fromLeft ? 3 : -3;
            const vy = -13 - Math.random() * 3;

            fruits.push({
                ...powerup,
                x,
                y: H + 50,
                vx,
                vy,
                rotation: 0,
                rotationSpeed: 0.1,
                sliced: false,
                missed: false,
                isPowerup: true,
                size: 45
            });
        }

        // ============================================
        // SLICING
        // ============================================
        function checkSlice(x, y) {
            if (!isSlicing || !lastSlicePos) return;

            // Calculate slice speed
            const dx = x - lastSlicePos.x;
            const dy = y - lastSlicePos.y;
            sliceSpeed = Math.sqrt(dx * dx + dy * dy);

            // Need minimum speed to slice
            if (sliceSpeed < 5) return;

            let slicedThisFrame = 0;

            fruits.forEach(fruit => {
                if (fruit.sliced || fruit.y > H) return;

                // Check if slice line intersects fruit
                const dist = pointToLineDistance(
                    fruit.x, fruit.y,
                    lastSlicePos.x, lastSlicePos.y,
                    x, y
                );

                if (dist < fruit.size / 2 + 10) {
                    sliceFruit(fruit);
                    slicedThisFrame++;
                }
            });

            // Combo bonus for multiple slices
            if (slicedThisFrame > 1) {
                const comboBonus = slicedThisFrame * 2;
                score += comboBonus;
                playSound('combo');
                floatingTexts.push({
                    text: `+${comboBonus} COMBO!`,
                    x: x,
                    y: y - 30,
                    color: '#ffd93d',
                    life: 1,
                    size: 24
                });
            }
        }

        function pointToLineDistance(px, py, x1, y1, x2, y2) {
            const A = px - x1;
            const B = py - y1;
            const C = x2 - x1;
            const D = y2 - y1;

            const dot = A * C + B * D;
            const lenSq = C * C + D * D;
            let param = -1;
            if (lenSq !== 0) param = dot / lenSq;

            let xx, yy;
            if (param < 0) { xx = x1; yy = y1; }
            else if (param > 1) { xx = x2; yy = y2; }
            else { xx = x1 + param * C; yy = y1 + param * D; }

            const ddx = px - xx;
            const ddy = py - yy;
            return Math.sqrt(ddx * ddx + ddy * ddy);
        }

        function sliceFruit(fruit) {
            fruit.sliced = true;

            if (fruit.isBomb) {
                // Hit a bomb!
                playSound('bomb');
                createExplosion(fruit.x, fruit.y);

                if (gameMode === 'classic') {
                    lives = 0; // Instant game over
                } else if (gameMode === 'arcade') {
                    score = Math.max(0, score - 20);
                    timeLeft = Math.max(0, timeLeft - 5);
                }
                return;
            }

            if (fruit.isPowerup) {
                activatePowerup(fruit);
                return;
            }

            // Regular fruit
            playSound('slice');
            fruitsSliced++;
            combo++;
            comboTimer = 30; // Reset combo timer

            if (combo > bestCombo) bestCombo = combo;

            // Calculate points
            let points = fruit.points;
            if (activePowerup === 'double') points *= 2;
            if (combo >= 3) points += Math.floor(combo / 3);

            score += points;

            // Create visual effects
            createSplash(fruit.x, fruit.y, fruit.splashColor, fruit.size);
            createSlicedFruit(fruit);

            // Floating score text
            let text = `+${points}`;
            if (combo >= 3) text += ` x${combo}`;
            floatingTexts.push({
                text,
                x: fruit.x,
                y: fruit.y,
                color: combo >= 5 ? '#ffd93d' : '#fff',
                life: 1,
                size: combo >= 5 ? 28 : 20
            });

            // Combo sound for streaks
            if (combo === 5 || combo === 10 || combo === 15) {
                playSound('frenzy');
            }
        }

        function activatePowerup(powerup) {
            playSound('powerup');
            activePowerup = powerup.name;
            powerupTimer = 300; // 5 seconds at 60fps

            floatingTexts.push({
                text: powerup.desc,
                x: W / 2,
                y: H / 2,
                color: powerup.color,
                life: 1.5,
                size: 36
            });

            if (powerup.name === 'frenzy') {
                // Spawn tons of fruit
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => spawnFruit(), i * 100);
                }
            }
        }

        function createSplash(x, y, color, size) {
            // Juice particles
            for (let i = 0; i < 15; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 8;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 3,
                    color,
                    size: 3 + Math.random() * 6,
                    life: 1,
                    gravity: 0.3
                });
            }

            // Splash ring
            splashes.push({
                x,
                y,
                radius: size / 2,
                maxRadius: size * 2,
                color,
                life: 1
            });
        }

        function createSlicedFruit(fruit) {
            // Create two halves flying apart
            const angle = Math.random() * Math.PI;
            for (let i = 0; i < 2; i++) {
                const dir = i === 0 ? 1 : -1;
                particles.push({
                    x: fruit.x,
                    y: fruit.y,
                    vx: Math.cos(angle) * 5 * dir + fruit.vx,
                    vy: fruit.vy - 2,
                    emoji: fruit.emoji,
                    size: fruit.size * 0.6,
                    life: 2,
                    gravity: 0.4,
                    rotation: fruit.rotation,
                    rotationSpeed: dir * 0.2,
                    isHalf: true,
                    clipDir: dir
                });
            }
        }

        function createExplosion(x, y) {
            // Fire particles
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 10;
                particles.push({
                    x,
                    y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: Math.random() < 0.5 ? '#ff4400' : '#ffaa00',
                    size: 5 + Math.random() * 10,
                    life: 1,
                    gravity: 0.1
                });
            }

            // Screen shake effect
            canvas.style.transform = 'translate(-5px, -5px)';
            setTimeout(() => canvas.style.transform = 'translate(5px, 5px)', 50);
            setTimeout(() => canvas.style.transform = '', 100);
        }

        // ============================================
        // UPDATE
        // ============================================
        function update() {
            frameCount++;

            // Combo decay
            if (comboTimer > 0) {
                comboTimer--;
            } else if (combo > 0) {
                combo = 0;
            }

            // Power-up timer
            if (powerupTimer > 0) {
                powerupTimer--;
                if (powerupTimer === 0) {
                    activePowerup = null;
                }
            }

            // Time-based modes
            if (gameMode === 'zen' || gameMode === 'arcade') {
                if (frameCount % 60 === 0 && timeLeft > 0) {
                    timeLeft--;
                    if (timeLeft === 0) {
                        endGame();
                        return;
                    }
                }
            }

            // Freeze power-up slows everything
            const timeScale = activePowerup === 'freeze' ? 0.3 : 1;

            // Spawn fruits
            spawnTimer++;
            const effectiveSpawnRate = activePowerup === 'frenzy' ? spawnRate / 3 : spawnRate;

            if (spawnTimer >= effectiveSpawnRate) {
                spawnTimer = 0;

                // Spawn multiple fruits sometimes
                const count = 1 + Math.floor(Math.random() * 2);
                for (let i = 0; i < count; i++) {
                    setTimeout(() => spawnFruit(), i * 150);
                }

                // Chance to spawn bomb (increases with difficulty)
                const bombChance = gameMode === 'classic' ? 0.15 : 0.1;
                if (Math.random() < bombChance) {
                    setTimeout(() => spawnBomb(), 200);
                }

                // Chance to spawn powerup in arcade
                if (gameMode === 'arcade' && Math.random() < 0.05) {
                    setTimeout(() => spawnPowerup(), 300);
                }
            }

            // Increase difficulty over time
            difficultyTimer++;
            if (difficultyTimer >= 600) { // Every 10 seconds
                difficultyTimer = 0;
                spawnRate = Math.max(30, spawnRate - 5);
            }

            // Update fruits
            fruits.forEach(fruit => {
                if (fruit.sliced) return;

                fruit.x += fruit.vx * timeScale;
                fruit.y += fruit.vy * timeScale;
                fruit.vy += 0.4 * timeScale; // Gravity
                fruit.rotation += fruit.rotationSpeed * timeScale;

                // Check if fruit fell off screen without being sliced
                if (fruit.y > H + 100 && !fruit.sliced && !fruit.missed) {
                    fruit.missed = true;

                    if (!fruit.isBomb && !fruit.isPowerup) {
                        if (gameMode === 'classic') {
                            lives--;
                            playSound('miss');

                            // Red flash
                            floatingTexts.push({
                                text: 'MISS!',
                                x: fruit.x,
                                y: H - 50,
                                color: '#ff0000',
                                life: 1,
                                size: 24
                            });

                            if (lives <= 0) {
                                endGame();
                            }
                        }
                        combo = 0;
                    }
                }
            });

            // Remove off-screen/sliced fruits
            fruits = fruits.filter(f => f.y < H + 150 && !f.sliced);

            // Update particles
            particles.forEach(p => {
                p.x += p.vx * timeScale;
                p.y += p.vy * timeScale;
                p.vy += (p.gravity || 0.4) * timeScale;
                p.life -= 0.02;
                if (p.rotation !== undefined) {
                    p.rotation += p.rotationSpeed * timeScale;
                }
            });
            particles = particles.filter(p => p.life > 0);

            // Update splashes
            splashes.forEach(s => {
                s.radius += 5;
                s.life -= 0.05;
            });
            splashes = splashes.filter(s => s.life > 0);

            // Update floating texts
            floatingTexts.forEach(t => {
                t.y -= 2;
                t.life -= 0.02;
            });
            floatingTexts = floatingTexts.filter(t => t.life > 0);

            // Update slice trail
            sliceTrail = sliceTrail.filter(p => {
                p.life -= 0.1;
                return p.life > 0;
            });
        }

        // ============================================
        // DRAW
        // ============================================
        function draw() {
            // Background
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            if (activePowerup === 'frenzy') {
                gradient.addColorStop(0, '#4a0080');
                gradient.addColorStop(1, '#1a0033');
            } else if (activePowerup === 'freeze') {
                gradient.addColorStop(0, '#001a33');
                gradient.addColorStop(1, '#003366');
            } else {
                gradient.addColorStop(0, '#1a1a2e');
                gradient.addColorStop(1, '#16213e');
            }
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // Draw splashes
            splashes.forEach(s => {
                ctx.globalAlpha = s.life * 0.5;
                ctx.strokeStyle = s.color;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
                ctx.stroke();
            });
            ctx.globalAlpha = 1;

            // Draw slice trail
            if (sliceTrail.length > 1) {
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.lineCap = 'round';
                ctx.beginPath();
                sliceTrail.forEach((p, i) => {
                    ctx.globalAlpha = p.life;
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                });
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // Draw particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                if (p.emoji) {
                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation || 0);

                    // Clip to show half
                    if (p.isHalf) {
                        ctx.beginPath();
                        ctx.rect(p.clipDir > 0 ? 0 : -p.size, -p.size, p.size, p.size * 2);
                        ctx.clip();
                    }

                    ctx.font = `${p.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(p.emoji, 0, 0);
                    ctx.restore();
                } else {
                    ctx.fillStyle = p.color;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            ctx.globalAlpha = 1;

            // Draw fruits
            fruits.forEach(fruit => {
                if (fruit.sliced) return;

                ctx.save();
                ctx.translate(fruit.x, fruit.y);
                ctx.rotate(fruit.rotation);

                // Glow for powerups
                if (fruit.isPowerup) {
                    ctx.shadowColor = fruit.color;
                    ctx.shadowBlur = 20;
                }

                // Bomb fuse spark
                if (fruit.isBomb) {
                    ctx.fillStyle = '#ff4400';
                    const sparkX = Math.sin(frameCount * 0.5) * 3;
                    ctx.beginPath();
                    ctx.arc(sparkX, -fruit.size / 2 - 5, 4, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.font = `${fruit.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fruit.emoji, 0, 0);

                ctx.restore();
            });

            // Draw floating texts
            floatingTexts.forEach(t => {
                ctx.globalAlpha = t.life;
                ctx.fillStyle = t.color;
                ctx.font = `bold ${t.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 3;
                ctx.strokeText(t.text, t.x, t.y);
                ctx.fillText(t.text, t.x, t.y);
            });
            ctx.globalAlpha = 1;

            // Draw HUD
            drawHUD();
        }

        function drawHUD() {
            // Score
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(score, 20, 45);

            // Combo
            if (combo >= 3) {
                ctx.fillStyle = '#ffd93d';
                ctx.font = 'bold 24px Arial';
                ctx.fillText(`${combo}x COMBO`, 20, 75);
            }

            // Mode-specific HUD
            if (gameMode === 'classic') {
                // Lives (hearts)
                ctx.font = '30px Arial';
                ctx.textAlign = 'right';
                let hearts = '';
                for (let i = 0; i < 3; i++) {
                    hearts += i < lives ? '❤️' : '🖤';
                }
                ctx.fillText(hearts, W - 20, 40);
            } else {
                // Timer
                ctx.fillStyle = timeLeft <= 10 ? '#ff6b6b' : '#fff';
                ctx.font = 'bold 36px Arial';
                ctx.textAlign = 'right';
                ctx.fillText(timeLeft + 's', W - 20, 45);
            }

            // Power-up indicator
            if (activePowerup) {
                const powerup = POWERUPS.find(p => p.name === activePowerup);
                ctx.fillStyle = powerup.color;
                ctx.font = '24px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`${powerup.emoji} ${powerup.desc} ${Math.ceil(powerupTimer / 60)}s`, W / 2, 30);
            }
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            if (!gameRunning) return;

            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function startGame() {
            initAudio();

            // Reset state
            score = 0;
            fruitsSliced = 0;
            combo = 0;
            bestCombo = 0;
            comboTimer = 0;
            frameCount = 0;
            spawnTimer = 0;
            spawnRate = 60;
            difficultyTimer = 0;
            activePowerup = null;
            powerupTimer = 0;

            fruits = [];
            particles = [];
            splashes = [];
            floatingTexts = [];
            sliceTrail = [];

            // Mode-specific setup
            if (gameMode === 'classic') {
                lives = 3;
                timeLeft = 0;
            } else if (gameMode === 'zen') {
                lives = 999;
                timeLeft = 90;
            } else if (gameMode === 'arcade') {
                lives = 999;
                timeLeft = 60;
            }

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameRunning = true;
            gameLoop();
        }

        function endGame() {
            gameRunning = false;

            // Check high score
            const isNewHigh = score > highScores[gameMode];
            if (isNewHigh) {
                highScores[gameMode] = score;
                localStorage.setItem('fruitNinja' + gameMode.charAt(0).toUpperCase() + gameMode.slice(1), score);
            }

            // Update game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('fruitsSliced').textContent = fruitsSliced;
            document.getElementById('bestCombo').textContent = bestCombo;
            document.getElementById('newHighScore').style.display = isNewHigh ? 'block' : 'none';

            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        // ============================================
        // INPUT HANDLING
        // ============================================
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (e.touches) {
                return {
                    x: (e.touches[0].clientX - rect.left) * scaleX,
                    y: (e.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (e.clientX - rect.left) * scaleX,
                y: (e.clientY - rect.top) * scaleY
            };
        }

        canvas.addEventListener('mousedown', e => {
            if (!gameRunning) return;
            isSlicing = true;
            const pos = getPos(e);
            lastSlicePos = pos;
            sliceTrail.push({ ...pos, life: 1 });
        });

        canvas.addEventListener('mousemove', e => {
            if (!gameRunning) return;
            const pos = getPos(e);

            if (isSlicing) {
                checkSlice(pos.x, pos.y);
                sliceTrail.push({ ...pos, life: 1 });
                lastSlicePos = pos;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isSlicing = false;
            lastSlicePos = null;
        });

        canvas.addEventListener('mouseleave', () => {
            isSlicing = false;
            lastSlicePos = null;
        });

        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            if (!gameRunning) return;
            isSlicing = true;
            const pos = getPos(e);
            lastSlicePos = pos;
            sliceTrail.push({ ...pos, life: 1 });
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!gameRunning) return;
            const pos = getPos(e);

            if (isSlicing) {
                checkSlice(pos.x, pos.y);
                sliceTrail.push({ ...pos, life: 1 });
                lastSlicePos = pos;
            }
        });

        canvas.addEventListener('touchend', () => {
            isSlicing = false;
            lastSlicePos = null;
        });

        // Mode selection
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                gameMode = btn.dataset.mode;
            });
        });

        // Buttons
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', () => {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');

            // Update high score displays
            document.getElementById('highClassic').textContent = highScores.classic;
            document.getElementById('highZen').textContent = highScores.zen;
            document.getElementById('highArcade').textContent = highScores.arcade;
        });

        // Idle animation
        function idleLoop() {
            if (gameRunning) return;

            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, W, H);

            // Floating fruit animation
            const time = Date.now() / 1000;
            const demoFruits = ['🍎', '🍊', '🍉', '🍌', '🍇'];
            demoFruits.forEach((emoji, i) => {
                const x = 100 + i * 150;
                const y = H / 2 + Math.sin(time + i) * 50;
                const rot = time + i;

                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rot * 0.3);
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(emoji, 0, 0);
                ctx.restore();
            });

            requestAnimationFrame(idleLoop);
        }

        idleLoop();
    </script>
</body>
</html>
