<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit Ninja - Learning Sandbox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        #gameCanvas { border-radius: 10px; cursor: none; touch-action: none; }
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100; padding: 20px;
            overflow-y: auto;
        }
        .overlay.hidden { display: none; }
        .overlay h1 { font-size: 3rem; color: #ff6b35; text-shadow: 3px 3px 0 #000; margin-bottom: 10px; }
        .overlay h2 { font-size: 2rem; color: #fff; margin-bottom: 15px; }
        .overlay p { color: #aaa; margin-bottom: 10px; font-size: 1rem; }
        .btn {
            padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff;
            border: none; border-radius: 30px; cursor: pointer; margin: 8px;
            box-shadow: 0 5px 20px rgba(255, 107, 53, 0.4); transition: all 0.2s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255, 107, 53, 0.6); }
        .btn-secondary { background: linear-gradient(135deg, #4CAF50, #2E7D32); box-shadow: 0 5px 20px rgba(76, 175, 80, 0.4); }
        .btn-shop { background: linear-gradient(135deg, #9C27B0, #7B1FA2); box-shadow: 0 5px 20px rgba(156, 39, 176, 0.4); }
        .btn-small { padding: 10px 25px; font-size: 0.9rem; }

        .mode-select { display: flex; gap: 15px; margin: 20px 0; flex-wrap: wrap; justify-content: center; }
        .mode-btn {
            padding: 20px 30px; background: rgba(255,255,255,0.1); border: 3px solid #fff;
            border-radius: 15px; color: #fff; cursor: pointer; transition: all 0.2s;
            text-align: center; min-width: 150px;
        }
        .mode-btn:hover { background: rgba(255,255,255,0.2); transform: scale(1.05); }
        .mode-btn.selected { border-color: #ff6b35; background: rgba(255, 107, 53, 0.3); }
        .mode-icon { font-size: 2.5rem; margin-bottom: 10px; }
        .mode-name { font-size: 1.2rem; font-weight: bold; }
        .mode-desc { font-size: 0.8rem; color: #aaa; margin-top: 5px; }

        .stats-bar {
            display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center;
        }
        .stat-item {
            background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 20px;
            color: #fff; text-align: center;
        }
        .stat-label { font-size: 0.8rem; color: #aaa; }
        .stat-value { font-size: 1.3rem; font-weight: bold; color: #FFD700; }

        .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
        .tab {
            padding: 10px 25px; background: rgba(255,255,255,0.1); border: 2px solid #555;
            border-radius: 10px 10px 0 0; color: #aaa; cursor: pointer; transition: all 0.2s;
        }
        .tab:hover { background: rgba(255,255,255,0.2); }
        .tab.active { background: #ff6b35; color: #fff; border-color: #ff6b35; }

        .shop-content { display: none; max-height: 350px; overflow-y: auto; min-width: 350px; }
        .shop-content.active { display: block; }

        .blades-grid { display: grid; grid-template-columns: repeat(3, 100px); gap: 10px; justify-content: center; }
        .blade-item {
            width: 100px; height: 120px; border: 3px solid #555; border-radius: 15px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; background: rgba(255,255,255,0.05); transition: all 0.2s;
        }
        .blade-item:hover { transform: scale(1.05); border-color: #888; }
        .blade-item.selected { border-color: #FFD700; box-shadow: 0 0 20px rgba(255, 215, 0, 0.5); }
        .blade-item.locked { opacity: 0.5; }
        .blade-preview { width: 60px; height: 8px; border-radius: 4px; margin-bottom: 8px; }
        .blade-name { color: #fff; font-size: 0.8rem; font-weight: bold; }
        .blade-price { color: #FFD700; font-size: 0.75rem; margin-top: 5px; }
        .blade-owned { color: #4CAF50; font-size: 0.75rem; margin-top: 5px; }

        .achievements-grid {
            display: grid; grid-template-columns: repeat(4, 80px); gap: 10px;
            justify-content: center; max-height: 300px; overflow-y: auto;
        }
        .achievement {
            width: 80px; height: 90px; background: rgba(255,255,255,0.05); border: 2px solid #333;
            border-radius: 10px; display: flex; flex-direction: column; align-items: center;
            justify-content: center; opacity: 0.4;
        }
        .achievement.unlocked { opacity: 1; border-color: #FFD700; background: rgba(255, 215, 0, 0.1); }
        .achievement-icon { font-size: 1.8rem; }
        .achievement-name { font-size: 0.6rem; color: #fff; margin-top: 5px; text-align: center; }

        .score-display { font-size: 4rem; color: #FFD700; margin: 15px 0; }
        .high-score { color: #ff6b35; font-size: 1.2rem; margin-bottom: 15px; }
        .combo-display { color: #4CAF50; font-size: 1.1rem; }
        .coins-earned { color: #FFD700; font-size: 1.3rem; margin: 10px 0; }

        .new-achievements { margin: 15px 0; }
        .new-achievement { color: #FFD700; font-size: 0.9rem; margin: 5px 0; }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- Start Screen -->
    <div class="overlay" id="startScreen">
        <h1>FRUIT NINJA</h1>
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-label">Coins</div>
                <div class="stat-value" id="totalCoins">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Best Score</div>
                <div class="stat-value" id="bestScore">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">Total Sliced</div>
                <div class="stat-value" id="totalSliced">0</div>
            </div>
        </div>
        <p>Select Game Mode:</p>
        <div class="mode-select">
            <div class="mode-btn selected" data-mode="classic">
                <div class="mode-icon">🍎</div>
                <div class="mode-name">Classic</div>
                <div class="mode-desc">3 lives, don't miss!</div>
            </div>
            <div class="mode-btn" data-mode="zen">
                <div class="mode-icon">🧘</div>
                <div class="mode-name">Zen</div>
                <div class="mode-desc">90 seconds, no bombs</div>
            </div>
            <div class="mode-btn" data-mode="arcade">
                <div class="mode-icon">🎮</div>
                <div class="mode-name">Arcade</div>
                <div class="mode-desc">60 sec, power-ups!</div>
            </div>
        </div>
        <div style="margin-top: 15px;">
            <button class="btn" id="startBtn">PLAY</button>
            <button class="btn btn-shop" id="shopBtn">SHOP</button>
        </div>
    </div>

    <!-- Shop Screen -->
    <div class="overlay hidden" id="shopScreen">
        <h2>SHOP</h2>
        <p style="color: #FFD700; font-size: 1.2rem;">Coins: <span id="shopCoins">0</span></p>
        <div class="tabs">
            <div class="tab active" data-tab="blades">Blades</div>
            <div class="tab" data-tab="backgrounds">Dojos</div>
            <div class="tab" data-tab="achievements">Badges</div>
        </div>
        <div class="shop-content active" id="bladesContent">
            <div class="blades-grid" id="bladesGrid"></div>
        </div>
        <div class="shop-content" id="backgroundsContent">
            <div class="blades-grid" id="backgroundsGrid"></div>
        </div>
        <div class="shop-content" id="achievementsContent">
            <p id="achieveCount" style="color: #aaa; margin-bottom: 10px; text-align: center;">0/16 Unlocked</p>
            <div class="achievements-grid" id="achievementsGrid"></div>
        </div>
        <button class="btn btn-small" id="shopBackBtn" style="margin-top: 15px;">BACK</button>
    </div>

    <!-- Game Over Screen -->
    <div class="overlay hidden" id="gameOverScreen">
        <h2>GAME OVER</h2>
        <div class="score-display" id="finalScore">0</div>
        <div class="high-score">Best: <span id="finalHighScore">0</span></div>
        <div class="combo-display">Best Combo: <span id="finalCombo">0</span>x</div>
        <div class="coins-earned">+<span id="coinsEarned">0</span> Coins</div>
        <div class="new-achievements" id="newAchievements"></div>
        <button class="btn" id="restartBtn">PLAY AGAIN</button>
        <button class="btn btn-small btn-secondary" id="menuBtn">MENU</button>
    </div>

    <script>
        // ============================================
        // AUDIO
        // ============================================
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;

        function initAudio() { if (!audioCtx) audioCtx = new AudioContext(); }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            const sounds = {
                slice: () => { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(400, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.05); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08); osc.start(now); osc.stop(now + 0.08); },
                splat: () => { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.1); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1); osc.start(now); osc.stop(now + 0.1); },
                bomb: () => { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, now); osc.frequency.exponentialRampToValueAtTime(30, now + 0.4); gain.gain.setValueAtTime(0.3, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); },
                combo: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(523, now); osc.frequency.setValueAtTime(659, now + 0.08); osc.frequency.setValueAtTime(784, now + 0.16); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25); osc.start(now); osc.stop(now + 0.25); },
                powerup: () => { osc.type = 'sine'; [400, 500, 600, 800].forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.08)); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); },
                miss: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.2); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); },
                purchase: () => { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.setValueAtTime(1000, now + 0.1); gain.gain.setValueAtTime(0.15, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2); osc.start(now); osc.stop(now + 0.2); },
                unlock: () => { osc.type = 'sine'; [523, 659, 784, 1047].forEach((f, i) => osc.frequency.setValueAtTime(f, now + i * 0.1)); gain.gain.setValueAtTime(0.2, now); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5); osc.start(now); osc.stop(now + 0.5); }
            };
            if (sounds[type]) sounds[type]();
        }

        // ============================================
        // CANVAS
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;

        // ============================================
        // BLADES
        // ============================================
        const BLADES = [
            { id: 'classic', name: 'Classic', colors: ['#fff', '#ddd'], price: 0 },
            { id: 'fire', name: 'Fire', colors: ['#ff4500', '#ff8c00', '#ffd700'], price: 100 },
            { id: 'ice', name: 'Ice', colors: ['#00bfff', '#87ceeb', '#e0ffff'], price: 100 },
            { id: 'nature', name: 'Nature', colors: ['#228b22', '#32cd32', '#7cfc00'], price: 150 },
            { id: 'lightning', name: 'Lightning', colors: ['#9400d3', '#8a2be2', '#da70d6'], price: 150 },
            { id: 'golden', name: 'Golden', colors: ['#ffd700', '#ffb347', '#fff'], price: 200 },
            { id: 'rainbow', name: 'Rainbow', colors: ['#ff0000', '#ff7f00', '#ffff00', '#00ff00', '#0000ff', '#8b00ff'], price: 300 },
            { id: 'shadow', name: 'Shadow', colors: ['#1a1a1a', '#333', '#555'], price: 250 },
            { id: 'neon', name: 'Neon', colors: ['#ff00ff', '#00ffff', '#ff00ff'], price: 350 },
            { id: 'plasma', name: 'Plasma', colors: ['#ff1493', '#ff69b4', '#ff00ff', '#da70d6'], price: 400 },
            { id: 'cosmic', name: 'Cosmic', colors: ['#191970', '#4169e1', '#fff', '#ffd700'], price: 500 },
            { id: 'legendary', name: 'Legendary', colors: ['#ffd700', '#ff4500', '#ff0000', '#ffd700'], price: 1000 }
        ];

        // ============================================
        // BACKGROUNDS
        // ============================================
        const BACKGROUNDS = [
            { id: 'classic', name: 'Classic Dojo', gradient: ['#1a1a2e', '#16213e'], price: 0 },
            { id: 'sunset', name: 'Sunset', gradient: ['#ff7e5f', '#feb47b'], price: 200 },
            { id: 'forest', name: 'Forest', gradient: ['#134e5e', '#71b280'], price: 200 },
            { id: 'ocean', name: 'Ocean', gradient: ['#2193b0', '#6dd5ed'], price: 250 },
            { id: 'volcano', name: 'Volcano', gradient: ['#8B0000', '#FF4500'], price: 300 },
            { id: 'galaxy', name: 'Galaxy', gradient: ['#0f0c29', '#302b63', '#24243e'], price: 400 },
            { id: 'sakura', name: 'Sakura', gradient: ['#ff9a9e', '#fecfef'], price: 350 },
            { id: 'midnight', name: 'Midnight', gradient: ['#000', '#1a1a2e'], price: 150 }
        ];

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        const ACHIEVEMENTS = [
            { id: 'slice100', name: 'Slicer', desc: 'Slice 100 fruits', icon: '🔪', check: s => s.totalSliced >= 100 },
            { id: 'slice1000', name: 'Master Slicer', desc: 'Slice 1000 fruits', icon: '⚔️', check: s => s.totalSliced >= 1000 },
            { id: 'slice5000', name: 'Fruit Ninja', desc: 'Slice 5000 fruits', icon: '🥷', check: s => s.totalSliced >= 5000 },
            { id: 'score50', name: 'Getting Good', desc: 'Score 50 in one game', icon: '🎯', check: s => s.highScores.classic >= 50 || s.highScores.zen >= 50 || s.highScores.arcade >= 50 },
            { id: 'score100', name: 'Pro Player', desc: 'Score 100 in one game', icon: '🏆', check: s => s.highScores.classic >= 100 || s.highScores.zen >= 100 || s.highScores.arcade >= 100 },
            { id: 'score200', name: 'Legend', desc: 'Score 200 in one game', icon: '👑', check: s => s.highScores.classic >= 200 || s.highScores.zen >= 200 || s.highScores.arcade >= 200 },
            { id: 'combo5', name: 'Combo Starter', desc: 'Get a 5x combo', icon: '5️⃣', check: s => s.bestCombo >= 5 },
            { id: 'combo10', name: 'Combo Master', desc: 'Get a 10x combo', icon: '🔟', check: s => s.bestCombo >= 10 },
            { id: 'combo15', name: 'Combo God', desc: 'Get a 15x combo', icon: '🌟', check: s => s.bestCombo >= 15 },
            { id: 'blade3', name: 'Collector', desc: 'Own 3 blades', icon: '🗡️', check: s => s.ownedBlades.length >= 3 },
            { id: 'blade6', name: 'Arsenal', desc: 'Own 6 blades', icon: '⚔️', check: s => s.ownedBlades.length >= 6 },
            { id: 'bladeAll', name: 'Full Collection', desc: 'Own all blades', icon: '💎', check: s => s.ownedBlades.length >= BLADES.length },
            { id: 'games10', name: 'Dedicated', desc: 'Play 10 games', icon: '🎮', check: s => s.gamesPlayed >= 10 },
            { id: 'games50', name: 'Veteran', desc: 'Play 50 games', icon: '🎖️', check: s => s.gamesPlayed >= 50 },
            { id: 'coins500', name: 'Wealthy', desc: 'Earn 500 total coins', icon: '💰', check: s => s.totalCoinsEarned >= 500 },
            { id: 'coins2000', name: 'Rich', desc: 'Earn 2000 total coins', icon: '🤑', check: s => s.totalCoinsEarned >= 2000 }
        ];

        // ============================================
        // FRUITS
        // ============================================
        const FRUITS = [
            { emoji: '🍎', color: '#ff0000', points: 1 },
            { emoji: '🍊', color: '#ffa500', points: 1 },
            { emoji: '🍋', color: '#ffff00', points: 1 },
            { emoji: '🍇', color: '#8b008b', points: 1 },
            { emoji: '🍉', color: '#ff6b6b', points: 2 },
            { emoji: '🍌', color: '#ffe135', points: 1 },
            { emoji: '🥝', color: '#8db600', points: 1 },
            { emoji: '🍑', color: '#ffcba4', points: 1 },
            { emoji: '🍓', color: '#ff4444', points: 1 },
            { emoji: '🥭', color: '#ff8243', points: 2 },
            { emoji: '🍍', color: '#f4d738', points: 2 },
            { emoji: '🫐', color: '#4169e1', points: 1 }
        ];

        // ============================================
        // SAVE DATA
        // ============================================
        let saveData = {
            coins: 0,
            totalCoinsEarned: 0,
            ownedBlades: ['classic'],
            equippedBlade: 'classic',
            ownedBackgrounds: ['classic'],
            equippedBackground: 'classic',
            achievements: [],
            highScores: { classic: 0, zen: 0, arcade: 0 },
            totalSliced: 0,
            bestCombo: 0,
            gamesPlayed: 0
        };

        function loadSaveData() {
            const saved = localStorage.getItem('fruitNinjaSave');
            if (saved) {
                const parsed = JSON.parse(saved);
                saveData = { ...saveData, ...parsed };
                if (!saveData.highScores) saveData.highScores = { classic: 0, zen: 0, arcade: 0 };
            }
        }

        function saveSaveData() {
            localStorage.setItem('fruitNinjaSave', JSON.stringify(saveData));
        }

        // ============================================
        // ARCADE STATS TRACKING
        // ============================================
        let gameStartTime = 0;
        function loadArcadeStats() { return JSON.parse(localStorage.getItem('arcadeStats')) || { totalGamesPlayed: 0, totalTimePlayed: 0, totalCoinsEarned: 0, games: {} }; }
        function saveArcadeStats(stats) { localStorage.setItem('arcadeStats', JSON.stringify(stats)); }
        function trackGameStart() { gameStartTime = Date.now(); }
        function trackGameEnd(finalScore, coinsEarned, fruitsSliced) {
            const stats = loadArcadeStats();
            const gameId = 'fruit-ninja';
            if (!stats.games[gameId]) stats.games[gameId] = { gamesPlayed: 0, timePlayed: 0, highScore: 0, totalScore: 0, coinsEarned: 0, fruitsSliced: 0 };
            const gameStats = stats.games[gameId];
            const sessionTime = (Date.now() - gameStartTime) / 1000;
            gameStats.gamesPlayed++; gameStats.timePlayed += sessionTime; gameStats.totalScore += finalScore; gameStats.coinsEarned += coinsEarned; gameStats.fruitsSliced += fruitsSliced;
            if (finalScore > gameStats.highScore) gameStats.highScore = finalScore;
            stats.totalGamesPlayed++; stats.totalTimePlayed += sessionTime; stats.totalCoinsEarned += coinsEarned;
            saveArcadeStats(stats);
        }

        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let gameMode = 'classic';
        let score = 0;
        let lives = 3;
        let timeLeft = 0;
        let combo = 0;
        let maxCombo = 0;
        let comboTimer = 0;
        let frameCount = 0;
        let sessionCoins = 0;
        let newAchievementsThisGame = [];

        let fruits = [];
        let particles = [];
        let sliceTrail = [];
        let powerups = [];

        // Power-up states
        let frenzyActive = false;
        let frenzyTimer = 0;
        let freezeActive = false;
        let freezeTimer = 0;
        let doubleActive = false;
        let doubleTimer = 0;

        // Mouse/touch state
        let mouseX = 0, mouseY = 0;
        let prevMouseX = 0, prevMouseY = 0;
        let isSlicing = false;

        loadSaveData();
        updateDisplays();

        // ============================================
        // DRAWING
        // ============================================
        function drawBackground() {
            const bg = BACKGROUNDS.find(b => b.id === saveData.equippedBackground) || BACKGROUNDS[0];
            const gradient = ctx.createLinearGradient(0, 0, 0, H);
            bg.gradient.forEach((color, i) => {
                gradient.addColorStop(i / (bg.gradient.length - 1), color);
            });
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            // Subtle pattern
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            for (let i = 0; i < 20; i++) {
                const x = (i * 50 + frameCount * 0.2) % (W + 100) - 50;
                const y = H - 50 + Math.sin(i + frameCount * 0.02) * 10;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function drawFruit(fruit) {
            ctx.save();
            ctx.translate(fruit.x, fruit.y);
            ctx.rotate(fruit.rotation);

            if (fruit.sliced) {
                // Draw sliced halves
                ctx.globalAlpha = fruit.alpha;
                ctx.font = `${fruit.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                ctx.save();
                ctx.translate(-10, 0);
                ctx.rotate(-0.3);
                ctx.beginPath();
                ctx.rect(-fruit.size, -fruit.size, fruit.size, fruit.size * 2);
                ctx.clip();
                ctx.fillText(fruit.emoji, 0, 0);
                ctx.restore();

                ctx.save();
                ctx.translate(10, 0);
                ctx.rotate(0.3);
                ctx.beginPath();
                ctx.rect(0, -fruit.size, fruit.size, fruit.size * 2);
                ctx.clip();
                ctx.fillText(fruit.emoji, 0, 0);
                ctx.restore();
            } else {
                ctx.font = `${fruit.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(fruit.emoji, 0, 0);

                // Glow effect for special fruits
                if (fruit.points > 1) {
                    ctx.shadowColor = fruit.color;
                    ctx.shadowBlur = 20;
                }
            }

            ctx.restore();
        }

        function drawBomb(bomb) {
            ctx.save();
            ctx.translate(bomb.x, bomb.y);
            ctx.rotate(bomb.rotation);

            ctx.font = `${bomb.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Glow effect
            ctx.shadowColor = '#ff0000';
            ctx.shadowBlur = 15 + Math.sin(frameCount * 0.2) * 5;

            ctx.fillText('💣', 0, 0);

            // Fuse spark
            const sparkX = Math.cos(-0.5) * bomb.size * 0.4;
            const sparkY = Math.sin(-0.5) * bomb.size * 0.4 - bomb.size * 0.3;
            ctx.fillStyle = '#ff0';
            ctx.beginPath();
            ctx.arc(sparkX, sparkY, 4 + Math.random() * 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        function drawPowerup(powerup) {
            ctx.save();
            ctx.translate(powerup.x, powerup.y);

            const pulse = 1 + Math.sin(frameCount * 0.15) * 0.1;
            ctx.scale(pulse, pulse);

            ctx.shadowColor = powerup.color;
            ctx.shadowBlur = 20;

            ctx.font = `${powerup.size}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(powerup.emoji, 0, 0);

            ctx.restore();
        }

        function drawParticles() {
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }

        function drawSliceTrail() {
            if (sliceTrail.length < 2) return;

            const blade = BLADES.find(b => b.id === saveData.equippedBlade) || BLADES[0];

            for (let i = 1; i < sliceTrail.length; i++) {
                const t = i / sliceTrail.length;
                const p = sliceTrail[i];
                const prev = sliceTrail[i - 1];

                ctx.beginPath();
                ctx.moveTo(prev.x, prev.y);
                ctx.lineTo(p.x, p.y);

                const colorIndex = Math.floor((frameCount * 0.1 + i) % blade.colors.length);
                ctx.strokeStyle = blade.colors[colorIndex];
                ctx.lineWidth = 8 * t * p.life;
                ctx.lineCap = 'round';
                ctx.stroke();

                // Glow
                ctx.strokeStyle = blade.colors[(colorIndex + 1) % blade.colors.length];
                ctx.lineWidth = 15 * t * p.life;
                ctx.globalAlpha = 0.3 * p.life;
                ctx.stroke();
                ctx.globalAlpha = 1;
            }
        }

        function drawHUD() {
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'left';
            ctx.fillText(`Score: ${score}`, 20, 45);

            if (gameMode === 'classic') {
                // Draw lives
                ctx.font = '30px Arial';
                for (let i = 0; i < 3; i++) {
                    ctx.globalAlpha = i < lives ? 1 : 0.3;
                    ctx.fillText('❌', W - 120 + i * 35, 40);
                }
                ctx.globalAlpha = 1;
            } else {
                // Draw timer
                ctx.textAlign = 'right';
                ctx.fillText(`${timeLeft}s`, W - 20, 45);
            }

            // Combo
            if (combo > 1) {
                ctx.textAlign = 'center';
                ctx.fillStyle = '#FFD700';
                ctx.font = `bold ${30 + combo * 2}px Arial`;
                ctx.fillText(`${combo}x COMBO!`, W / 2, 80);
            }

            // Power-up indicators
            let indicatorY = 120;
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';

            if (frenzyActive) {
                ctx.fillStyle = '#ff4500';
                ctx.fillText(`🔥 FRENZY ${Math.ceil(frenzyTimer / 60)}s`, 20, indicatorY);
                indicatorY += 30;
            }
            if (freezeActive) {
                ctx.fillStyle = '#00bfff';
                ctx.fillText(`❄️ FREEZE ${Math.ceil(freezeTimer / 60)}s`, 20, indicatorY);
                indicatorY += 30;
            }
            if (doubleActive) {
                ctx.fillStyle = '#ffd700';
                ctx.fillText(`✨ DOUBLE ${Math.ceil(doubleTimer / 60)}s`, 20, indicatorY);
            }
        }

        function drawCursor() {
            if (!isSlicing) return;

            const blade = BLADES.find(b => b.id === saveData.equippedBlade) || BLADES[0];
            ctx.beginPath();
            ctx.arc(mouseX, mouseY, 15, 0, Math.PI * 2);
            ctx.fillStyle = blade.colors[0];
            ctx.globalAlpha = 0.5;
            ctx.fill();
            ctx.globalAlpha = 1;
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function spawnFruit() {
            const fruit = FRUITS[Math.floor(Math.random() * FRUITS.length)];
            const fromLeft = Math.random() < 0.5;

            fruits.push({
                x: fromLeft ? -30 : W + 30,
                y: H + 30,
                vx: fromLeft ? 3 + Math.random() * 4 : -(3 + Math.random() * 4),
                vy: -15 - Math.random() * 5,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.2,
                size: 50 + Math.random() * 20,
                emoji: fruit.emoji,
                color: fruit.color,
                points: fruit.points,
                sliced: false,
                alpha: 1,
                isBomb: false
            });
        }

        function spawnBomb() {
            if (gameMode === 'zen') return;

            const fromLeft = Math.random() < 0.5;
            fruits.push({
                x: fromLeft ? -30 : W + 30,
                y: H + 30,
                vx: fromLeft ? 3 + Math.random() * 3 : -(3 + Math.random() * 3),
                vy: -14 - Math.random() * 4,
                rotation: 0,
                rotationSpeed: (Math.random() - 0.5) * 0.15,
                size: 55,
                isBomb: true,
                sliced: false
            });
        }

        function spawnPowerup() {
            if (gameMode !== 'arcade') return;

            const types = [
                { id: 'frenzy', emoji: '🔥', color: '#ff4500' },
                { id: 'freeze', emoji: '❄️', color: '#00bfff' },
                { id: 'double', emoji: '✨', color: '#ffd700' }
            ];
            const type = types[Math.floor(Math.random() * types.length)];
            const fromLeft = Math.random() < 0.5;

            powerups.push({
                x: fromLeft ? -30 : W + 30,
                y: H + 30,
                vx: fromLeft ? 3 + Math.random() * 3 : -(3 + Math.random() * 3),
                vy: -13 - Math.random() * 4,
                size: 45,
                ...type
            });
        }

        function updateFruits() {
            const gravity = freezeActive ? 0.15 : 0.35;
            const speedMult = freezeActive ? 0.5 : 1;

            fruits.forEach(fruit => {
                fruit.x += fruit.vx * speedMult;
                fruit.vy += gravity;
                fruit.y += fruit.vy * speedMult;
                fruit.rotation += fruit.rotationSpeed * speedMult;

                if (fruit.sliced) {
                    fruit.alpha -= 0.03;
                }
            });

            // Check for missed fruits
            fruits = fruits.filter(fruit => {
                if (fruit.y > H + 100) {
                    if (!fruit.sliced && !fruit.isBomb && gameMode === 'classic') {
                        lives--;
                        playSound('miss');
                        combo = 0;
                    }
                    return false;
                }
                if (fruit.sliced && fruit.alpha <= 0) return false;
                return true;
            });
        }

        function updatePowerups() {
            const gravity = freezeActive ? 0.15 : 0.35;
            const speedMult = freezeActive ? 0.5 : 1;

            powerups.forEach(p => {
                p.x += p.vx * speedMult;
                p.vy = (p.vy || 0) + gravity;
                p.y += p.vy * speedMult;
            });

            powerups = powerups.filter(p => p.y < H + 100);
        }

        function updateParticles() {
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.02;
            });
            particles = particles.filter(p => p.life > 0);
        }

        function updateSliceTrail() {
            if (isSlicing) {
                sliceTrail.push({ x: mouseX, y: mouseY, life: 1 });
            }

            sliceTrail.forEach(p => p.life -= 0.08);
            sliceTrail = sliceTrail.filter(p => p.life > 0);

            if (sliceTrail.length > 20) {
                sliceTrail = sliceTrail.slice(-20);
            }
        }

        function updateCombo() {
            if (comboTimer > 0) {
                comboTimer--;
            } else if (combo > 0) {
                combo = 0;
            }
        }

        function updatePowerupTimers() {
            if (frenzyTimer > 0) {
                frenzyTimer--;
                if (frenzyTimer <= 0) frenzyActive = false;
            }
            if (freezeTimer > 0) {
                freezeTimer--;
                if (freezeTimer <= 0) freezeActive = false;
            }
            if (doubleTimer > 0) {
                doubleTimer--;
                if (doubleTimer <= 0) doubleActive = false;
            }
        }

        function checkSlice() {
            if (!isSlicing) return;

            const dx = mouseX - prevMouseX;
            const dy = mouseY - prevMouseY;
            const sliceSpeed = Math.sqrt(dx * dx + dy * dy);

            if (sliceSpeed < 5) return;

            // Check fruits
            fruits.forEach(fruit => {
                if (fruit.sliced) return;

                const dist = Math.sqrt((fruit.x - mouseX) ** 2 + (fruit.y - mouseY) ** 2);
                if (dist < fruit.size * 0.6) {
                    if (fruit.isBomb) {
                        sliceBomb();
                    } else {
                        sliceFruit(fruit);
                    }
                }
            });

            // Check powerups
            powerups.forEach((p, i) => {
                const dist = Math.sqrt((p.x - mouseX) ** 2 + (p.y - mouseY) ** 2);
                if (dist < p.size * 0.8) {
                    activatePowerup(p);
                    powerups.splice(i, 1);
                }
            });
        }

        function sliceFruit(fruit) {
            fruit.sliced = true;
            playSound('slice');

            // Score
            let points = fruit.points;
            if (doubleActive) points *= 2;

            combo++;
            comboTimer = 30;

            if (combo > 2) {
                points += combo - 2;
                if (combo > maxCombo) maxCombo = combo;
                if (combo === 3 || combo === 5 || combo === 10) {
                    playSound('combo');
                }
            }

            score += points;
            saveData.totalSliced++;

            // Coins
            sessionCoins += Math.ceil(points / 2);

            // Particles
            for (let i = 0; i < 8; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 5;
                particles.push({
                    x: fruit.x,
                    y: fruit.y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed - 3,
                    size: 4 + Math.random() * 6,
                    color: fruit.color,
                    life: 1
                });
            }

            // Juice splat
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: fruit.x + (Math.random() - 0.5) * 30,
                    y: fruit.y + (Math.random() - 0.5) * 30,
                    vx: (Math.random() - 0.5) * 2,
                    vy: Math.random() * 2,
                    size: 8 + Math.random() * 10,
                    color: fruit.color,
                    life: 0.8
                });
            }
        }

        function sliceBomb() {
            playSound('bomb');

            // Screen shake effect
            canvas.style.transform = 'translateX(10px)';
            setTimeout(() => canvas.style.transform = 'translateX(-10px)', 50);
            setTimeout(() => canvas.style.transform = '', 100);

            if (gameMode === 'classic') {
                lives = 0;
            } else {
                score = Math.max(0, score - 20);
            }

            combo = 0;

            // Explosion particles
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 5 + Math.random() * 8;
                particles.push({
                    x: mouseX,
                    y: mouseY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 5 + Math.random() * 10,
                    color: Math.random() < 0.5 ? '#ff4500' : '#ffd700',
                    life: 1
                });
            }
        }

        function activatePowerup(powerup) {
            playSound('powerup');

            switch (powerup.id) {
                case 'frenzy':
                    frenzyActive = true;
                    frenzyTimer = 300; // 5 seconds
                    break;
                case 'freeze':
                    freezeActive = true;
                    freezeTimer = 300;
                    break;
                case 'double':
                    doubleActive = true;
                    doubleTimer = 300;
                    break;
            }
        }

        // ============================================
        // SPAWNING
        // ============================================
        function handleSpawning() {
            let spawnRate = frenzyActive ? 15 : 40;
            let bombChance = 0.08;
            let powerupChance = 0.02;

            if (gameMode === 'zen') {
                spawnRate = 35;
                bombChance = 0;
            } else if (gameMode === 'arcade') {
                spawnRate = frenzyActive ? 12 : 30;
                bombChance = 0.1;
                powerupChance = 0.04;
            }

            // Spawn based on difficulty curve
            const difficultyMod = Math.min(1, frameCount / 3600);
            spawnRate = Math.max(15, spawnRate - difficultyMod * 10);

            if (frameCount % Math.floor(spawnRate) === 0) {
                if (Math.random() < bombChance) {
                    spawnBomb();
                } else {
                    spawnFruit();
                    if (frenzyActive && Math.random() < 0.6) spawnFruit();
                }
            }

            if (Math.random() < powerupChance / 60) {
                spawnPowerup();
            }
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function startGame() {
            initAudio();
            trackGameStart();

            score = 0;
            lives = 3;
            combo = 0;
            maxCombo = 0;
            frameCount = 0;
            sessionCoins = 0;
            newAchievementsThisGame = [];

            fruits = [];
            particles = [];
            sliceTrail = [];
            powerups = [];

            frenzyActive = false;
            freezeActive = false;
            doubleActive = false;
            frenzyTimer = 0;
            freezeTimer = 0;
            doubleTimer = 0;

            if (gameMode === 'zen') {
                timeLeft = 90;
            } else if (gameMode === 'arcade') {
                timeLeft = 60;
            }

            saveData.gamesPlayed++;
            saveSaveData();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');

            gameRunning = true;
            gameLoop();

            // Timer
            if (gameMode !== 'classic') {
                const timer = setInterval(() => {
                    if (!gameRunning) {
                        clearInterval(timer);
                        return;
                    }
                    timeLeft--;
                    if (timeLeft <= 0) {
                        clearInterval(timer);
                        gameOver();
                    }
                }, 1000);
            }
        }

        function gameOver() {
            gameRunning = false;

            // Update high scores
            if (score > saveData.highScores[gameMode]) {
                saveData.highScores[gameMode] = score;
            }

            // Update best combo
            if (maxCombo > saveData.bestCombo) {
                saveData.bestCombo = maxCombo;
            }

            // Award coins
            saveData.coins += sessionCoins;
            saveData.totalCoinsEarned += sessionCoins;

            // Check achievements
            checkAchievements();

            saveSaveData();
            trackGameEnd(score, sessionCoins, score);

            // Show game over screen
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHighScore').textContent = saveData.highScores[gameMode];
            document.getElementById('finalCombo').textContent = maxCombo;
            document.getElementById('coinsEarned').textContent = sessionCoins;

            // Show new achievements
            const newAchDiv = document.getElementById('newAchievements');
            if (newAchievementsThisGame.length > 0) {
                newAchDiv.innerHTML = newAchievementsThisGame.map(a =>
                    `<div class="new-achievement">${a.icon} ${a.name} Unlocked!</div>`
                ).join('');
            } else {
                newAchDiv.innerHTML = '';
            }

            document.getElementById('gameOverScreen').classList.remove('hidden');
        }

        function showMenu() {
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            updateDisplays();
            gameRunning = false;
            idleAnimation();
        }

        // ============================================
        // ACHIEVEMENTS
        // ============================================
        function checkAchievements() {
            ACHIEVEMENTS.forEach(a => {
                if (!saveData.achievements.includes(a.id) && a.check(saveData)) {
                    saveData.achievements.push(a.id);
                    newAchievementsThisGame.push(a);
                    playSound('unlock');
                }
            });
        }

        // ============================================
        // SHOP
        // ============================================
        function renderBladesGrid() {
            const grid = document.getElementById('bladesGrid');
            grid.innerHTML = '';

            BLADES.forEach(blade => {
                const owned = saveData.ownedBlades.includes(blade.id);
                const equipped = saveData.equippedBlade === blade.id;
                const canBuy = saveData.coins >= blade.price;

                const item = document.createElement('div');
                item.className = `blade-item ${equipped ? 'selected' : ''} ${!owned && !canBuy ? 'locked' : ''}`;

                // Create gradient preview
                const gradientColors = blade.colors.join(', ');
                item.innerHTML = `
                    <div class="blade-preview" style="background: linear-gradient(90deg, ${gradientColors});"></div>
                    <div class="blade-name">${blade.name}</div>
                    ${owned ? '<div class="blade-owned">OWNED</div>' : `<div class="blade-price">${blade.price} coins</div>`}
                `;

                item.addEventListener('click', () => {
                    if (owned) {
                        saveData.equippedBlade = blade.id;
                        saveSaveData();
                        renderBladesGrid();
                        playSound('slice');
                    } else if (canBuy) {
                        saveData.coins -= blade.price;
                        saveData.ownedBlades.push(blade.id);
                        saveData.equippedBlade = blade.id;
                        saveSaveData();
                        renderBladesGrid();
                        updateDisplays();
                        playSound('purchase');
                        checkAchievements();
                    }
                });

                grid.appendChild(item);
            });
        }

        function renderBackgroundsGrid() {
            const grid = document.getElementById('backgroundsGrid');
            grid.innerHTML = '';

            BACKGROUNDS.forEach(bg => {
                const owned = saveData.ownedBackgrounds.includes(bg.id);
                const equipped = saveData.equippedBackground === bg.id;
                const canBuy = saveData.coins >= bg.price;

                const item = document.createElement('div');
                item.className = `blade-item ${equipped ? 'selected' : ''} ${!owned && !canBuy ? 'locked' : ''}`;

                const gradientColors = bg.gradient.join(', ');
                item.innerHTML = `
                    <div class="blade-preview" style="background: linear-gradient(180deg, ${gradientColors}); height: 40px; width: 60px; border-radius: 8px;"></div>
                    <div class="blade-name">${bg.name}</div>
                    ${owned ? '<div class="blade-owned">OWNED</div>' : `<div class="blade-price">${bg.price} coins</div>`}
                `;

                item.addEventListener('click', () => {
                    if (owned) {
                        saveData.equippedBackground = bg.id;
                        saveSaveData();
                        renderBackgroundsGrid();
                        playSound('slice');
                    } else if (canBuy) {
                        saveData.coins -= bg.price;
                        saveData.ownedBackgrounds.push(bg.id);
                        saveData.equippedBackground = bg.id;
                        saveSaveData();
                        renderBackgroundsGrid();
                        updateDisplays();
                        playSound('purchase');
                    }
                });

                grid.appendChild(item);
            });
        }

        function renderAchievementsGrid() {
            const grid = document.getElementById('achievementsGrid');
            grid.innerHTML = '';

            ACHIEVEMENTS.forEach(a => {
                const unlocked = saveData.achievements.includes(a.id);
                const item = document.createElement('div');
                item.className = `achievement ${unlocked ? 'unlocked' : ''}`;
                item.innerHTML = `
                    <div class="achievement-icon">${unlocked ? a.icon : '🔒'}</div>
                    <div class="achievement-name">${a.name}</div>
                `;
                item.title = a.desc;
                grid.appendChild(item);
            });

            document.getElementById('achieveCount').textContent =
                `${saveData.achievements.length}/${ACHIEVEMENTS.length} Unlocked`;
        }

        function updateDisplays() {
            document.getElementById('totalCoins').textContent = saveData.coins;
            document.getElementById('shopCoins').textContent = saveData.coins;
            document.getElementById('bestScore').textContent = Math.max(
                saveData.highScores.classic,
                saveData.highScores.zen,
                saveData.highScores.arcade
            );
            document.getElementById('totalSliced').textContent = saveData.totalSliced;
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            if (!gameRunning) return;

            frameCount++;

            ctx.clearRect(0, 0, W, H);

            drawBackground();
            handleSpawning();
            updateFruits();
            updatePowerups();
            updateParticles();
            updateSliceTrail();
            updateCombo();
            updatePowerupTimers();
            checkSlice();

            // Draw
            fruits.forEach(f => f.isBomb ? drawBomb(f) : drawFruit(f));
            powerups.forEach(drawPowerup);
            drawParticles();
            drawSliceTrail();
            drawCursor();
            drawHUD();

            // Check game over
            if (gameMode === 'classic' && lives <= 0) {
                gameOver();
                return;
            }

            prevMouseX = mouseX;
            prevMouseY = mouseY;

            requestAnimationFrame(gameLoop);
        }

        function idleAnimation() {
            if (gameRunning) return;

            ctx.clearRect(0, 0, W, H);
            drawBackground();

            // Floating fruit animation
            const time = Date.now() * 0.001;
            const demoFruits = ['🍎', '🍊', '🍋', '🍇', '🍉'];
            demoFruits.forEach((emoji, i) => {
                const x = W / 2 + Math.cos(time + i * 1.2) * 150;
                const y = H / 2 + Math.sin(time * 1.5 + i) * 80;
                ctx.font = '50px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(emoji, x, y);
            });

            requestAnimationFrame(idleAnimation);
        }

        // ============================================
        // INPUT
        // ============================================
        function handleMove(x, y) {
            prevMouseX = mouseX;
            prevMouseY = mouseY;
            mouseX = x;
            mouseY = y;
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleMove(e.clientX - rect.left, e.clientY - rect.top);
            isSlicing = true;
        });

        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            handleMove(e.clientX - rect.left, e.clientY - rect.top);
        });

        canvas.addEventListener('mouseup', () => {
            isSlicing = false;
            sliceTrail = [];
        });

        canvas.addEventListener('mouseleave', () => {
            isSlicing = false;
            sliceTrail = [];
        });

        // Touch events
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleMove(touch.clientX - rect.left, touch.clientY - rect.top);
            isSlicing = true;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            handleMove(touch.clientX - rect.left, touch.clientY - rect.top);
        });

        canvas.addEventListener('touchend', () => {
            isSlicing = false;
            sliceTrail = [];
        });

        // ============================================
        // UI EVENTS
        // ============================================
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                gameMode = btn.dataset.mode;
            });
        });

        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('menuBtn').addEventListener('click', showMenu);

        document.getElementById('shopBtn').addEventListener('click', () => {
            document.getElementById('startScreen').classList.add('hidden');
            renderBladesGrid();
            renderBackgroundsGrid();
            renderAchievementsGrid();
            document.getElementById('shopScreen').classList.remove('hidden');
        });

        document.getElementById('shopBackBtn').addEventListener('click', () => {
            document.getElementById('shopScreen').classList.add('hidden');
            document.getElementById('startScreen').classList.remove('hidden');
            updateDisplays();
        });

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.shop-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab + 'Content').classList.add('active');
            });
        });

        // Start idle animation
        idleAnimation();
    </script>
</body>
</html>
