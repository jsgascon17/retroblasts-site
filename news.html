<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News & Updates - Sandbox Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 800px; margin: 0 auto; }

        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; flex-wrap: wrap; gap: 15px;
        }
        .header h1 { font-size: 2rem; color: #ffd700; }
        .nav-links { display: flex; gap: 10px; flex-wrap: wrap; }
        .nav-link {
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 10px 20px; border-radius: 10px;
            text-decoration: none; font-weight: bold;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); }

        /* News Cards */
        .news-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }
        .news-card:hover {
            border-color: rgba(255,215,0,0.3);
            transform: translateY(-2px);
        }

        .news-header {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            flex-wrap: wrap;
        }
        .news-title {
            font-size: 1.4rem;
            font-weight: bold;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .news-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .news-date {
            color: #888;
            font-size: 0.9rem;
        }
        .news-tag {
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        .news-tag.update { background: #3b82f6; }
        .news-tag.new { background: #22c55e; }
        .news-tag.event { background: #a855f7; }
        .news-tag.fix { background: #f59e0b; }
        .news-tag.important { background: #ef4444; }

        .news-content {
            padding: 20px;
            color: #ccc;
            line-height: 1.7;
        }
        .news-content ul {
            margin-left: 20px;
            margin-top: 10px;
        }
        .news-content li {
            margin-bottom: 8px;
        }
        .news-content strong {
            color: #ffd700;
        }
        .news-content a {
            color: #60a5fa;
        }

        /* Pinned News */
        .news-card.pinned {
            border-color: #ffd700;
            background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,0,0,0.4));
        }
        .news-card.pinned .news-title::before {
            content: '📌';
            margin-right: 8px;
        }

        /* Admin Panel */
        .admin-panel {
            background: rgba(0,0,0,0.4);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            border: 2px solid #ef4444;
            display: none;
        }
        .admin-panel.visible { display: block; }
        .admin-panel h3 {
            color: #ef4444;
            margin-bottom: 15px;
        }
        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .form-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .form-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
        }
        .form-input:focus {
            outline: none;
            border-color: #ffd700;
        }
        .form-select {
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            min-width: 150px;
        }
        .form-textarea {
            width: 100%;
            min-height: 150px;
            padding: 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            resize: vertical;
        }
        .form-textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        .form-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-checkbox input {
            width: 20px;
            height: 20px;
        }
        .submit-btn {
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            align-self: flex-start;
        }
        .submit-btn:hover {
            transform: scale(1.02);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888;
        }
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: bold;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }
        .notification.success { background: #22c55e; color: #fff; }
        .notification.error { background: #ef4444; color: #fff; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Delete button for admin */
        .delete-btn {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            display: none;
        }
        .admin-mode .delete-btn { display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>News & Updates</h1>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Games</a>
                <a href="profile.html" class="nav-link">Profile</a>
            </div>
        </div>

        <!-- Admin Panel (hidden by default) -->
        <div class="admin-panel" id="adminPanel">
            <h3>Post News (Admin)</h3>
            <form class="admin-form" onsubmit="postNews(event)">
                <div class="form-row">
                    <input type="text" class="form-input" id="newsTitle" placeholder="Title" required>
                    <select class="form-select" id="newsTag">
                        <option value="update">Update</option>
                        <option value="new">New Feature</option>
                        <option value="event">Event</option>
                        <option value="fix">Bug Fix</option>
                        <option value="important">Important</option>
                    </select>
                </div>
                <textarea class="form-textarea" id="newsContent" placeholder="Content (supports basic HTML: &lt;strong&gt;, &lt;ul&gt;, &lt;li&gt;, &lt;a&gt;)" required></textarea>
                <div class="form-row">
                    <label class="form-checkbox">
                        <input type="checkbox" id="newsPinned">
                        Pin this post
                    </label>
                    <button type="submit" class="submit-btn">Post News</button>
                </div>
            </form>
        </div>

        <div class="news-list" id="newsList">
            <!-- Populated by JS -->
        </div>
    </div>

    <script>
    let isAdmin = false;

    const tagIcons = {
        'update': '🔄',
        'new': '✨',
        'event': '🎉',
        'fix': '🔧',
        'important': '⚠️'
    };

    function formatDate(dateStr) {
        const date = new Date(dateStr);
        const now = new Date();
        const diff = now - date;
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));

        if (days === 0) return 'Today';
        if (days === 1) return 'Yesterday';
        if (days < 7) return `${days} days ago`;

        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function init() {
        // Check if admin
        try {
            const resp = await fetch('api/auth.php?action=check', { credentials: 'include' });
            const data = await resp.json();

            if (data.success && data.loggedIn) {
                // Check if user is admin (you can customize this check)
                const adminUsers = ['billybuffalo15', 'admin'];
                if (adminUsers.includes(data.user.username)) {
                    isAdmin = true;
                    document.getElementById('adminPanel').classList.add('visible');
                    document.body.classList.add('admin-mode');
                }
            }
        } catch (e) {}

        loadNews();
    }

    async function loadNews() {
        try {
            const resp = await fetch('api/news.php?action=list');
            const data = await resp.json();

            if (data.success && data.news && data.news.length > 0) {
                renderNews(data.news);
            } else {
                showEmpty();
            }
        } catch (e) {
            console.error('Failed to load news:', e);
            showEmpty();
        }
    }

    function renderNews(news) {
        // Sort: pinned first, then by date
        news.sort((a, b) => {
            if (a.pinned && !b.pinned) return -1;
            if (!a.pinned && b.pinned) return 1;
            return new Date(b.date) - new Date(a.date);
        });

        const container = document.getElementById('newsList');
        container.innerHTML = news.map(item => `
            <div class="news-card ${item.pinned ? 'pinned' : ''}">
                <div class="news-header">
                    <div class="news-title">
                        ${tagIcons[item.tag] || ''} ${escapeHtml(item.title)}
                    </div>
                    <div class="news-meta">
                        <span class="news-tag ${item.tag}">${item.tag}</span>
                        <span class="news-date">${formatDate(item.date)}</span>
                        <button class="delete-btn" onclick="deleteNews('${item.id}')">Delete</button>
                    </div>
                </div>
                <div class="news-content">
                    ${item.content}
                </div>
            </div>
        `).join('');
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showEmpty() {
        document.getElementById('newsList').innerHTML = `
            <div class="empty-state">
                <div class="icon">📰</div>
                <h3>No news yet!</h3>
                <p>Check back soon for updates and announcements.</p>
            </div>
        `;
    }

    async function postNews(e) {
        e.preventDefault();

        const title = document.getElementById('newsTitle').value;
        const tag = document.getElementById('newsTag').value;
        const content = document.getElementById('newsContent').value;
        const pinned = document.getElementById('newsPinned').checked;

        try {
            const resp = await fetch('api/news.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'post', title, tag, content, pinned })
            });
            const data = await resp.json();

            if (data.success) {
                showNotification('News posted!', 'success');
                document.getElementById('newsTitle').value = '';
                document.getElementById('newsContent').value = '';
                document.getElementById('newsPinned').checked = false;
                loadNews();
            } else {
                showNotification(data.error || 'Failed to post', 'error');
            }
        } catch (e) {
            showNotification('Error posting news', 'error');
        }
    }

    async function deleteNews(id) {
        if (!confirm('Delete this post?')) return;

        try {
            const resp = await fetch('api/news.php', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'delete', id })
            });
            const data = await resp.json();

            if (data.success) {
                showNotification('Deleted!', 'success');
                loadNews();
            } else {
                showNotification(data.error || 'Failed to delete', 'error');
            }
        } catch (e) {
            showNotification('Error deleting', 'error');
        }
    }

    function showNotification(message, type) {
        const notif = document.createElement('div');
        notif.className = `notification ${type}`;
        notif.textContent = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }

    init();
    </script>
</body>
</html>
