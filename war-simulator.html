<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Last Run - War Simulator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #gameCanvas {
            display: block;
            background: #000;
            cursor: none;
        }
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #fff;
        }
        .overlay.hidden { display: none; }
        .overlay h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: #ff4444;
            text-shadow: 0 0 20px rgba(255,68,68,0.5);
        }
        .overlay h2 {
            font-size: 2rem;
            margin-bottom: 20px;
            color: #ffd700;
        }
        .overlay p {
            margin: 8px 0;
            color: #aaa;
            font-size: 1.2rem;
        }
        .overlay .subtitle {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 30px;
        }
        .btn {
            margin: 15px;
            padding: 18px 50px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: bold;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 30px rgba(255,68,68,0.5);
        }
        .stats-row {
            display: flex;
            gap: 50px;
            margin: 20px 0;
        }
        .stat-box {
            text-align: center;
        }
        .stat-label { color: #666; font-size: 0.9rem; text-transform: uppercase; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #ffd700; }
        .controls-hint {
            margin-top: 30px;
            color: #555;
            font-size: 1rem;
        }
        .home-link {
            position: fixed;
            top: 15px;
            left: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            opacity: 0.5;
            z-index: 200;
            transition: opacity 0.3s;
        }
        .home-link:hover { opacity: 1; }
    </style>
</head>
<body>
    <a href="index.html" class="home-link">< Back</a>

    <canvas id="gameCanvas"></canvas>

    <!-- Start Menu -->
    <div class="overlay" id="menuOverlay">
        <h1>Last Run</h1>
        <p class="subtitle">How far can you go?</p>
        <p>The dead have risen. Your only goal: survive.</p>
        <p>Sprint through the wasteland as the horde closes in.</p>
        <button class="btn" id="startBtn">Start Run</button>
        <p class="controls-hint">A/D to dodge • Click to shoot • You can only move forward</p>
    </div>

    <!-- Game Over -->
    <div class="overlay hidden" id="gameOverOverlay">
        <h1>You Died</h1>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-label">Distance</div>
                <div class="stat-value" id="finalDistance">0m</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Kills</div>
                <div class="stat-value" id="finalKills">0</div>
            </div>
        </div>
        <p id="highScoreText"></p>

        <!-- Leaderboard Submission -->
        <div id="leaderboardSubmit" style="margin: 15px 0; padding: 15px; background: rgba(255,100,100,0.2); border-radius: 10px; border: 1px solid #ff6464;">
            <p style="color: #ff6464; margin-bottom: 10px; font-size: 0.9rem;">Submit to Global Leaderboard:</p>
            <div style="display: flex; gap: 8px; justify-content: center;">
                <input type="text" id="playerName" placeholder="Your name" maxlength="15" style="width: 120px; padding: 8px 12px; border: 2px solid #ff6464; border-radius: 8px; background: rgba(0,0,0,0.3); color: #fff; font-family: inherit;">
                <button class="btn" id="submitScoreBtn" style="padding: 8px 15px;">Submit</button>
            </div>
            <p id="leaderboardMsg" style="margin-top: 8px; font-size: 0.8rem; min-height: 1.2em;"></p>
        </div>

        <button class="btn" id="restartBtn">Run Again</button>
    </div>

    <script>
        // ============================================
        // SETUP - FULL SCREEN CANVAS
        // ============================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ============================================
        // GAME CONSTANTS
        // ============================================
        const HORIZON_RATIO = 0.4;  // Where sky meets ground
        const PLAYER_SPEED = 8;      // Auto-forward speed (visual)
        const STRAFE_SPEED = 12;     // Left/right dodge speed

        // ============================================
        // GAME STATE
        // ============================================
        let gameRunning = false;
        let distance = 0;
        let kills = 0;
        let health = 100;
        let highScore = parseInt(localStorage.getItem('lastRunHighScore')) || 0;

        // Player position (only X matters for strafing, -1 to 1)
        let playerX = 0;

        // Enemies, bullets, effects
        let enemies = [];
        let bullets = [];
        let particles = [];
        let muzzleFlash = 0;

        // Gun state
        let gunRecoil = 0;
        let ammo = 8;
        let maxAmmo = 8;
        let reloading = false;
        let reloadTime = 0;
        let lastShotTime = 0;
        const FIRE_RATE = 400;  // ms between shots

        // Ground scroll
        let groundOffset = 0;

        // Input
        let keys = {};
        let mouseDown = false;

        // ============================================
        // UI ELEMENTS
        // ============================================
        const menuOverlay = document.getElementById('menuOverlay');
        const gameOverOverlay = document.getElementById('gameOverOverlay');

        // ============================================
        // ENEMY SPAWNING
        // ============================================
        function spawnEnemy() {
            // Spawn at random X position, far away (z = 1)
            const x = (Math.random() - 0.5) * 2.5;  // -1.25 to 1.25

            enemies.push({
                x: x,
                z: 0.95 + Math.random() * 0.1,  // Far away
                speed: 0.003 + Math.random() * 0.002 + distance * 0.000005,  // Gets faster over time
                health: 1,
                type: Math.random() > 0.3 ? 'normal' : 'fast',
                wobble: Math.random() * Math.PI * 2
            });
        }

        // ============================================
        // WORLD TO SCREEN CONVERSION
        // ============================================
        function worldToScreen(x, z) {
            const W = canvas.width;
            const H = canvas.height;
            const horizonY = H * HORIZON_RATIO;

            // Perspective scaling
            const scale = Math.pow(1 - z, 1.5);
            const screenX = W / 2 + (x - playerX) * W * 0.5 * scale;
            const screenY = horizonY + (H - horizonY) * scale * 0.9;

            return { x: screenX, y: screenY, scale: scale };
        }

        // ============================================
        // DRAWING FUNCTIONS
        // ============================================
        function drawBackground() {
            const W = canvas.width;
            const H = canvas.height;
            const horizonY = H * HORIZON_RATIO;

            // Sky gradient (dusty blue-gray)
            const skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
            skyGrad.addColorStop(0, '#8BA4B4');
            skyGrad.addColorStop(0.7, '#A8B8C0');
            skyGrad.addColorStop(1, '#C4CDD2');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, W, horizonY);

            // Ground gradient (sandy desert)
            const groundGrad = ctx.createLinearGradient(0, horizonY, 0, H);
            groundGrad.addColorStop(0, '#C9B896');
            groundGrad.addColorStop(0.2, '#BDA87A');
            groundGrad.addColorStop(0.5, '#A89668');
            groundGrad.addColorStop(1, '#8B7B55');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, horizonY, W, H - horizonY);

            // Ground texture lines (moving forward)
            groundOffset = (groundOffset + PLAYER_SPEED * 0.5) % 100;

            ctx.strokeStyle = 'rgba(139, 123, 85, 0.3)';
            ctx.lineWidth = 1;

            // Horizontal lines (perspective)
            for (let i = 0; i < 15; i++) {
                const t = (i / 15);
                const y = horizonY + (H - horizonY) * Math.pow(t, 0.6);
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(W, y);
                ctx.stroke();
            }

            // Vertical lines converging to horizon
            ctx.strokeStyle = 'rgba(139, 123, 85, 0.2)';
            for (let i = -8; i <= 8; i++) {
                ctx.beginPath();
                ctx.moveTo(W / 2 + i * 30, horizonY);
                ctx.lineTo(W / 2 + i * 150, H);
                ctx.stroke();
            }
        }

        function drawEnemy(e) {
            const pos = worldToScreen(e.x, e.z);
            const scale = pos.scale;

            if (scale < 0.02) return;  // Too far to draw

            // Roblox-style blocky zombie
            const bodyWidth = 60 * scale;
            const bodyHeight = 80 * scale;
            const headSize = 45 * scale;
            const armWidth = 18 * scale;
            const legWidth = 20 * scale;

            const baseY = pos.y;
            const centerX = pos.x;

            // Wobble animation (walking)
            const wobble = Math.sin(Date.now() / 100 + e.wobble) * 5 * scale;

            ctx.save();
            ctx.translate(centerX, baseY);

            // Shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath();
            ctx.ellipse(0, bodyHeight * 0.4, bodyWidth * 0.8, bodyHeight * 0.1, 0, 0, Math.PI * 2);
            ctx.fill();

            // Colors based on type
            const skinColor = e.type === 'fast' ? '#7A8B6E' : '#8B9A7E';  // Greenish zombie skin
            const shirtColor = e.type === 'fast' ? '#8B4444' : '#6B7B6B';
            const pantsColor = '#4A4A4A';

            // Legs
            ctx.fillStyle = pantsColor;
            ctx.fillRect(-bodyWidth * 0.35 + wobble, bodyHeight * 0.1, legWidth, bodyHeight * 0.35);
            ctx.fillRect(bodyWidth * 0.15 - wobble, bodyHeight * 0.1, legWidth, bodyHeight * 0.35);

            // Body (torso)
            ctx.fillStyle = shirtColor;
            ctx.fillRect(-bodyWidth * 0.4, -bodyHeight * 0.3, bodyWidth * 0.8, bodyHeight * 0.45);

            // Arms (stretched forward zombie style)
            ctx.fillStyle = skinColor;
            ctx.save();
            ctx.translate(-bodyWidth * 0.5, -bodyHeight * 0.2);
            ctx.rotate(-0.5 + Math.sin(Date.now() / 150) * 0.1);
            ctx.fillRect(0, 0, armWidth, bodyHeight * 0.4);
            ctx.restore();

            ctx.save();
            ctx.translate(bodyWidth * 0.5 - armWidth, -bodyHeight * 0.2);
            ctx.rotate(0.5 - Math.sin(Date.now() / 150) * 0.1);
            ctx.fillRect(0, 0, armWidth, bodyHeight * 0.4);
            ctx.restore();

            // Head
            ctx.fillStyle = skinColor;
            ctx.fillRect(-headSize * 0.5, -bodyHeight * 0.3 - headSize, headSize, headSize);

            // Face details
            ctx.fillStyle = '#333';
            // Eyes
            ctx.fillRect(-headSize * 0.3, -bodyHeight * 0.3 - headSize * 0.7, headSize * 0.15, headSize * 0.15);
            ctx.fillRect(headSize * 0.15, -bodyHeight * 0.3 - headSize * 0.7, headSize * 0.15, headSize * 0.15);

            ctx.restore();
        }

        function drawEnemies() {
            // Sort by distance (far first)
            const sorted = [...enemies].sort((a, b) => b.z - a.z);
            sorted.forEach(drawEnemy);
        }

        function drawBullets() {
            bullets.forEach(b => {
                const pos = worldToScreen(b.x, b.z);
                const size = 8 * pos.scale;

                if (pos.scale < 0.01) return;

                // Bullet trail
                ctx.fillStyle = '#FFD700';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size, 0, Math.PI * 2);
                ctx.fill();

                // Glow
                ctx.fillStyle = 'rgba(255, 200, 0, 0.4)';
                ctx.beginPath();
                ctx.arc(pos.x, pos.y, size * 2, 0, Math.PI * 2);
                ctx.fill();
            });
        }

        function drawGun() {
            const W = canvas.width;
            const H = canvas.height;

            ctx.save();

            // Gun position (bottom right)
            const gunX = W * 0.7;
            const gunY = H - 50;
            const gunScale = Math.min(W, H) / 800;

            ctx.translate(gunX, gunY);
            ctx.scale(gunScale, gunScale);

            // Recoil animation
            ctx.translate(0, -gunRecoil * 30);
            ctx.rotate(-gunRecoil * 0.1);

            // Muzzle flash
            if (muzzleFlash > 0) {
                ctx.save();
                ctx.translate(80, -120);

                // Flash glow
                const flashSize = 80 + Math.random() * 30;
                const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, flashSize);
                gradient.addColorStop(0, 'rgba(255, 200, 50, 0.9)');
                gradient.addColorStop(0.3, 'rgba(255, 150, 0, 0.6)');
                gradient.addColorStop(0.7, 'rgba(255, 100, 0, 0.3)');
                gradient.addColorStop(1, 'rgba(255, 50, 0, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(0, 0, flashSize, 0, Math.PI * 2);
                ctx.fill();

                // Core flash
                ctx.fillStyle = '#FFF';
                ctx.beginPath();
                ctx.arc(0, 0, 15 + Math.random() * 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }

            // Gun barrel (dark metal)
            ctx.fillStyle = '#2A2A2A';
            ctx.fillRect(0, -80, 120, 35);

            // Barrel top detail
            ctx.fillStyle = '#1A1A1A';
            ctx.fillRect(10, -80, 100, 8);

            // Barrel hole
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(115, -62, 10, 0, Math.PI * 2);
            ctx.fill();

            // Receiver (main body)
            ctx.fillStyle = '#333';
            ctx.fillRect(-30, -70, 80, 50);

            // Wooden stock
            ctx.fillStyle = '#8B6914';
            ctx.beginPath();
            ctx.moveTo(-30, -70);
            ctx.lineTo(-120, 20);
            ctx.lineTo(-100, 40);
            ctx.lineTo(-30, -20);
            ctx.closePath();
            ctx.fill();

            // Stock grain detail
            ctx.strokeStyle = '#6B4914';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-80, -20);
            ctx.lineTo(-50, -50);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(-90, 0);
            ctx.lineTo(-60, -30);
            ctx.stroke();

            // Grip
            ctx.fillStyle = '#8B6914';
            ctx.fillRect(-10, -20, 25, 60);

            // Trigger guard
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(15, 10, 20, 0, Math.PI);
            ctx.stroke();

            // Hand (simplified)
            ctx.fillStyle = '#D4A574';
            ctx.fillRect(-5, 0, 35, 30);
            ctx.fillRect(5, 25, 25, 15);

            ctx.restore();

            // Ammo counter
            ctx.fillStyle = '#fff';
            ctx.font = `bold ${24 * gunScale}px Arial`;
            ctx.textAlign = 'right';
            ctx.fillText(`${ammo}/${maxAmmo}`, W - 30, H - 30);

            if (reloading) {
                ctx.fillStyle = '#ffd700';
                ctx.fillText('RELOADING...', W - 30, H - 60);
            }
        }

        function drawCrosshair() {
            const W = canvas.width;
            const H = canvas.height;
            const centerX = W / 2;
            const centerY = H / 2;

            // Red crosshair like in the image
            ctx.strokeStyle = '#FF4444';
            ctx.lineWidth = 3;

            const size = 15;
            const gap = 6;

            // Horizontal lines
            ctx.beginPath();
            ctx.moveTo(centerX - size - gap, centerY);
            ctx.lineTo(centerX - gap, centerY);
            ctx.moveTo(centerX + gap, centerY);
            ctx.lineTo(centerX + size + gap, centerY);
            ctx.stroke();

            // Vertical lines
            ctx.beginPath();
            ctx.moveTo(centerX, centerY - size - gap);
            ctx.lineTo(centerX, centerY - gap);
            ctx.moveTo(centerX, centerY + gap);
            ctx.lineTo(centerX, centerY + size + gap);
            ctx.stroke();

            // Center dot
            ctx.fillStyle = '#FF4444';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawHUD() {
            const W = canvas.width;
            const H = canvas.height;

            // Distance (top center) - styled like "HOW FAR CAN YOU GO?"
            ctx.fillStyle = '#fff';
            ctx.font = 'bold 28px Arial';
            ctx.textAlign = 'center';
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 4;
            ctx.strokeText(`${Math.floor(distance)}m`, W / 2, 50);
            ctx.fillText(`${Math.floor(distance)}m`, W / 2, 50);

            // Kills (top left)
            ctx.textAlign = 'left';
            ctx.font = 'bold 22px Arial';
            ctx.strokeText(`Kills: ${kills}`, 20, 50);
            ctx.fillStyle = '#ff4444';
            ctx.fillText(`Kills: ${kills}`, 20, 50);

            // Health bar (top)
            const barWidth = 200;
            const barHeight = 8;
            const barX = W / 2 - barWidth / 2;
            const barY = 70;

            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            const healthColor = health > 60 ? '#4ecdc4' : (health > 30 ? '#ffd700' : '#ff4444');
            ctx.fillStyle = healthColor;
            ctx.fillRect(barX, barY, barWidth * (health / 100), barHeight);
        }

        function drawParticles() {
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.5;  // Gravity
                p.life--;

                ctx.globalAlpha = p.life / p.maxLife;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
                ctx.globalAlpha = 1;

                return p.life > 0;
            });
        }

        // ============================================
        // GAME LOGIC
        // ============================================
        function shoot() {
            if (reloading || ammo <= 0) return;

            const now = Date.now();
            if (now - lastShotTime < FIRE_RATE) return;
            lastShotTime = now;

            ammo--;
            gunRecoil = 1;
            muzzleFlash = 5;

            // Create bullet going forward
            bullets.push({
                x: playerX,
                z: 0,
                speed: 0.08
            });

            // Auto reload when empty
            if (ammo <= 0) {
                startReload();
            }
        }

        function startReload() {
            if (reloading || ammo === maxAmmo) return;
            reloading = true;
            reloadTime = 60;  // frames
        }

        function updateGame() {
            if (!gameRunning) return;

            const W = canvas.width;
            const H = canvas.height;

            // Distance increases (you're always running forward)
            distance += 0.3;

            // Strafe left/right
            if (keys['a'] || keys['arrowleft']) {
                playerX = Math.max(-1.2, playerX - STRAFE_SPEED / 100);
            }
            if (keys['d'] || keys['arrowright']) {
                playerX = Math.min(1.2, playerX + STRAFE_SPEED / 100);
            }

            // Shooting
            if (mouseDown) {
                shoot();
            }

            // Reloading
            if (reloading) {
                reloadTime--;
                if (reloadTime <= 0) {
                    ammo = maxAmmo;
                    reloading = false;
                }
            }

            // Gun animations
            if (gunRecoil > 0) gunRecoil *= 0.8;
            if (muzzleFlash > 0) muzzleFlash--;

            // Spawn enemies
            const spawnRate = Math.max(20, 60 - distance * 0.05);
            if (Math.random() < 1 / spawnRate) {
                spawnEnemy();
            }

            // Update enemies
            enemies = enemies.filter(e => {
                // Move toward player (decrease z)
                e.z -= e.speed + 0.002;  // Base approach + player running toward them

                // Slight tracking
                if (e.x < playerX - 0.1) e.x += 0.003;
                if (e.x > playerX + 0.1) e.x -= 0.003;

                // Hit player
                if (e.z < 0.08 && Math.abs(e.x - playerX) < 0.3) {
                    health -= 15;
                    createBloodParticles(canvas.width / 2, canvas.height / 2);

                    if (health <= 0) {
                        gameOver();
                    }
                    return false;
                }

                // Remove if passed
                return e.z > -0.1;
            });

            // Update bullets
            bullets = bullets.filter(b => {
                b.z += b.speed;

                // Check enemy hits
                for (let i = enemies.length - 1; i >= 0; i--) {
                    const e = enemies[i];
                    const hitRange = 0.15;

                    if (Math.abs(b.z - e.z) < 0.1 && Math.abs(b.x - e.x) < hitRange) {
                        // Hit!
                        e.health--;

                        if (e.health <= 0) {
                            // Kill
                            kills++;
                            const pos = worldToScreen(e.x, e.z);
                            createBloodParticles(pos.x, pos.y);
                            enemies.splice(i, 1);
                        }
                        return false;
                    }
                }

                return b.z < 1;
            });
        }

        function createBloodParticles(x, y) {
            for (let i = 0; i < 15; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 10 - 5,
                    size: 4 + Math.random() * 6,
                    color: Math.random() > 0.3 ? '#8B0000' : '#FF0000',
                    life: 30 + Math.random() * 20,
                    maxLife: 50
                });
            }
        }

        // ============================================
        // GAME FLOW
        // ============================================
        function startGame() {
            gameRunning = true;
            distance = 0;
            kills = 0;
            health = 100;
            playerX = 0;
            enemies = [];
            bullets = [];
            particles = [];
            ammo = maxAmmo;
            reloading = false;
            gunRecoil = 0;
            muzzleFlash = 0;

            menuOverlay.classList.add('hidden');
            gameOverOverlay.classList.add('hidden');

            trackGameStart();
        }

        function gameOver() {
            gameRunning = false;

            document.getElementById('finalDistance').textContent = Math.floor(distance) + 'm';
            document.getElementById('finalKills').textContent = kills;

            if (distance > highScore) {
                highScore = Math.floor(distance);
                localStorage.setItem('lastRunHighScore', highScore);
                document.getElementById('highScoreText').textContent = 'NEW HIGH SCORE!';
                document.getElementById('highScoreText').style.color = '#ffd700';
            } else {
                document.getElementById('highScoreText').textContent = `Best: ${highScore}m`;
                document.getElementById('highScoreText').style.color = '#888';
            }

            // Reset leaderboard submit
            const submitBtn = document.getElementById('submitScoreBtn');
            submitBtn.disabled = false; submitBtn.textContent = 'Submit';
            document.getElementById('leaderboardMsg').textContent = '';

            gameOverOverlay.classList.remove('hidden');
            trackGameEnd();
        }

        // ============================================
        // GAME LOOP
        // ============================================
        function gameLoop() {
            const W = canvas.width;
            const H = canvas.height;

            ctx.clearRect(0, 0, W, H);

            drawBackground();

            if (gameRunning) {
                updateGame();
                drawBullets();
                drawEnemies();
                drawParticles();
                drawGun();
                drawCrosshair();
                drawHUD();
            }

            requestAnimationFrame(gameLoop);
        }

        // ============================================
        // INPUT
        // ============================================
        document.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (e.key.toLowerCase() === 'r') startReload();
        });

        document.addEventListener('keyup', e => {
            keys[e.key.toLowerCase()] = false;
        });

        canvas.addEventListener('mousedown', e => {
            mouseDown = true;
            e.preventDefault();
        });

        canvas.addEventListener('mouseup', () => mouseDown = false);
        canvas.addEventListener('mouseleave', () => mouseDown = false);

        // Touch support
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            mouseDown = true;
        });

        canvas.addEventListener('touchend', e => {
            e.preventDefault();
            mouseDown = false;
        });

        // Button handlers
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);

        // ============================================
        // STATS TRACKING
        // ============================================
        let gameStartTime = 0;

        function loadArcadeStats() {
            return JSON.parse(localStorage.getItem('arcadeStats') ||
                '{"totalGamesPlayed":0,"totalTimePlayed":0,"totalCoinsEarned":0,"games":{}}');
        }

        function saveArcadeStats(stats) {
            localStorage.setItem('arcadeStats', JSON.stringify(stats));
        }

        function trackGameStart() {
            gameStartTime = Date.now();
        }

        function trackGameEnd() {
            const stats = loadArcadeStats();
            const gameTime = Math.floor((Date.now() - gameStartTime) / 1000);

            stats.totalGamesPlayed++;
            stats.totalTimePlayed += gameTime;

            if (!stats.games['war-simulator']) {
                stats.games['war-simulator'] = {
                    gamesPlayed: 0,
                    timePlayed: 0,
                    highScore: 0,
                    totalKills: 0,
                    bestDistance: 0
                };
            }

            const g = stats.games['war-simulator'];
            g.gamesPlayed++;
            g.timePlayed += gameTime;
            g.totalKills += kills;
            if (distance > g.bestDistance) g.bestDistance = Math.floor(distance);
            if (kills > g.highScore) g.highScore = kills;

            saveArcadeStats(stats);
        }

        // Leaderboard submission
        document.getElementById('submitScoreBtn').addEventListener('click', async function() {
            const nameInput = document.getElementById('playerName');
            const msgEl = document.getElementById('leaderboardMsg');
            const btn = this;
            const playerName = nameInput.value.trim() || 'Anonymous';
            const playerScore = Math.floor(distance);
            btn.disabled = true; btn.textContent = '...';
            msgEl.textContent = 'Submitting...'; msgEl.style.color = '#888';
            try {
                const response = await fetch('leaderboard-global.php', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ game: 'war-simulator', name: playerName, score: playerScore })
                });
                const data = await response.json();
                if (data.success) {
                    msgEl.style.color = '#ff6464';
                    msgEl.textContent = data.isTopTen ? '🏆 #' + data.rank + ' - Top 10!' : '✓ Rank #' + data.rank;
                    btn.textContent = 'Done!';
                    localStorage.setItem('warPlayerName', playerName);
                } else { throw new Error(data.error); }
            } catch (e) { msgEl.style.color = '#f00'; msgEl.textContent = 'Failed!'; btn.disabled = false; btn.textContent = 'Submit'; }
        });
        const sn = localStorage.getItem('warPlayerName');
        if (sn) document.getElementById('playerName').value = sn;

        // Start
        gameLoop();
    </script>
</body>
</html>
