<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Arcade</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(0,0,0,0.3);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .header h1 { font-size: 1.5rem; }
        .nav-links { display: flex; gap: 10px; }
        .nav-link {
            background: rgba(255,255,255,0.1); color: #fff;
            padding: 8px 15px; border-radius: 8px;
            text-decoration: none; font-size: 0.9rem;
        }
        .nav-link:hover { background: rgba(255,255,255,0.2); }
        
        .chat-container {
            flex: 1; display: flex; overflow: hidden;
        }
        
        .sidebar {
            width: 280px; background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column;
        }
        
        .sidebar-tabs {
            display: flex; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-tab {
            flex: 1; padding: 15px; text-align: center;
            background: transparent; border: none; color: #888;
            cursor: pointer; font-weight: bold;
        }
        .sidebar-tab.active { color: #e94560; border-bottom: 2px solid #e94560; }
        
        .conversations {
            flex: 1; overflow-y: auto; padding: 10px;
        }
        
        .conversation-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px; border-radius: 12px; cursor: pointer;
            transition: background 0.2s; margin-bottom: 5px;
        }
        .conversation-item:hover { background: rgba(255,255,255,0.05); }
        .conversation-item.active { background: rgba(233,69,96,0.2); }
        
        .conv-avatar {
            width: 45px; height: 45px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.3rem; flex-shrink: 0;
        }
        .conv-info { flex: 1; min-width: 0; }
        .conv-name { font-weight: bold; font-size: 0.95rem; }
        .conv-preview {
            color: #888; font-size: 0.8rem; white-space: nowrap;
            overflow: hidden; text-overflow: ellipsis;
        }
        .conv-badge {
            background: #e94560; color: #fff; padding: 3px 8px;
            border-radius: 10px; font-size: 0.75rem; font-weight: bold;
        }
        
        .chat-main {
            flex: 1; display: flex; flex-direction: column;
        }
        
        .chat-header {
            padding: 15px 20px; background: rgba(0,0,0,0.2);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; align-items: center; gap: 15px;
        }
        .chat-header-avatar {
            width: 40px; height: 40px; background: rgba(255,255,255,0.1);
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-size: 1.2rem;
        }
        .chat-header-info h2 { font-size: 1.1rem; }
        .chat-header-info p { color: #888; font-size: 0.85rem; }
        
        .messages-container {
            flex: 1; overflow-y: auto; padding: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }
        
        .message {
            max-width: 70%; padding: 12px 16px;
            border-radius: 18px; position: relative;
        }
        .message.received {
            background: rgba(255,255,255,0.1);
            align-self: flex-start;
            border-bottom-left-radius: 5px;
        }
        .message.sent {
            background: linear-gradient(135deg, #e94560, #ff6b6b);
            align-self: flex-end;
            border-bottom-right-radius: 5px;
        }
        .message-sender {
            font-size: 0.75rem; color: #e94560;
            margin-bottom: 4px; font-weight: bold;
        }
        .message.sent .message-sender { display: none; }
        .message-text { line-height: 1.4; word-wrap: break-word; }
        .message-time {
            font-size: 0.7rem; color: rgba(255,255,255,0.5);
            margin-top: 4px; text-align: right;
        }
        
        .chat-input {
            padding: 15px 20px; background: rgba(0,0,0,0.3);
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 10px;
        }
        .chat-input input {
            flex: 1; padding: 12px 18px; border: 2px solid rgba(255,255,255,0.1);
            border-radius: 25px; background: rgba(0,0,0,0.3);
            color: #fff; font-size: 1rem;
        }
        .chat-input input:focus { outline: none; border-color: #e94560; }
        .chat-input button {
            padding: 12px 25px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            border: none; border-radius: 25px; color: #fff;
            font-weight: bold; cursor: pointer; transition: transform 0.2s;
        }
        .chat-input button:hover { transform: scale(1.05); }
        .chat-input button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        
        .empty-chat {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: #666;
        }
        .empty-chat .icon { font-size: 4rem; margin-bottom: 15px; }
        
        .login-prompt {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }
        .login-prompt h2 { margin-bottom: 15px; }
        .login-prompt p { color: #888; margin-bottom: 25px; }
        .login-prompt .btn {
            padding: 15px 40px; background: linear-gradient(135deg, #e94560, #ff6b6b);
            color: #fff; text-decoration: none; border-radius: 25px;
            font-weight: bold;
        }
        
        @media (max-width: 700px) {
            .sidebar { width: 100%; position: absolute; left: -100%; transition: left 0.3s; z-index: 100; height: calc(100vh - 60px); }
            .sidebar.open { left: 0; }
            .chat-main { width: 100%; }
            .mobile-menu-btn { display: block !important; }
        }
        .mobile-menu-btn { display: none; background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display: flex; align-items: center; gap: 15px;">
            <button class="mobile-menu-btn" onclick="toggleSidebar()">☰</button>
            <h1>💬 Chat</h1>
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-link">🏠 Home</a>
            <a href="friends.html" class="nav-link">👥 Friends</a>
        </div>
    </div>
    
    <div id="loginPrompt" class="login-prompt" style="display: none;">
        <h2>🔐 Login Required</h2>
        <p>Sign in to chat with your friends!</p>
        <a href="login.html?redirect=chat.html" class="btn">Login / Register</a>
    </div>
    
    <div id="chatContainer" class="chat-container" style="display: none;">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-tabs">
                <button class="sidebar-tab active" onclick="switchChatMode('global')">🌐 Global</button>
                <button class="sidebar-tab" onclick="switchChatMode('dm')">👤 DMs</button>
            </div>
            <div class="conversations" id="conversations"></div>
        </div>
        
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <div class="chat-header-avatar" id="chatAvatar">🌐</div>
                <div class="chat-header-info">
                    <h2 id="chatTitle">Global Chat</h2>
                    <p id="chatSubtitle">Chat with everyone</p>
                </div>
            </div>
            
            <div class="messages-container" id="messagesContainer"></div>
            
            <div class="chat-input">
                <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
                <button onclick="sendMessage()" id="sendBtn">Send</button>
            </div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let chatMode = 'global'; // 'global' or 'dm'
        let currentDM = null;
        let lastTimestamp = '1970-01-01T00:00:00Z';
        let pollInterval = null;
        let friends = [];
        
        // Check login
        async function checkAuth() {
            try {
                const resp = await fetch('api/auth.php?action=check', { credentials: 'include' });
                const data = await resp.json();
                
                if (data.loggedIn) {
                    currentUser = data.user;
                    document.getElementById('loginPrompt').style.display = 'none';
                    document.getElementById('chatContainer').style.display = 'flex';
                    loadFriends();
                    startPolling();
                    
                    // Check for DM param
                    const params = new URLSearchParams(window.location.search);
                    if (params.get('dm')) {
                        currentDM = params.get('dm');
                        switchChatMode('dm');
                    }
                } else {
                    document.getElementById('loginPrompt').style.display = 'flex';
                    document.getElementById('chatContainer').style.display = 'none';
                }
            } catch (err) {
                console.error('Auth check failed:', err);
            }
        }
        
        async function loadFriends() {
            try {
                const resp = await fetch('api/friends.php?action=list', { credentials: 'include' });
                const data = await resp.json();
                if (data.success) {
                    friends = data.friends;
                    if (chatMode === 'dm') renderConversations();
                }
            } catch (err) {}
        }
        
        function switchChatMode(mode) {
            chatMode = mode;
            lastTimestamp = '1970-01-01T00:00:00Z';
            document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.sidebar-tab:${mode === 'global' ? 'first' : 'last'}-child`).classList.add('active');
            
            if (mode === 'global') {
                currentDM = null;
                document.getElementById('chatAvatar').textContent = '🌐';
                document.getElementById('chatTitle').textContent = 'Global Chat';
                document.getElementById('chatSubtitle').textContent = 'Chat with everyone';
                document.getElementById('messagesContainer').innerHTML = '';
                renderConversations();
            } else {
                renderConversations();
                if (currentDM) {
                    openDM(currentDM);
                }
            }
        }
        
        function renderConversations() {
            const container = document.getElementById('conversations');
            
            if (chatMode === 'global') {
                container.innerHTML = `
                    <div class="conversation-item active" onclick="switchChatMode('global')">
                        <div class="conv-avatar">🌐</div>
                        <div class="conv-info">
                            <div class="conv-name">Global Chat</div>
                            <div class="conv-preview">Chat with everyone</div>
                        </div>
                    </div>
                `;
            } else {
                if (friends.length === 0) {
                    container.innerHTML = `
                        <div style="padding: 20px; text-align: center; color: #666;">
                            <p>No friends yet</p>
                            <a href="friends.html" style="color: #e94560;">Find friends</a>
                        </div>
                    `;
                } else {
                    container.innerHTML = friends.map(f => `
                        <div class="conversation-item ${currentDM === f.username ? 'active' : ''}" 
                             onclick="openDM('${f.username}')">
                            <div class="conv-avatar">${f.avatar}</div>
                            <div class="conv-info">
                                <div class="conv-name">${escapeHtml(f.displayName)}</div>
                                <div class="conv-preview">${f.isOnline ? '🟢 Online' : 'Offline'}</div>
                            </div>
                        </div>
                    `).join('');
                }
            }
        }
        
        function openDM(username) {
            currentDM = username;
            lastTimestamp = '1970-01-01T00:00:00Z';
            
            const friend = friends.find(f => f.username === username);
            if (friend) {
                document.getElementById('chatAvatar').textContent = friend.avatar;
                document.getElementById('chatTitle').textContent = friend.displayName;
                document.getElementById('chatSubtitle').textContent = friend.isOnline ? '🟢 Online' : 'Offline';
            } else {
                document.getElementById('chatAvatar').textContent = '👤';
                document.getElementById('chatTitle').textContent = username;
                document.getElementById('chatSubtitle').textContent = '';
            }
            
            document.getElementById('messagesContainer').innerHTML = '';
            renderConversations();
            
            // Close sidebar on mobile
            document.getElementById('sidebar').classList.remove('open');
        }
        
        async function loadMessages() {
            try {
                let url;
                if (chatMode === 'global') {
                    url = `api/chat.php?action=global&since=${encodeURIComponent(lastTimestamp)}`;
                } else if (currentDM) {
                    url = `api/chat.php?action=dm&with=${currentDM}&since=${encodeURIComponent(lastTimestamp)}`;
                } else {
                    return;
                }
                
                const resp = await fetch(url, { credentials: 'include' });
                const data = await resp.json();
                
                if (data.success && data.messages.length > 0) {
                    appendMessages(data.messages);
                    lastTimestamp = data.messages[data.messages.length - 1].timestamp;
                }
            } catch (err) {
                console.error('Failed to load messages:', err);
            }
        }
        
        function appendMessages(messages) {
            const container = document.getElementById('messagesContainer');
            const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 100;
            
            messages.forEach(msg => {
                const isSent = msg.from === currentUser.username;
                const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                const msgEl = document.createElement('div');
                msgEl.className = 'message ' + (isSent ? 'sent' : 'received');
                msgEl.innerHTML = `
                    ${chatMode === 'global' && !isSent ? `<div class="message-sender">${msg.avatar || '😎'} ${escapeHtml(msg.fromName || msg.from)}</div>` : ''}
                    <div class="message-text">${escapeHtml(msg.message)}</div>
                    <div class="message-time">${time}</div>
                `;
                container.appendChild(msgEl);
            });
            
            if (wasAtBottom) {
                container.scrollTop = container.scrollHeight;
            }
        }
        
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            try {
                const body = chatMode === 'global'
                    ? { action: 'send-global', message }
                    : { action: 'send-dm', to: currentDM, message };
                
                const resp = await fetch('api/chat.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify(body)
                });
                
                const data = await resp.json();
                
                if (data.success) {
                    input.value = '';
                    appendMessages([data.message]);
                } else {
                    alert(data.error || 'Failed to send message');
                }
            } catch (err) {
                console.error('Failed to send:', err);
            }
            
            btn.disabled = false;
            input.focus();
        }
        
        function startPolling() {
            loadMessages();
            pollInterval = setInterval(loadMessages, 2500);
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Enter to send
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        // Init
        checkAuth();
    </script>
</body>
</html>
